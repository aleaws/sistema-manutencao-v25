<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>07_OS_Dispositivos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--azul:#184b78;--azul2:#0f3557;--verde:#198754;--vermelho:#dc3545;--amarelo:#ffc107;--laranja:#fd7e14;--cinza:#6c757d;--bg:#eef2f5;--card:#fff;--borda:#d9dee5;--texto:#202428}
*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);margin:0;color:var(--texto)}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:white;padding:15px;text-align:center;font-size:24px;font-weight:bold;position:relative}.topbar{position:absolute;left:12px;top:50%;transform:translateY(-50%);display:flex;gap:8px}.container{max-width:1280px;margin:auto;padding:14px}.card{background:white;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:14px}.topo{display:flex;gap:10px;justify-content:space-between;align-items:end;flex-wrap:wrap}.busca{flex:1;min-width:280px}.acoes-topo{display:flex;gap:8px;align-items:end}
label{display:block;font-weight:bold;font-size:13px;margin-bottom:6px;color:#26313a}input,select,textarea{width:100%;padding:10px;border:1px solid var(--borda);border-radius:8px;font-size:14px;background:white}textarea{min-height:92px;resize:vertical}button{padding:10px 14px;border:none;border-radius:8px;color:white;background:var(--azul);font-weight:bold;cursor:pointer}button:hover{filter:brightness(.92)}button:disabled{opacity:.6;cursor:not-allowed}.btn-verde{background:var(--verde)}.btn-laranja{background:var(--laranja)}.btn-cinza{background:var(--cinza)}.btn-vermelho{background:var(--vermelho)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}.ind{background:#f8fafc;border:1px solid #e8edf2;border-radius:10px;padding:10px;text-align:center;min-height:74px;display:flex;flex-direction:column;justify-content:center;cursor:pointer}.ind.ativo{background:#e8f2ff;border-color:var(--azul);box-shadow:0 0 0 3px rgba(24,75,120,.12)}.ind b{font-size:27px;color:var(--azul)}.ind span{font-size:13px;color:#4d5963}.ind.vermelho{background:#fff5f5;border-color:#f5c2c7}.ind.vermelho b{color:#842029}.ind.amarelo{background:#fff9e6;border-color:#ffecb5}.ind.amarelo b{color:#664d03}.ind.verde{background:#f2fff7;border-color:#badbcc}.ind.verde b{color:#0f5132}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.filtros button{background:#f8fafc;color:#24313d;border:1px solid #d7dee7;padding:8px 11px;font-size:13px}.filtros button.ativo{background:var(--azul);color:#fff;border-color:var(--azul)}.resumo{font-size:13px;color:#5b6570;margin-top:8px}.tabela-wrap{width:100%;overflow-x:auto;overflow-y:visible;border:1px solid var(--borda);border-radius:10px;background:white;max-height:none}table{width:100%;border-collapse:collapse;min-width:1080px}th,td{border-bottom:1px solid #e5e9ee;padding:9px 8px;font-size:14px;text-align:left;vertical-align:middle}th{background:var(--azul);color:white;position:sticky;top:0;z-index:2;text-transform:uppercase;font-size:12px}tbody tr:nth-child(even){background:#fbfcfe}tbody tr:hover{background:#eef6ff}.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold;white-space:nowrap}.bgCritica{background:#f8d7da;color:#842029}.bgAlta{background:#fff3cd;color:#664d03}.bgNormal{background:#d1e7dd;color:#0f5132}.bgBaixa{background:#cff4fc;color:#055160}.stAberta{background:#fff3cd;color:#664d03}.stAndamento{background:#cfe2ff;color:#084298}.stPeca{background:#ffe5b4;color:#8a4b00}.stConcluida{background:#d1e7dd;color:#0f5132}.stCancelada{background:#f8d7da;color:#842029}.acoes{display:flex;gap:6px;flex-wrap:wrap}.acoes button{padding:7px 10px;font-size:12px;white-space:nowrap}
.modal-fundo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;padding:14px;align-items:center;justify-content:center}.modal{background:#fff;width:min(900px,100%);max-height:92vh;overflow:auto;border-radius:14px;box-shadow:0 18px 45px rgba(0,0,0,.28)}.modal-head{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:14px 16px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center}.modal-body{padding:16px}.detalhes,.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.campo{border:1px solid #e1e6eb;border-radius:10px;background:#f8fafc;padding:10px;min-height:62px}.campo small{display:block;color:#66717c;font-weight:bold;margin-bottom:4px;text-transform:uppercase;font-size:11px}.campo div{font-size:15px;word-break:break-word;white-space:pre-wrap}.campo.full,.form-item.full{grid-column:1/-1}.form-acoes{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;border-top:1px solid #e5e9ee;padding-top:14px}.mensagem{display:none;margin-bottom:12px;padding:10px;border-radius:8px;font-weight:bold}.mensagem.ok{display:block;background:#d1e7dd;color:#0f5132}.mensagem.erro{display:block;background:#f8d7da;color:#842029}
@media(max-width:850px){header{font-size:20px;padding-top:62px}.topbar{top:12px;left:12px;right:12px;transform:none}.topbar button{flex:1}.container{padding:10px}.grid{grid-template-columns:repeat(2,1fr)}button{width:100%}.detalhes,.form-grid{grid-template-columns:1fr}.acoes-topo,.form-acoes{width:100%;flex-direction:column}.campo.full,.form-item.full{grid-column:auto}}

/* AÇÕES COMPACTAS - mantém todas as funções existentes */
.acoes{position:relative;display:flex;justify-content:center;overflow:visible}
.btn-acoes{width:42px;height:38px;padding:0;border-radius:9px;background:#18588d;color:#fff;font-size:20px;line-height:1;display:grid;place-items:center}
.menu-acoes{display:none;position:absolute;right:0;top:43px;z-index:40;min-width:170px;padding:6px;border:1px solid #d8e0e8;border-radius:10px;background:#fff;box-shadow:0 12px 28px rgba(15,53,87,.22)}
.menu-acoes.aberto{display:grid;gap:5px}
.menu-acoes button{width:100%;padding:8px 10px;border-radius:7px;background:#fff;color:#26313a;text-align:left;font-size:13px;white-space:nowrap}
.menu-acoes button:hover{background:#edf5fc}
.menu-acoes .acao-concluir{color:#146c43}
.menu-acoes .acao-excluir{color:#b4232f}
.tabela-wrap,table,tbody,tr,td{overflow:visible}

</style>
</head>
<body>
<header><div class="topbar"><button class="btn-cinza" onclick="window.location.href='00_Sistema_Manutencao_V25.html'">⬅ Menu</button><button class="btn-verde" onclick="carregar()">🔄 Atualizar</button></div>🛠 07 - MANUTENÇÃO DOS DISPOSITIVOS</header>
<div class="container">
<div class="card"><div class="topo"><div class="busca"><label>🔎 Pesquisa em tempo real</label><input id="pesquisa" placeholder="Digite OS, dispositivo, máquina, responsável, status ou serviço"><div class="resumo" id="resumo">Carregando...</div><div class="filtros"><button id="fTodos" onclick="setFiltro('todos')" class="ativo">Todos</button><button id="fAbertas" onclick="setFiltro('Aberta')">Abertas</button><button id="fAndamento" onclick="setFiltro('Em Andamento')">Em andamento</button><button id="fPeca" onclick="setFiltro('Aguardando Peça')">Aguardando peça</button><button id="fConcluidas" onclick="setFiltro('Concluída')">Concluídas</button><button onclick="limparFiltros()">Limpar</button></div></div><div class="acoes-topo"><button class="btn-verde" onclick="novaManutencao()">➕ Nova Manutenção de Dispositivo</button></div></div></div>
<div class="card"><div class="grid"><div class="ind" id="cardTotal" onclick="setFiltro('todos')"><b id="iTotal">0</b><span>Total</span></div><div class="ind amarelo" id="cardAbertas" onclick="setFiltro('Aberta')"><b id="iAbertas">0</b><span>Abertas</span></div><div class="ind amarelo" id="cardAndamento" onclick="setFiltro('Em Andamento')"><b id="iAndamento">0</b><span>Em Andamento</span></div><div class="ind amarelo" id="cardPeca" onclick="setFiltro('Aguardando Peça')"><b id="iPeca">0</b><span>Aguardando Peça</span></div><div class="ind verde" id="cardConcluidas" onclick="setFiltro('Concluída')"><b id="iConcluidas">0</b><span>Concluídas</span></div><div class="ind vermelho"><b id="iCriticas">0</b><span>Críticas</span></div></div></div>
<div class="card"><div class="tabela-wrap"><table><thead><tr><th>OS</th><th>Data</th><th>Dispositivo</th><th>Máquina</th><th>Prioridade</th><th>Status</th><th>Responsável</th><th>Serviço / Defeito</th><th>Ações</th></tr></thead><tbody id="tb"></tbody></table></div></div>
</div>

<div class="modal-fundo" id="modalDetalhes" onclick="fecharFora(event,'modalDetalhes')"><div class="modal"><div class="modal-head"><b>👁 Detalhes da manutenção</b><button onclick="fecharModal('modalDetalhes')">Fechar</button></div><div class="modal-body" id="modalBody"></div></div></div>

<div class="modal-fundo" id="modalFormulario" onclick="fecharFora(event,'modalFormulario')"><div class="modal"><div class="modal-head"><b id="tituloFormulario">➕ Nova Manutenção</b><button onclick="fecharModal('modalFormulario')">Fechar</button></div><div class="modal-body"><div id="mensagemForm" class="mensagem"></div><form id="formManutencao" onsubmit="salvarManutencao(event)"><input type="hidden" id="registroId"><div class="form-grid">
<div class="form-item"><label>OS</label><input id="fOS" placeholder="Gerada automaticamente se deixar vazio"></div>
<div class="form-item"><label>Data *</label><input id="fData" type="date" required></div>
<div class="form-item"><label>Dispositivo *</label><input id="fDispositivo" list="listaDispositivos" placeholder="Digite ou selecione o dispositivo" required><datalist id="listaDispositivos"></datalist></div>
<div class="form-item"><label>Tipo de serviço *</label><select id="fCategoria" required><option value="Corretiva">Corretiva</option><option value="Preventiva">Preventiva</option><option value="Melhoria">Melhoria</option><option value="Inspeção">Inspeção</option><option value="Outro">Outro</option></select></div>
<div class="form-item"><label>Prioridade *</label><select id="fPrioridade" required><option value="Normal">Normal</option><option value="Baixa">Baixa</option><option value="Alta">Alta</option><option value="Crítica">Crítica</option></select></div>
<div class="form-item"><label>Status *</label><select id="fStatus" required><option value="Aberta">Aberta</option><option value="Em Andamento">Em Andamento</option><option value="Aguardando Peça">Aguardando Peça</option><option value="Concluída">Concluída</option><option value="Cancelada">Cancelada</option></select></div>
<div class="form-item"><label>Responsável *</label><input id="fResponsavel" placeholder="Nome do responsável" required></div>
<div class="form-item"><label>Máquina relacionada</label><input id="fMaquina" list="listaMaquinas" placeholder="Opcional"><datalist id="listaMaquinas"></datalist></div>
<div class="form-item full"><label>Serviço / Defeito *</label><textarea id="fServico" placeholder="Descreva o defeito ou serviço realizado" required></textarea></div>
<div class="form-item full"><label>Observações</label><textarea id="fObs" placeholder="Peças, medidas, recomendações ou outras informações"></textarea></div>
</div><div class="form-acoes"><button type="button" class="btn-cinza" onclick="fecharModal('modalFormulario')">Cancelar</button><button type="submit" class="btn-verde" id="btnSalvar">💾 Salvar</button></div></form></div></div></div>

<script>
(function(){const usuario=(localStorage.getItem('usuarioLogado')||'').toLowerCase();const autorizado=usuario.includes('alexandre')||usuario.includes('diretoria');if(!autorizado){alert('Acesso bloqueado.');window.location.href='00_Sistema_Manutencao_V25.html';}})();
const SUPABASE_URL='https://wzcrqzbwcsmfwenzcxkf.supabase.co';
const SUPABASE_KEY='sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';
const bancoSupabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let listaCompleta=[],listaFiltrada=[],filtro='todos',dispositivos=[],maquinas=[];
function el(id){return document.getElementById(id)}
function valor(v){return(v===null||v===undefined)?'':String(v)}
function normalizar(v){return valor(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function escapar(v){return valor(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function classePrioridade(p){if(p==='Crítica')return'bgCritica';if(p==='Alta')return'bgAlta';if(p==='Normal')return'bgNormal';return'bgBaixa'}
function classeStatus(s){if(s==='Aberta')return'stAberta';if(s==='Em Andamento')return'stAndamento';if(s==='Aguardando Peça')return'stPeca';if(s==='Concluída')return'stConcluida';if(s==='Cancelada')return'stCancelada';return'stAberta'}
function textoBusca(r){return normalizar([r.os,r.data,r.maquina,r.dispositivo,r.prioridade,r.status,r.responsavel,r.servico,r.defeito,r.obs].join(' '))}
function hoje(){return new Date().toISOString().slice(0,10)}

async function carregar(){el('resumo').textContent='Carregando...';const [resMan,resDisp,resMaq]=await Promise.all([bancoSupabase.from('manutencao').select('*').eq('tipo','Dispositivo').order('id',{ascending:false}),bancoSupabase.from('dispositivos').select('*').order('codigo',{ascending:true}),bancoSupabase.from('maquinas').select('*').order('codigo',{ascending:true})]);if(resMan.error){alert('Erro ao carregar manutenções: '+resMan.error.message);listaCompleta=[]}else{listaCompleta=resMan.data||[]}if(resDisp.error){console.warn('Dispositivos:',resDisp.error.message);dispositivos=[]}else{dispositivos=resDisp.data||[]}if(resMaq.error){console.warn('Máquinas:',resMaq.error.message);maquinas=[]}else{maquinas=resMaq.data||[]}preencherDispositivos();preencherMaquinas();filtrar()}
function preencherDispositivos(){el('listaDispositivos').innerHTML=dispositivos.map(d=>{const codigo=valor(d.codigo||d.dispositivo||d.nome);const nome=valor(d.dispositivo||d.nome||d.descricao);const exibicao=nome&&nome!==codigo?codigo+' - '+nome:codigo;return'<option value="'+escapar(exibicao)+'"></option>'}).join('')}
function preencherMaquinas(){el('listaMaquinas').innerHTML=maquinas.map(m=>{const codigo=valor(m.codigo||m.maquina||m.nome);const nome=valor(m.maquina||m.nome||m.descricao);const exibicao=nome&&nome!==codigo?codigo+' - '+nome:codigo;return'<option value="'+escapar(exibicao)+'"></option>'}).join('')}
function filtrar(){const termo=normalizar(el('pesquisa').value.trim());listaFiltrada=listaCompleta.filter(r=>(filtro==='todos'||r.status===filtro)&&(!termo||textoBusca(r).includes(termo)));renderizar()}
function setFiltro(v){filtro=v;filtrar()}
function limparFiltros(){filtro='todos';el('pesquisa').value='';filtrar()}
function atualizarCards(){el('iTotal').textContent=listaCompleta.length;el('iAbertas').textContent=listaCompleta.filter(x=>x.status==='Aberta').length;el('iAndamento').textContent=listaCompleta.filter(x=>x.status==='Em Andamento').length;el('iPeca').textContent=listaCompleta.filter(x=>x.status==='Aguardando Peça').length;el('iConcluidas').textContent=listaCompleta.filter(x=>x.status==='Concluída').length;el('iCriticas').textContent=listaCompleta.filter(x=>x.prioridade==='Crítica'&&x.status!=='Concluída'&&x.status!=='Cancelada').length;['fTodos','fAbertas','fAndamento','fPeca','fConcluidas'].forEach(id=>el(id)?.classList.remove('ativo'));['cardTotal','cardAbertas','cardAndamento','cardPeca','cardConcluidas'].forEach(id=>el(id)?.classList.remove('ativo'));const mapa={todos:['fTodos','cardTotal'],Aberta:['fAbertas','cardAbertas'],'Em Andamento':['fAndamento','cardAndamento'],'Aguardando Peça':['fPeca','cardPeca'],'Concluída':['fConcluidas','cardConcluidas']};(mapa[filtro]||[]).forEach(id=>el(id)?.classList.add('ativo'));el('resumo').textContent='Mostrando '+listaFiltrada.length+' de '+listaCompleta.length+' registros | Cadastro direto de manutenção de dispositivos.'}
function renderizar(){atualizarCards();const tb=el('tb');tb.innerHTML='';if(!listaFiltrada.length){tb.innerHTML='<tr><td colspan="9" style="text-align:center;padding:25px;color:#666">Nenhum registro encontrado.</td></tr>';return}listaFiltrada.forEach((r,i)=>{tb.innerHTML+=`<tr><td><b>${escapar(r.os||'')}</b></td><td>${escapar(r.data||'')}</td><td>${escapar(r.dispositivo||'')}</td><td>${escapar(r.maquina||'')}</td><td><span class="badge ${classePrioridade(r.prioridade)}">${escapar(r.prioridade||'')}</span></td><td><span class="badge ${classeStatus(r.status)}">${escapar(r.status||'')}</span></td><td>${escapar(r.responsavel||'')}</td><td>${escapar(r.servico||r.defeito||'')}</td><td><div class="acoes"><button type="button" class="btn-acoes" title="Ações" onclick="alternarMenuAcoes(event,${i})">⋮</button><div class="menu-acoes" id="menuAcoes_${i}"><button type="button" onclick="fecharMenusAcoes();visualizar(${i})">👁 Ver detalhes</button><button type="button" onclick="fecharMenusAcoes();editar(${i})">✏ Editar</button>${r.status!=='Concluída'?`<button type="button" class="acao-concluir" onclick="fecharMenusAcoes();concluir(${i})">✅ Concluir</button>`:''}<button type="button" class="acao-excluir" onclick="fecharMenusAcoes();excluirRegistro(${i})">🗑 Excluir</button></div></div></td></tr>`})}
function campo(t,c,full){return`<div class="campo ${full?'full':''}"><small>${escapar(t)}</small><div>${escapar(c)||'-'}</div></div>`}
function visualizar(i){const r=listaFiltrada[i];if(!r)return;el('modalBody').innerHTML=`<div class="detalhes">${campo('OS',r.os)}${campo('Data',r.data)}${campo('Tipo',r.tipo)}${campo('Máquina',r.maquina)}${campo('Categoria',r.categoria||r.tipo_servico||'')}${campo('Dispositivo',r.dispositivo)}${campo('Prioridade',r.prioridade)}${campo('Status',r.status)}${campo('Responsável',r.responsavel)}${campo('Serviço',r.servico||r.defeito,true)}${campo('Observação',r.obs,true)}</div>`;el('modalDetalhes').style.display='flex'}
function novaManutencao(){el('formManutencao').reset();el('registroId').value='';el('tituloFormulario').textContent='➕ Nova Manutenção de Dispositivo';el('fData').value=hoje();el('fPrioridade').value='Normal';el('fStatus').value='Aberta';el('mensagemForm').className='mensagem';el('mensagemForm').textContent='';el('modalFormulario').style.display='flex'}
function editar(i){const r=listaFiltrada[i];if(!r)return;el('registroId').value=r.id;el('tituloFormulario').textContent='✏ Editar Manutenção de Dispositivo';el('fOS').value=r.os||'';el('fData').value=r.data||hoje();el('fDispositivo').value=r.dispositivo||'';el('fMaquina').value=r.maquina||'';el('fCategoria').value=r.categoria||r.tipo_servico||((r.servico||'').match(/preventiva/i)?'Preventiva':(r.servico||'').match(/corretiva/i)?'Corretiva':'Outro');el('fPrioridade').value=r.prioridade||'Normal';el('fStatus').value=r.status||'Aberta';el('fResponsavel').value=r.responsavel||'';el('fServico').value=r.servico||r.defeito||'';el('fObs').value=r.obs||'';el('mensagemForm').className='mensagem';el('modalFormulario').style.display='flex'}
function gerarOS(){const ano=new Date().getFullYear();let maior=0;listaCompleta.forEach(r=>{const m=valor(r.os).match(/(\d{4})-(\d+)$/);if(m&&Number(m[1])===ano)maior=Math.max(maior,Number(m[2]))});return'OS-'+ano+'-'+String(maior+1).padStart(4,'0')}
async function salvarManutencao(e){e.preventDefault();const id=el('registroId').value;const btn=el('btnSalvar');btn.disabled=true;btn.textContent='Salvando...';const categoria=el('fCategoria').value;const dados={tipo:'Dispositivo',os:el('fOS').value.trim()||gerarOS(),data:el('fData').value,maquina:el('fMaquina').value.trim(),dispositivo:el('fDispositivo').value.trim(),prioridade:el('fPrioridade').value,status:el('fStatus').value,responsavel:el('fResponsavel').value.trim(),servico:el('fServico').value.trim(),defeito:el('fServico').value.trim(),obs:el('fObs').value.trim()};let resultado=id?await bancoSupabase.from('manutencao').update(dados).eq('id',id):await bancoSupabase.from('manutencao').insert([dados]);btn.disabled=false;btn.textContent='💾 Salvar';if(resultado.error){mostrarMensagem('Erro ao salvar: '+resultado.error.message,'erro');return}mostrarMensagem('Manutenção salva com sucesso.','ok');await carregar();setTimeout(()=>fecharModal('modalFormulario'),650)}
async function concluir(i){const r=listaFiltrada[i];if(!r||!confirm('Marcar esta manutenção como concluída?'))return;const{error}=await bancoSupabase.from('manutencao').update({status:'Concluída'}).eq('id',r.id);if(error){alert('Erro ao concluir: '+error.message);return}await carregar()}
async function excluirRegistro(i){const r=listaFiltrada[i];if(!r||!confirm('Excluir definitivamente a manutenção '+(r.os||'')+'?'))return;const{error}=await bancoSupabase.from('manutencao').delete().eq('id',r.id);if(error){alert('Erro ao excluir: '+error.message);return}await carregar()}
function mostrarMensagem(texto,tipo){const m=el('mensagemForm');m.textContent=texto;m.className='mensagem '+tipo}
function fecharModal(id){el(id).style.display='none'}
function fecharFora(e,id){if(e.target.id===id)fecharModal(id)}

function fecharMenusAcoes(){document.querySelectorAll('.menu-acoes.aberto').forEach(m=>m.classList.remove('aberto'))}
function alternarMenuAcoes(event,i){event.stopPropagation();const menu=el('menuAcoes_'+i);const aberto=menu&&menu.classList.contains('aberto');fecharMenusAcoes();if(menu&&!aberto)menu.classList.add('aberto')}
document.addEventListener('click',fecharMenusAcoes);
el('pesquisa').addEventListener('input',filtrar);document.addEventListener('DOMContentLoaded',carregar);
</script>
</body>
</html>
