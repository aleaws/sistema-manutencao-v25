<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>11_Historico_Liberacoes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
:root{
--azul:#184b78;
--azul2:#0f3557;
--verde:#198754;
--amarelo:#ffc107;
--vermelho:#dc3545;
--laranja:#fd7e14;
--cinza:#6c757d;
--borda:#d9dee5;
--bg:#eef2f5;
--branco:#ffffff;
--texto:#202428;
}
*{box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--bg);color:var(--texto)}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:15px;text-align:center;font-size:24px;font-weight:bold;letter-spacing:.3px}
.container{max-width:1250px;margin:auto;padding:14px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.topo{display:flex;gap:10px;align-items:end;justify-content:space-between;flex-wrap:wrap}
.busca{flex:1;min-width:260px}
label{display:block;font-weight:bold;font-size:13px;margin-bottom:6px;color:#26313a}
input{width:100%;padding:11px;border:1px solid var(--borda);border-radius:9px;font-size:15px;outline:none;background:#fff}
input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(24,75,120,.12)}
.botoes{display:flex;gap:8px;flex-wrap:wrap}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.filtros button{background:#f8fafc;color:#24313d;border:1px solid #d7dee7;padding:8px 11px;font-size:13px}
.filtros button.ativo{background:var(--azul);color:#fff;border-color:var(--azul)}
button{padding:10px 14px;border:none;border-radius:9px;background:var(--azul);color:#fff;font-weight:bold;cursor:pointer;transition:.15s;font-size:14px}
button:hover{filter:brightness(.92);transform:translateY(-1px)}
.btn-verde{background:var(--verde)}
.btn-laranja{background:var(--laranja)}
.btn-cinza{background:var(--cinza)}
.btn-olho{background:var(--azul);padding:7px 10px;font-size:13px;border-radius:7px;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.ind.destaque-op{border:1px solid #f5c2c7;background:#fff5f5}
.ind.destaque-op b{color:#842029}
.ind.destaque-op.ativo{background:#ffe8e8;border-color:#dc3545;box-shadow:0 0 0 3px rgba(220,53,69,.14)}
.ind{background:#f8fafc;border:1px solid #e8edf2;border-radius:10px;padding:10px;text-align:center;min-height:74px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:.15s}
.ind:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);border-color:#b8c8d8}
.ind.ativo{background:#e8f2ff;border-color:var(--azul);box-shadow:0 0 0 3px rgba(24,75,120,.12)}
.ind b{font-size:27px;color:var(--azul);line-height:1.1}
.ind span{font-size:13px;color:#4d5963;margin-top:4px}
.resumo{font-size:13px;color:#5b6570;margin-top:8px}
.resumo-forte{font-size:14px;color:#26313a;margin-top:8px;font-weight:bold}
.tabela-wrap{width:100%;overflow:auto;border:1px solid var(--borda);border-radius:10px;max-height:650px;background:#fff}
table{width:100%;border-collapse:collapse;min-width:980px}
th,td{border-bottom:1px solid #e5e9ee;padding:9px 8px;font-size:14px;text-align:left;vertical-align:middle}
th{background:var(--azul);color:#fff;position:sticky;top:0;z-index:2;font-size:13px;text-transform:uppercase;letter-spacing:.2px}
tbody tr:nth-child(even){background:#fbfcfe}
tbody tr:hover{background:#eef6ff}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold;border:1px solid transparent;white-space:nowrap}
.badge.sim{background:#d1e7dd;color:#0f5132;border-color:#badbcc}
.badge.nao{background:#fff3cd;color:#664d03;border-color:#ffecb5}
.badge.mau{background:#f8d7da;color:#842029;border-color:#f5c2c7}
.badge.outro{background:#e9ecef;color:#495057;border-color:#d6d8db}
.linha-mau{box-shadow:inset 4px 0 0 var(--vermelho)}
.linha-nao{box-shadow:inset 4px 0 0 var(--amarelo)}
.vazio{text-align:center;color:#666;padding:28px!important;font-size:15px}
.modal-fundo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;padding:14px;align-items:center;justify-content:center}
.modal{background:#fff;width:min(780px,100%);max-height:90vh;overflow:auto;border-radius:14px;box-shadow:0 18px 45px rgba(0,0,0,.28)}
.modal-head{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:14px 16px;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.modal-head b{font-size:18px}
.fechar{background:#ffffff22;border:1px solid #ffffff55;padding:7px 10px}
.modal-body{padding:16px}
.detalhes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.campo{border:1px solid #e1e6eb;border-radius:10px;background:#f8fafc;padding:10px;min-height:62px}
.campo small{display:block;color:#66717c;font-weight:bold;margin-bottom:4px;text-transform:uppercase;font-size:11px}
.campo div{font-size:15px;word-break:break-word;white-space:pre-wrap}
.campo.full{grid-column:1/-1}
.msg{display:none;margin-top:10px;padding:10px;border-radius:8px;font-size:14px;font-weight:bold}
.ok{background:#d1e7dd;color:#0f5132}.erro{background:#f8d7da;color:#842029}
@media(max-width:850px){
header{font-size:20px;padding:13px}
.container{padding:10px}
.grid{grid-template-columns:repeat(2,1fr)}
.topo{display:block}.botoes{margin-top:10px}
button{width:100%;padding:11px}
.btn-olho{width:auto;padding:7px 10px}
.ind b{font-size:24px}
th,td{font-size:12px;padding:8px 6px}
.detalhes{grid-template-columns:1fr}
}

.badge-check{
display:inline-block;
padding:4px 8px;
border-radius:999px;
font-size:12px;
font-weight:bold;
margin:2px 2px 0 0;
border:1px solid #ddd;
background:#f8fafc;
color:#333;
white-space:nowrap;
}
.badge-check.ok2{
background:#d1e7dd;
color:#0f5132;
border-color:#badbcc;
}
.badge-check.nok2{
background:#f8d7da;
color:#842029;
border-color:#f5c2c7;
}
.op-desenho-box{
margin-top:5px;
line-height:1.7;
}


.btn-editar{background:#0d6efd;padding:7px 10px;font-size:13px;border-radius:7px;white-space:nowrap}
.btn-excluir{background:#dc3545;padding:7px 10px;font-size:13px;border-radius:7px;white-space:nowrap}
.acoes-linha{display:flex;gap:6px;flex-wrap:wrap}
.form-edicao{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.form-edicao label{
margin-bottom:0;
}
.form-edicao select,
.form-edicao textarea,
.form-edicao input{
width:100%;
padding:10px;
border:1px solid var(--borda);
border-radius:8px;
font-size:14px;
}
.form-edicao textarea{
min-height:85px;
resize:vertical;
}
.form-edicao .full{grid-column:1/-1}
.btn-salvar-edicao{background:#198754}
@media(max-width:850px){
.acoes-linha{display:grid;grid-template-columns:1fr;gap:6px}
.btn-editar,.btn-excluir{width:100%}
.form-edicao{grid-template-columns:1fr}
}

</style>
</head>
<body>
<header>📋 11 - HISTÓRICO DE LIBERAÇÕES</header>

<div class="container">

<div class="card">
<div class="topo">
<div class="busca">
<label>🔎 Pesquisa em tempo real</label>
<input id="pesquisa" placeholder="Digite OP, máquina, dispositivo, resultado, operador, responsável ou observação">
<div class="resumo" id="resumoBusca">Carregando registros...</div>
<div id="msg" class="msg"></div>
<div class="filtros">
<button id="fTodos" onclick="setFiltro('todos')" class="ativo">Todos</button>
<button id="fHoje" onclick="setFiltro('hoje')">Hoje</button>
<button id="fSemana" onclick="setFiltro('semana')">Esta semana</button>
<button id="fMes" onclick="setFiltro('mes')">Este mês</button>
<button id="fMau" onclick="setFiltro('mau')">Mau uso</button>
<button onclick="limparFiltros()">Limpar filtros</button>
</div>
<div class="resumo-forte" id="resumoAutomatico"></div>
</div>
<div class="botoes">
<button class="btn-verde" onclick="carregar()">🔄 Atualizar</button>
<button class="btn-laranja" onclick="exportarExcel()">📊 Exportar Excel</button>
<button class="btn-cinza" onclick="window.location.href='00_Sistema_Manutencao_V25.html'">🏠 Menu</button>
</div>
</div>
</div>

<div class="card">
<div class="grid">
<div class="ind" id="cardTotal" onclick="setFiltro('todos')"><b id="iTotal">0</b><span>Total</span></div>
<div class="ind" id="cardExibindo"><b id="iExibindo">0</b><span>Exibindo</span></div>
<div class="ind" id="cardMau" onclick="setFiltro('mau')"><b id="iMau">0</b><span>Mau Uso</span></div>
<div class="ind destaque-op" id="cardOpNaoOk" onclick="setFiltro('opnok')"><b id="iOpNaoOk">0</b><span>OP NÃO OK</span></div>
<div class="ind destaque-op" id="cardDesenhoNaoOk" onclick="setFiltro('desenhonok')"><b id="iDesenhoNaoOk">0</b><span>Desenho NÃO OK</span></div>
<div class="ind" id="cardHoje" onclick="setFiltro('hoje')"><b id="iHoje">0</b><span>Hoje</span></div>
<div class="ind" id="cardMes" onclick="setFiltro('mes')"><b id="iMes">0</b><span>Este Mês</span></div>
</div>
</div>

<div class="card">
<div class="tabela-wrap">
<table id="tabelaHistorico">
<thead>
<tr>
<th>Data</th>
<th>OP</th>
<th>Máquina</th>
<th>Dispositivo</th>
<th>Resultado</th>
<th>Operador</th>
<th>Responsável</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>
</div>

</div>

<div class="modal-fundo" id="modalFundo" onclick="fecharModalFora(event)">
<div class="modal">
<div class="modal-head">
<b>👁 Detalhes da Liberação</b>
<button class="fechar" onclick="fecharModal()">Fechar</button>
</div>
<div class="modal-body" id="modalBody"></div>
</div>
</div>


<div class="modal-fundo" id="modalEditarFundo" onclick="fecharEditarFora(event)">
<div class="modal">
<div class="modal-head">
<b>✏️ Editar Liberação</b>
<button class="fechar" onclick="fecharEditar()">Fechar</button>
</div>
<div class="modal-body" id="modalEditarBody"></div>
</div>
</div>

<script>
const banco=supabase.createClient(
'https://wzcrqzbwcsmfwenzcxkf.supabase.co',
'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu'
);

let listaCompleta=[];
let listaFiltrada=[];
let filtroAtivo='todos';
let usuarioLogado=localStorage.getItem("usuarioLogado") || "";

function el(id){return document.getElementById(id);}
function valor(v){return (v===null || v===undefined) ? '' : String(v);}
function normalizar(v){return valor(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function escapar(v){return valor(v).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function dataBR(d){
if(!d)return '';
if(String(d).includes('-')){
let p=String(d).split('T')[0].split('-');
if(p.length===3)return p[2]+'/'+p[1]+'/'+p[0];
}
return d;
}
function hojeISO(){return new Date().toISOString().split('T')[0];}
function mesISO(){return hojeISO().substring(0,7);}
function inicioSemanaISO(){
let d=new Date();
let dia=d.getDay();
let diff=(dia===0?6:dia-1);
d.setDate(d.getDate()-diff);
return d.toISOString().split('T')[0];
}
function dentroFiltroRapido(r){
let data=valor(r.data).split('T')[0];
let conf=normalizar(r.conforme);
if(filtroAtivo==='hoje')return data===hojeISO();
if(filtroAtivo==='semana')return data>=inicioSemanaISO() && data<=hojeISO();
if(filtroAtivo==='mes')return data.startsWith(mesISO());
if(filtroAtivo==='mau')return conf==='mau uso';
if(filtroAtivo==='opnok')return pegarChecklist(r,'OP Correta')==='Não';
if(filtroAtivo==='desenhonok')return pegarChecklist(r,'Desenho Correto')==='Não';
return true;
}

function classeResultado(r){
let x=normalizar(r);
if(x==='sim' || x==='liberado')return 'sim';
if(x==='nao' || x==='não' || x==='não liberado' || x==='nao liberado')return 'nao';
if(x==='mau uso')return 'mau';
return 'outro';
}

function textoBusca(r){
return normalizar([
r.data,r.op,r.maquina,r.dispositivo,r.conforme,r.operador,r.responsavel,r.servico,r.orientado,r.obs
].join(' '));
}



function pegarChecklist(r,nome){
let texto = String((r && r.obs) || '');
let regex = new RegExp(nome + '\\s*=\\s*([^|\\n]+)', 'i');
let m = texto.match(regex);
return m && m[1] ? m[1].trim() : '-';
}

function limparObservacao(obsTexto){
let texto = String(obsTexto || '');
texto = texto.replace(/Checklist:\s*[\s\S]*/i,'').trim();
texto = texto.replace(/Motivo Mau Uso:\s*/i,'Motivo Mau Uso: ').trim();
return texto || '-';
}

function resultadoVisual(valor){
let x = String(valor || '').trim();
if(x === 'Sim') return 'Liberado';
if(x === 'Não') return 'Não Liberado';
return x || '-';
}

function badgeCheck(rotulo,valor){
valor = String(valor || '-').trim();
let classe = 'badge-check';
let texto = valor;
if(valor === 'Sim'){classe += ' ok2'; texto = 'OK';}
if(valor === 'Não'){classe += ' nok2'; texto = 'NÃO OK';}
return '<span class="'+classe+'">'+rotulo+': '+texto+'</span>';
}

function blocoOpDesenho(r){
return '<div class="op-desenho-box">' +
badgeCheck('OP',pegarChecklist(r,'OP Correta')) +
badgeCheck('Desenho',pegarChecklist(r,'Desenho Correto')) +
'</div>';
}

function avisar(texto,tipo){
const m=el('msg');
m.textContent=texto;
m.className='msg '+(tipo==='erro'?'erro':'ok');
m.style.display='block';
setTimeout(()=>{m.style.display='none';},3000);
}

async function carregar(){
el('resumoBusca').textContent='Carregando registros do Supabase...';
const {data,error}=await banco.from('liberacoes').select('*').order('data',{ascending:false});
if(error){
el('tb').innerHTML='<tr><td class="vazio" colspan="8">Erro ao carregar: '+escapar(error.message)+'</td></tr>';
el('resumoBusca').textContent='Erro ao carregar dados.';
return;
}
listaCompleta=data||[];
filtrar();
atualizarIndicadores();
avisar('Histórico atualizado com sucesso.','ok');
}

function filtrar(){
const termo=normalizar(el('pesquisa').value.trim());
listaFiltrada=listaCompleta.filter(r=>{
const passaTexto=!termo || textoBusca(r).includes(termo);
const passaFiltro=dentroFiltroRapido(r);
return passaTexto && passaFiltro;
});
renderTabela();
atualizarIndicadores();
atualizarBotoesFiltro();
}

function setFiltro(tipo){
filtroAtivo=tipo;
filtrar();
}

function limparFiltros(){
filtroAtivo='todos';
el('pesquisa').value='';
filtrar();
}

function atualizarBotoesFiltro(){
['Todos','Hoje','Semana','Mes','Mau'].forEach(n=>{
let b=el('f'+n); if(b)b.classList.remove('ativo');
});
const mapa={todos:'fTodos',hoje:'fHoje',semana:'fSemana',mes:'fMes',mau:'fMau'};
if(el(mapa[filtroAtivo]))el(mapa[filtroAtivo]).classList.add('ativo');
['cardTotal','cardMau','cardHoje','cardMes','cardOpNaoOk','cardDesenhoNaoOk'].forEach(id=>{if(el(id))el(id).classList.remove('ativo');});
const mapaCard={
todos:'cardTotal',
mau:'cardMau',
hoje:'cardHoje',
mes:'cardMes',
opnok:'cardOpNaoOk',
desenhonok:'cardDesenhoNaoOk'
};
if(el(mapaCard[filtroAtivo]))el(mapaCard[filtroAtivo]).classList.add('ativo');
}

function atualizarIndicadores(){
const total=listaCompleta.length;
const exibindo=listaFiltrada.length;
const mau=listaCompleta.filter(r=>normalizar(r.conforme)==='mau uso').length;
const hoje=listaCompleta.filter(r=>valor(r.data).split('T')[0]===hojeISO()).length;
const semana=listaCompleta.filter(r=>{let d=valor(r.data).split('T')[0];return d>=inicioSemanaISO() && d<=hojeISO();}).length;
const mes=listaCompleta.filter(r=>valor(r.data).startsWith(mesISO())).length;
el('iTotal').textContent=total;
el('iExibindo').textContent=exibindo;
el('iMau').textContent=mau;

const opNaoOk=listaCompleta.filter(r=>pegarChecklist(r,'OP Correta')==='Não').length;
const desenhoNaoOk=listaCompleta.filter(r=>pegarChecklist(r,'Desenho Correto')==='Não').length;
if(el('iOpNaoOk'))el('iOpNaoOk').textContent=opNaoOk;
if(el('iDesenhoNaoOk'))el('iDesenhoNaoOk').textContent=desenhoNaoOk;

el('iHoje').textContent=hoje;
el('iMes').textContent=mes;
const termo=el('pesquisa').value.trim();
let nomeFiltro={
todos:'Todos',
hoje:'Hoje',
semana:'Esta semana',
mes:'Este mês',
mau:'Mau uso',
opnok:'OP NÃO OK',
desenhonok:'Desenho NÃO OK'
}[filtroAtivo]||'Todos';
el('resumoBusca').textContent=(termo || filtroAtivo!=='todos') ? ('Mostrando '+exibindo+' de '+total+' registros | Filtro: '+nomeFiltro+(termo?' | Pesquisa: '+termo:'')) : ('Exibindo todos os '+total+' registros.');
el('resumoAutomatico').textContent='Resumo: este mês teve '+mes+' liberações; esta semana '+semana+'; hoje '+hoje+'; mau uso '+mau+'; OP não OK '+opNaoOk+'; desenho não OK '+desenhoNaoOk+'.';
}


function podeAlterar(){
return usuarioLogado === 'Alexandre';
}

function botoesAcao(i){
let html = '<div class="acoes-linha">';
html += '<button class="btn-olho" onclick="visualizar('+i+')">👁 Visualizar</button>';

if(podeAlterar()){
html += '<button class="btn-editar" onclick="editar('+i+')">✏️ Editar</button>';
html += '<button class="btn-excluir" onclick="excluirRegistro('+i+')">🗑 Excluir</button>';
}

html += '</div>';
return html;
}

function renderTabela(){
const tb=el('tb');
tb.innerHTML='';
if(!listaFiltrada.length){
tb.innerHTML='<tr><td class="vazio" colspan="8">Nenhum registro encontrado.</td></tr>';
return;
}
listaFiltrada.forEach((r,i)=>{
let cls=classeResultado(r.conforme);
let linhaExtra=cls==='mau'?'linha-mau':(cls==='nao'?'linha-nao':'');
tb.innerHTML+=`
<tr class="${linhaExtra}">
<td>${escapar(dataBR(r.data))}</td>
<td><b>${escapar(r.op)}</b>${blocoOpDesenho(r)}</td>
<td>${escapar(r.maquina)}</td>
<td>${escapar(r.dispositivo)}</td>
<td><span class="badge ${cls}">${escapar(resultadoVisual(r.conforme))}</span></td>
<td>${escapar(r.operador)}</td>
<td>${escapar(r.responsavel)}</td>
<td>${botoesAcao(i)}</td>
</tr>`;
});
}

function campo(titulo,conteudo,full,htmlLivre){
let valorCampo = conteudo || '-';
return `<div class="campo ${full?'full':''}"><small>${escapar(titulo)}</small><div>${htmlLivre ? valorCampo : escapar(valorCampo)}</div></div>`;
}

function visualizar(indice){
const r=listaFiltrada[indice];
if(!r)return;
let cls=classeResultado(r.conforme);
el('modalBody').innerHTML=`
<div class="detalhes">
${campo('Data',dataBR(r.data))}
${campo('OP',r.op)}
${campo('OP Correta',pegarChecklist(r,'OP Correta'))}
${campo('Desenho Correto',pegarChecklist(r,'Desenho Correto'))}
${campo('Máquina',r.maquina)}
${campo('Dispositivo',r.dispositivo)}
${campo('Serviço',r.servico)}
${campo('Operador',r.operador)}
${campo('Responsável',r.responsavel)}
${campo('Operador Orientado',r.orientado)}
${campo('Observação',limparObservacao(r.obs),true)}
</div>`;
/* Reaplica o badge do resultado sem escapar HTML */
const campos=el('modalBody').querySelectorAll('.campo div');
if(campos[5])campos[5].innerHTML='<span class="badge '+cls+'">'+escapar(r.conforme)+'</span>';
el('modalFundo').style.display='flex';
}

function fecharModal(){el('modalFundo').style.display='none';}
function fecharModalFora(e){if(e.target.id==='modalFundo')fecharModal();}
document.addEventListener('keydown',function(e){
if(e.key==='Escape'){
fecharModal();
fecharEditar();
}
});

let indiceEdicaoAtual=null;

function editar(indice){
if(!podeAlterar()){
alert('Somente Alexandre pode editar registros.');
return;
}
const r=listaFiltrada[indice];
if(!r)return;
indiceEdicaoAtual=indice;

let resultado = resultadoVisual(r.conforme);

el('modalEditarBody').innerHTML=`
<div class="form-edicao">
<div>
<label>Data</label>
<input id="edit_data" type="date" value="${escapar(valor(r.data).split('T')[0])}">
</div>

<div>
<label>OP</label>
<input id="edit_op" value="${escapar(r.op)}">
</div>

<div>
<label>Máquina</label>
<input id="edit_maquina" value="${escapar(r.maquina)}">
</div>

<div>
<label>Dispositivo</label>
<input id="edit_dispositivo" value="${escapar(r.dispositivo)}">
</div>

<div>
<label>Resultado</label>
<select id="edit_conforme">
<option ${resultado==='Liberado'?'selected':''}>Liberado</option>
<option ${resultado==='Não Liberado'?'selected':''}>Não Liberado</option>
<option ${resultado==='Mau Uso'?'selected':''}>Mau Uso</option>
</select>
</div>

<div>
<label>Operador Orientado</label>
<select id="edit_orientado">
<option ${r.orientado==='Sim'?'selected':''}>Sim</option>
<option ${r.orientado==='Não'?'selected':''}>Não</option>
</select>
</div>

<div>
<label>Operador</label>
<input id="edit_operador" value="${escapar(r.operador)}">
</div>

<div>
<label>Responsável</label>
<input id="edit_responsavel" value="${escapar(r.responsavel)}">
</div>

<div class="full">
<label>Observação</label>
<textarea id="edit_obs">${escapar(limparObservacao(r.obs))}</textarea>
</div>

<div class="full">
<button class="btn-salvar-edicao" onclick="salvarEdicao()">💾 Salvar alteração</button>
</div>
</div>
`;

el('modalEditarFundo').style.display='flex';
}

function fecharEditar(){
el('modalEditarFundo').style.display='none';
indiceEdicaoAtual=null;
}

function fecharEditarFora(e){
if(e.target.id==='modalEditarFundo')fecharEditar();
}

async function salvarEdicao(){
if(indiceEdicaoAtual===null)return;

const r=listaFiltrada[indiceEdicaoAtual];
if(!r || !r.id){
alert('Registro sem ID. Não foi possível editar.');
return;
}

let resultadoBanco=el('edit_conforme').value;
if(resultadoBanco==='Liberado')resultadoBanco='Sim';
if(resultadoBanco==='Não Liberado')resultadoBanco='Não';

let obsOriginal=String(r.obs||'');
let checklist='';
let m=obsOriginal.match(/Checklist:\s*[\s\S]*/i);
if(m && m[0])checklist='\n'+m[0];

let obsNova=el('edit_obs').value.trim();
if(obsNova==='-')obsNova='';

const registroAtualizado={
data:el('edit_data').value,
op:el('edit_op').value.trim(),
maquina:el('edit_maquina').value.trim(),
dispositivo:el('edit_dispositivo').value.trim(),
conforme:resultadoBanco,
orientado:el('edit_orientado').value,
operador:el('edit_operador').value.trim(),
responsavel:el('edit_responsavel').value.trim(),
obs:(obsNova ? obsNova : '') + checklist
};

const {error}=await banco
.from('liberacoes')
.update(registroAtualizado)
.eq('id',r.id);

if(error){
alert('Erro ao editar: '+error.message);
return;
}

fecharEditar();
avisar('Registro atualizado com sucesso.','ok');
await carregar();
}

async function excluirRegistro(indice){
if(!podeAlterar()){
alert('Somente Alexandre pode excluir registros.');
return;
}
const r=listaFiltrada[indice];
if(!r || !r.id){
alert('Registro sem ID. Não foi possível excluir.');
return;
}

const resumo='Data: '+dataBR(r.data)+'\nOP: '+valor(r.op)+'\nMáquina: '+valor(r.maquina)+'\nDispositivo: '+valor(r.dispositivo);

if(!confirm('Deseja realmente excluir este registro?\n\n'+resumo+'\n\nEsta ação não poderá ser desfeita.')){
return;
}

if(!confirm('Confirma a exclusão definitiva deste registro?')){
return;
}

const {error}=await banco
.from('liberacoes')
.delete()
.eq('id',r.id);

if(error){
alert('Erro ao excluir: '+error.message);
return;
}

avisar('Registro excluído com sucesso.','ok');
await carregar();
}


function exportarExcel(){
if(!listaFiltrada.length){alert('Não há dados para exportar.');return;}
let linhas=[];
linhas.push(['Data','OP','OP Correta','Desenho Correto','Máquina','Dispositivo','Serviço','Resultado','Operador','Responsável','Orientado','Observação']);
listaFiltrada.forEach(r=>{
linhas.push([
dataBR(r.data),r.op,pegarChecklist(r,'OP Correta'),pegarChecklist(r,'Desenho Correto'),r.maquina,r.dispositivo,r.servico,resultadoVisual(r.conforme),r.operador,r.responsavel,r.orientado,limparObservacao(r.obs)
]);
});
let html='<table border="1"><thead><tr>'+linhas[0].map(c=>'<th>'+escapar(c)+'</th>').join('')+'</tr></thead><tbody>';
linhas.slice(1).forEach(l=>{
html+='<tr>'+l.map(c=>'<td>'+escapar(c)+'</td>').join('')+'</tr>';
});
html+='</tbody></table>';
let blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8;'});
let url=URL.createObjectURL(blob);
let a=document.createElement('a');
a.href=url;
a.download='Historico_Liberacoes_FILTRADO_'+hojeISO()+'.xls';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
avisar('Excel gerado com os registros exibidos.','ok');
}


function avisoPermissao(){
if(!podeAlterar()){
avisar('Modo consulta: somente Alexandre pode editar ou excluir registros.','ok');
}
}

el('pesquisa').addEventListener('input',filtrar);
carregar();
setTimeout(avisoPermissao,800);
</script>
</body>
</html>
