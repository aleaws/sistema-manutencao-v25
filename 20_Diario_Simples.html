<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>20_Diario_Simples</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15);overflow-x:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.ind{font-size:22px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}
.b2{background:#198754}
.b3{background:#fd7e14}
.b4{background:#343a40}
.b5{background:#dc3545}

.msg{
display:none;
padding:8px;
background:#d1e7dd;
color:#0f5132;
border-radius:6px;
margin-top:8px
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th,td{
border:1px solid #ccc;
padding:3px;
font-size:11px;
}

th{
background:#1f4e79;
color:#fff;
}

input,textarea{
width:100%;
box-sizing:border-box;
font-size:11px;
border:none;
padding:3px;
}

.cReg{
min-width:700px;
}

.cNome{
width:80px;
min-width:80px;
max-width:80px;
}
.cExc{
width:35px;
}

@media print{

header,
.card,
button,
#pesquisa{

display:none !important;

}

table{

width:100% !important;

}

body{

background:white;

}

}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="permissoes.js"></script>

</head>

<body>


<header style="position:relative;">

<div style="
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
gap:8px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:30px;
font-weight:bold;
">
🏭 DIÁRIO DE MANUTENÇÃO / PRODUÇÃO

</header>

<div class="container">

<div class="card">

<div class="grid">

<div>
Total
<div class="ind" id="tot">0</div>
</div>

<div>
Hoje
<div class="ind" id="hoje">0</div>
</div>

<div>
Esta Semana
<div class="ind" id="semana">0</div>
</div>

<div>
Este Mês
<div class="ind" id="mes">0</div>
</div>

</div>

</div>

<div class="card">

<div class="grid">

<div>
<label>Pesquisa</label>
<input id="pesquisa" placeholder="Pesquisar...">
</div>

</div>

</div>

<div class="card">

<button class="b1" onclick="novo()">Novo Registro</button>

<button class="b2" onclick="salvarManual()">Salvar</button>

<button class="b3" onclick="exportarExcel()">
📊 Exportar Excel
</button>

<button class="b4" onclick="imprimirTabela()">Imprimir</button>

<div id="msg" class="msg"></div>

</div>

<div class="card">

<table id="tb">

<thead>

<tr>

<th>Data</th>
<th>OP</th>
<th>Equip./Disp.</th>
<th class="cReg" style="width:60%">Registro dos Serviços</th>
<th style="width:120px">Nome</th>
<th class="cExc">X</th>

</tr>

</thead>
<tbody></tbody>

</table>

</div>

</div>

<script>

verificarPermissao(
"20_Diario_Simples.html"
);

function aviso(t){

msg.innerText=t;
msg.style.display='block';

setTimeout(()=>{
msg.style.display='none';
},2500);

}

function novo(d={}){

let r=tb.tBodies[0].insertRow();

r.innerHTML=`



<td>
<input type="date" value="${d.data||''}">
</td>

<td>
<input value="${d.op||''}">
</td>

<td>
<input value="${d.maqdisp||''}">
</td>

<td class="cReg">
<textarea rows="1">${d.registro||''}</textarea>
</td>

<td class="cNome">
<input value="${d.nome||''}">
</td>


<td>
<button class="b5" onclick="excluir(this)" style="padding:2px 6px;font-size:10px">
X
</button>
</td>

`;

r.querySelectorAll("input,textarea").forEach(e=>{

e.oninput=()=>{
salvar();
filtrar();
};

});

renum();
salvar();

}

function excluir(btn){

if(!confirm("Excluir registro?")) return;

btn.closest("tr").remove();

renum();
salvar();

}

function renum(){

indicadores();

}

function dados(){

return [...tb.tBodies[0].rows].map(r=>({

data:r.cells[0].querySelector('input').value,
op:r.cells[1].querySelector('input').value,
maqdisp:r.cells[2].querySelector('input').value,
registro:r.cells[3].querySelector('textarea').value,
nome:r.cells[4].querySelector('input').value

}));

}
function salvar(){

localStorage.setItem(
'diario_simples_v24',
JSON.stringify(dados())
);

indicadores();

}

function salvarManual(){

salvar();

aviso("Dados salvos com sucesso.");

}

function carregar(){

let d=JSON.parse(
localStorage.getItem('diario_simples_v24')||'[]'
);

if(d.length){

d.forEach(x=>novo(x));

}

}

function indicadores(){

let d=dados();

let hojeData=new Date();

let hojeTxt=hojeData.toISOString().split("T")[0];

let semanaAtual=0;
let mesAtual=0;

d.forEach(x=>{

if(!x.data) return;

let data=new Date(x.data);

let diff=
(Math.abs(hojeData-data))/(1000*60*60*24);

if(diff<=7){
semanaAtual++;
}

if(
data.getMonth()==hojeData.getMonth() &&
data.getFullYear()==hojeData.getFullYear()
){
mesAtual++;
}

});

tot.innerText=d.length;

hoje.innerText=
d.filter(x=>x.data==hojeTxt).length;

semana.innerText=semanaAtual;

mes.innerText=mesAtual;

}

function filtrar(){

let txt=
pesquisa.value.toLowerCase();

[...tb.tBodies[0].rows].forEach(r=>{

let data=
r.cells[0].querySelector('input').value.toLowerCase();

let op=
r.cells[1].querySelector('input').value.toLowerCase();

let maq=
r.cells[2].querySelector('input').value.toLowerCase();

let ok=

data.includes(txt) ||
op.includes(txt) ||
maq.includes(txt);

r.style.display=
ok ? '' : 'none';

});

}

function exportarCSV(){

let linhas=[[
"N",
"Data",
"Responsável",
"Registro"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.responsavel,
d.registro
]);

});

let csv=
linhas.map(r=>
r.map(c=>`"${c}"`).join(";")
).join("\n");

let a=document.createElement("a");

a.href=
URL.createObjectURL(
new Blob([csv],{type:"text/csv"})
);

a.download="Diario_Simples.csv";

a.click();

aviso("CSV exportado com sucesso.");

}

function exportarExcel(){

let linhas=[[
"N",
"Data",
"OP",
"Máquina/Dispositivo",
"Registro",
"Nome"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.op,
d.maqdisp,
d.registro,
d.nome
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

ws['!autofilter'] = {
ref:"A1:F1"
};

ws['!freeze'] = {
xSplit:0,
ySplit:1
};

ws['!cols'] = [
{wch:6},
{wch:12},
{wch:12},
{wch:20},
{wch:60},
{wch:20}
];

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Diario"
);

XLSX.writeFile(
wb,
"Diario_Simples.xlsx"
);

aviso("Excel exportado com sucesso.");

}
pesquisa.oninput=filtrar;

carregar();

function imprimirTabela(){

let conteudo=
document.getElementById("tb").outerHTML;

conteudo = conteudo.replace(
'<th class="cExc">X</th>',
''
);

conteudo = conteudo.replaceAll(
/<td>\s*<button class="b5"[\s\S]*?<\/button>\s*<\/td>/g,
''
);

conteudo = conteudo.replace(
'style="width:60%"',
'style="width:75%"'
);

let janela=
window.open("","","width=1000,height=700");

conteudo = conteudo
.replaceAll("<textarea", "<div style='min-height:20px;border:none'")
.replaceAll("</textarea>", "</div>")


janela.document.write(`
<html>
<head>
<title>Diário Simples</title>

<style>

body{
font-family:Arial;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th,td{
border:0.5px solid #000;
padding:3px;
font-size:11px;
}

th:nth-child(1),
td:nth-child(1){
width:55px;
}

th:nth-child(2),
td:nth-child(2){
width:45px;
}

th:nth-child(3),
td:nth-child(3){
width:85px;
}

th:nth-child(4),
td:nth-child(4){
width:calc(100% - 185px);
}

th:nth-child(5),
td:nth-child(5){
display:none;
}

th{
background:#ddd;
}

input{
border:none !important;
width:100% !important;
font-size:11px;
}

textarea{
border:none !important;
width:100% !important;
resize:none;
}

</style>

</head>

<body>

<h2 style="
text-align:center;
margin-bottom:20px;
">
DIÁRIO DE MANUTENÇÃO
</h2>

<div style="
margin-bottom:15px;
font-size:14px;
font-weight:bold;
">
Nome: ______________________________________
</div>

${conteudo}

</body>
</html>
`);

janela.document.close();

janela.print();

}

</script>

</body>
</html>
