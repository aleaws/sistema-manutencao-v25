<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>04_Maquinas</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.ind{font-size:22px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}
.b2{background:#198754}
.b3{background:#fd7e14}
.b4{background:#343a40}
.b5{background:#dc3545}

.msg{display:none;padding:8px;background:#d1e7dd;color:#0f5132;border-radius:6px;margin-top:8px}

table{
width:100%;
table-layout:fixed;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:3px;
font-size:11px;
}

th{
background:#1f4e79;
color:#fff;
}

input{
width:100%;
box-sizing:border-box;
font-size:11px;
border:none;
padding:3px;
}

.c1{width:40px}
.c2{width:120px}
.c3{width:220px}
.c4{width:150px}
.c5{width:auto}
.c6{width:70px}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="permissoes.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>




<header style="position:relative;">

<div style="
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
gap:8px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:30px;
font-weight:bold;
">
🏭 CADASTRO DE MÁQUINAS
</span>

</header>

<div class="container">

<div class="card">
<div class="grid">

<div>
Total de Máquinas
<div class="ind" id="tot">0</div>
</div>

</div>
</div>

<div class="card">

<div class="grid">

<div>
<label>Pesquisa</label>
<input id="pesquisa" placeholder="Pesquisar...">
</div>

</div>

</div>

<div class="card">

<button id="btNovaMaquina" class="b1" onclick="novaMaquina()">Nova Máquina</button>

<button id="btSalvarMaquina" class="b2" onclick="salvarManual()">Salvar</button>

<button
id="btSupabase"
class="b2"
onclick="enviarParaSupabase()"
style="display:none;">
📤 Enviar para Supabase
</button>

<button id="btDuplicados" class="b3" onclick="verificarDuplicados()">
🔍 Verificar Duplicados
</button>

<button class="b3" onclick="exportarExcel()">📊 Exportar Excel</button>

<button class="b4" onclick="window.print()">Imprimir</button>

<div id="msg" class="msg"></div>

</div>

<div class="card">

<table id="tb">

<thead>
<tr>
<th class="c1">Nº</th>
<th class="c2">Código</th>
<th class="c3">Máquina</th>
<th class="c4">Setor</th>
<th style="width:40%">Observação</th>
<th style="width:30px">QR</th>
<th style="width:30px">Excluir</th></tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const SUPABASE_URL = 'https://wzcrqzbwcsmfwenzcxkf.supabase.co';

const SUPABASE_KEY = 'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';

const bancoSupabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

if(typeof registrarLog !== "function"){

function registrarLog(acao){

let logs =
JSON.parse(
localStorage.getItem("logs_auditoria") || "[]"
);

logs.unshift({
data:new Date().toLocaleString(),
usuario:localStorage.getItem("usuarioLogado") || "Sistema",
acao:acao
});

localStorage.setItem(
"logs_auditoria",
JSON.stringify(logs)
);

}

}

async function testeSupabase() {

    const { data, error } = await bancoSupabase
        .from('maquinas')
        .select('*');

    console.log('DADOS DO SUPABASE:', data);

    if (error) {
        console.error(error);
    }
}

testeSupabase();

verificarPermissao(
"04_Maquinas.html"
);

let usuarioLogado =
localStorage.getItem(
"usuarioLogado"
);

if(

usuarioLogado !== "Alexandre" &&

usuarioLogado !== "Diretoria" &&

usuarioLogado !== "PCP" &&

usuarioLogado !== "Engenharia"

){

alert(
"Acesso negado"
);

window.location.href =
"index.html";

}

if(
usuarioLogado==="PCP" ||
usuarioLogado==="Engenharia"
){

btNovaMaquina.style.display =
"none";

btSalvarMaquina.style.display =
"none";

btDuplicados.style.display =
"none";

}

if(usuarioLogado==="Alexandre"){

    btSupabase.style.display = "inline-block";

}

function aviso(t){
msg.innerText=t;
msg.style.display='block';
setTimeout(()=>msg.style.display='none',2500);
}

function novaMaquina(){

registrarLog(
"Criou máquina"
);

novo();

}

function gerarQR(botao){

const linha =
botao.parentNode.parentNode;

const maquina =
linha.cells[2]
.querySelector('input')
.value;

window.open(
'31_QR_Registro.html?id=' + maquina,
'_blank'
);

}

function novo(d={}){
let r=tb.tBodies[0].insertRow();

r.innerHTML=`
<td></td>

<td>
<input value="${d.codigo||''}">
</td>

<td>
<input value="${d.maquina||''}">
</td>

<td>
<input value="${d.setor||''}">
</td>

<td>
<input value="${d.obs||''}">
</td>

<td>

<button
class="b2"
onclick="gerarQR(this)"
>
QR
</button>

</td>

<td>

<button
class="b5"
onclick="excluir(this)"
style="
display:
${
usuarioLogado==="Alexandre"
? "inline-block"
: "none"
};
">
X
</button>

</td>
`;

r.querySelectorAll("input").forEach(e=>{
e.oninput=()=>{

let maquina =
r.cells[2].querySelector('input')
.value
.trim()
.toLowerCase();

let repetidas = 0;

[...tb.tBodies[0].rows].forEach(l=>{

let nome =
l.cells[2].querySelector('input')
.value
.trim()
.toLowerCase();

if(nome && nome===maquina){
repetidas++;
}

});

if(repetidas>1){

alert("⚠ Máquina já cadastrada.");

r.cells[2].querySelector('input').value='';

return;

}

salvar();
filtrar();

};
});

if(
usuarioLogado==="PCP" ||
usuarioLogado==="Engenharia"
){

r.querySelectorAll("input").forEach(e=>{

e.disabled = true;

});

}

renum();

}

function excluir(btn){

let usuario =
localStorage.getItem(
"usuarioLogado"
);

if(
usuario !== "Alexandre"
){

registrarLog(
"Tentou excluir máquina"
);

alert(
"Somente Alexandre pode excluir máquinas."
);

return;

}

if(!confirm("Excluir máquina?")) return;

registrarLog(
"Excluiu máquina"
);

btn.closest("tr").remove();

renum();
salvar();

enviarParaSupabase();

}
function renum(){

[...tb.tBodies[0].rows].forEach((r,i)=>{
r.cells[0].innerText=i+1;
});

indicadores();

}

function dados(){

return [...tb.tBodies[0].rows].map(r=>({

codigo:r.cells[1].querySelector('input').value,
maquina:r.cells[2].querySelector('input').value,
setor:r.cells[3].querySelector('input').value,
obs:r.cells[4].querySelector('input').value

}));

}

function salvar(){

localStorage.setItem(
'cadastro_maquinas_v24',
JSON.stringify(dados())
);

indicadores();

}

async function salvarManual(){

salvar();

await enviarSupabase();

aviso("Dados salvos com sucesso.");

}

async function enviarSupabase(){

const registros = dados();

await bancoSupabase
.from('maquinas')
.delete()
.neq('id',0);

const { error } =
await bancoSupabase
.from('maquinas')
.insert(registros);

if(error){

console.error(error);

alert('Erro ao enviar para base');

return;

}

}

async function carregar(){

tb.tBodies[0].innerHTML = '';

const { data, error } =
await bancoSupabase
.from('maquinas')
.select('*');

if(
!error &&
data &&
data.length > 0
){

data.sort((a,b)=>
(a.codigo||'').localeCompare(
(b.codigo||''),
undefined,
{numeric:true}
)
);

data.forEach(x=>novo(x));

}
else
{

let local = JSON.parse(
localStorage.getItem(
'cadastro_maquinas_v24'
) || '[]'
);

local.sort((a,b)=>
(a.codigo||'').localeCompare(
(b.codigo||''),
undefined,
{numeric:true}
)
);

local.forEach(x=>novo(x));

}

indicadores();

}

function indicadores(){

tot.innerText=dados().length;

}

function filtrar(){

let txt=
pesquisa.value.toLowerCase().trim();

[...tb.tBodies[0].rows].forEach(r=>{

let codigo =
r.cells[1].querySelector('input')
.value.toLowerCase();

let maquina =
r.cells[2].querySelector('input')
.value.toLowerCase();

let setor =
r.cells[3].querySelector('input')
.value.toLowerCase();

let obs =
r.cells[4].querySelector('input')
.value.toLowerCase();

let ok = false;

if(!txt){

    ok = true;

}else{

    ok =
    codigo === txt ||
    maquina.includes(txt) ||
    setor.includes(txt) ||
    obs.includes(txt);

}

r.style.display = ok ? '' : '';

if(!ok){
    r.style.display = 'none';
}

});

}
function exportarCSV(){

let linhas=[[
"N",
"Codigo",
"Maquina",
"Setor",
"Observacao"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.codigo,
d.maquina,
d.setor,
d.obs
]);

});

let csv=
linhas.map(r=>
r.map(c=>`"${c}"`).join(";")
).join("\n");

let a=document.createElement("a");

a.href=URL.createObjectURL(
new Blob([csv],{type:"text/csv"})
);

a.download="Cadastro_Maquinas.csv";

a.click();

aviso("CSV exportado com sucesso.");

}

function exportarExcel(){

let linhas=[[
"N",
"Codigo",
"Maquina",
"Setor",
"Observacao"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.codigo,
d.maquina,
d.setor,
d.obs
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

ws['!autofilter'] = {
ref:"A1:E1"
};

ws['!cols'] = [
{wch:6},
{wch:15},
{wch:30},
{wch:20},
{wch:50}
];

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Maquinas"
);

XLSX.writeFile(
wb,
"Cadastro_Maquinas.xlsx"
);

aviso("Excel exportado com sucesso.");

}

function verificarDuplicados(){

let lista = {};

let repetidos = [];

dados().forEach(x=>{

let nome =
(x.maquina||'')
.trim()
.toLowerCase();

if(!nome) return;

if(lista[nome]){

if(!repetidos.includes(x.maquina)){
repetidos.push(x.maquina);
}

}else{

lista[nome]=true;

}

});

if(repetidos.length){

alert(
"⚠ Máquinas duplicadas:\n\n" +
repetidos.join("\n")
);

}else{

alert(
"✅ Nenhuma máquina duplicada encontrada."
);

}

}

async function enviarParaSupabase(){

if(
!confirm(
'Sincronizar máquinas com o Supabase?'
)
){
    return;
}

const lista = JSON.parse(
localStorage.getItem('cadastro_maquinas_v24') || '[]'
);

const { error: erroDelete } =
await bancoSupabase
.from('maquinas')
.delete()
.neq('id',0);

if(erroDelete){

    console.error(erroDelete);

    alert(
    'Erro ao limpar tabela'
    );

    return;

}

const { error } =
await bancoSupabase
.from('maquinas')
.insert(lista);

if(error){

    console.error(error);

    alert(
    'Erro ao enviar'
    );

    return;

}

alert(
lista.length +
' máquinas sincronizadas com sucesso'
);

}

pesquisa.oninput=filtrar;

carregar();

</script>

</body>
</html>
