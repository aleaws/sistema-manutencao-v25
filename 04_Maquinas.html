r.cells[3].querySelector('input')

let importacaoMaquinasPreview = [];

function normalizarCabecalho(txt){
return String(txt||'')
.normalize('NFD')
.replace(/[\u0300-\u036f]/g,'')
.toLowerCase()
.replace(/[^a-z0-9]/g,'');
}

function valorImportado(row, mapa, nomes){
for(let nome of nomes){
let idx = mapa[normalizarCabecalho(nome)];
if(idx !== undefined){
let v = row[idx];
if(v !== undefined && v !== null) return String(v).trim();
}
}
return '';
}

function formatarDataImportacao(v){
if(!v)return '';
if(typeof v === 'number'){
try{
let d = XLSX.SSF.parse_date_code(v);
if(d && d.y){
return String(d.d).padStart(2,'0')+'/'+String(d.m).padStart(2,'0')+'/'+d.y;
}
}catch(e){}
}
let s = String(v).trim();
return s;
}

function detectarCabecalho(linhas){
for(let i=0;i<Math.min(linhas.length,20);i++){
let normalizados = (linhas[i]||[]).map(normalizarCabecalho);
let temEquipamento = normalizados.includes('equipamento') || normalizados.includes('maquina') || normalizados.includes('maquinas');
let temCodigo = normalizados.includes('codificacao') || normalizados.includes('codigo') || normalizados.includes('cod');
if(temEquipamento && temCodigo) return i;
}
return 0;
}

function lerImportacaoMaquinas(input){
let arquivo = input.files && input.files[0];
if(!arquivo)return;

let leitor = new FileReader();

leitor.onload = function(e){
try{
let dadosArquivo = new Uint8Array(e.target.result);
let wb = XLSX.read(dadosArquivo,{type:'array',cellDates:false});
let aba = wb.Sheets[wb.SheetNames[0]];
let linhas = XLSX.utils.sheet_to_json(aba,{header:1,defval:''});

if(!linhas.length){
alert('Planilha vazia.');
input.value='';
return;
}

let headerIndex = detectarCabecalho(linhas);
let cabecalho = linhas[headerIndex] || [];
let mapa = {};

cabecalho.forEach((h,i)=>{
let chave = normalizarCabecalho(h);
if(chave) mapa[chave]=i;
});

let existentes = dados().map(x=>({
codigo:String(x.codigo||'').trim().toLowerCase(),
maquina:String(x.maquina||'').trim().toLowerCase()
}));

let vistosImportacao = {};
let preview = [];

for(let i=headerIndex+1;i<linhas.length;i++){
let row = linhas[i] || [];

let codigo = valorImportado(row,mapa,['CODIFICAÇÃO','CODIFICACAO','Código','Codigo','COD']);
let maquina = valorImportado(row,mapa,['EQUIPAMENTO','Máquina','Maquina','MAQUINA']);
let setor = valorImportado(row,mapa,['LOCALIZAÇÃO','LOCALIZACAO','Setor','Local','Localização']);
let fabricante = valorImportado(row,mapa,['FABRICANTE']);
let modelo = valorImportado(row,mapa,['MODELO']);
let capacidade = valorImportado(row,mapa,['CAPACIDADE']);
let serie = valorImportado(row,mapa,['NÚMERO DE SÉRIE','NUMERO DE SERIE','Nº SÉRIE','N SERIE','SERIE']);
let dataAquisicao = formatarDataImportacao(valorImportado(row,mapa,['DATA DE AQUISIÇÃO','DATA AQUISICAO','AQUISIÇÃO','AQUISICAO']));
let obsPlanilha = valorImportado(row,mapa,['OBS','OBSERVAÇÃO','OBSERVACAO']);

let temAlgumDado = row.some(c=>String(c||'').trim()!=='');
if(!temAlgumDado) continue;

let obsPartes = [];
if(obsPlanilha) obsPartes.push(obsPlanilha);
if(fabricante) obsPartes.push(fabricante);
if(modelo) obsPartes.push(modelo);
if(capacidade) obsPartes.push(capacidade);
if(serie) obsPartes.push('Série: '+serie);
if(dataAquisicao) obsPartes.push('Aquisição: '+dataAquisicao);

let registro = {
linha:i+1,
codigo:codigo,
maquina:maquina,
setor:setor,
obs:obsPartes.join(' | ')
};

let chaveCodigo = String(codigo||'').trim().toLowerCase();
let chaveMaquina = String(maquina||'').trim().toLowerCase();

let existe = existentes.some(x=>
(chaveCodigo && x.codigo===chaveCodigo) ||
(chaveMaquina && x.maquina===chaveMaquina)
);

let chaveImport = (chaveCodigo || chaveMaquina || ('linha'+i));
let duplicadaNaImportacao = vistosImportacao[chaveImport];
vistosImportacao[chaveImport]=true;

registro.valido = !!maquina && !existe && !duplicadaNaImportacao;
registro.statusImportacao = !maquina
? 'Inválida: sem máquina/equipamento'
: existe
? 'Duplicada: já cadastrada'
: duplicadaNaImportacao
? 'Duplicada na planilha'
: 'Válida';

preview.push(registro);
}

importacaoMaquinasPreview = preview;
renderPreviewImportacaoMaquinas();
input.value='';

}catch(err){
console.error(err);
alert('Erro ao ler planilha: '+err.message);
input.value='';
}
};

leitor.readAsArrayBuffer(arquivo);
}

function renderPreviewImportacaoMaquinas(){
let total = importacaoMaquinasPreview.length;
let validas = importacaoMaquinasPreview.filter(x=>x.valido).length;
let duplicadas = importacaoMaquinasPreview.filter(x=>String(x.statusImportacao).includes('Duplicada')).length;
let invalidas = importacaoMaquinasPreview.filter(x=>String(x.statusImportacao).includes('Inválida')).length;

resumoImportMaquinas.innerHTML = `
<div><b>${total}</b>Linhas lidas</div>
<div><b>${validas}</b>Válidas</div>
<div><b>${duplicadas}</b>Duplicadas</div>
<div><b>${invalidas}</b>Inválidas</div>
`;

let html = `
<table>
<thead>
<tr>
<th>Linha</th>
<th>Código</th>
<th>Máquina</th>
<th>Setor</th>
<th>Observação</th>
<th>Status</th>
</tr>
</thead>
<tbody>
`;

importacaoMaquinasPreview.forEach(x=>{
let classe = x.valido ? '' : (String(x.statusImportacao).includes('Duplicada') ? 'linha-duplicada' : 'linha-erro');
html += `
<tr class="${classe}">
<td>${x.linha}</td>
<td>${x.codigo||''}</td>
<td>${x.maquina||''}</td>
<td>${x.setor||''}</td>
<td>${x.obs||''}</td>
<td>${x.statusImportacao}</td>
</tr>
`;
});

html += '</tbody></table>';

tabelaPreviewImportMaquinas.innerHTML = html;
btnConfirmarImportMaquinas.innerText = '✔ Importar '+validas+' máquinas válidas';
btnConfirmarImportMaquinas.disabled = validas === 0;
previewImportMaquinas.style.display = 'flex';
}

function fecharPreviewImportacao(){
previewImportMaquinas.style.display='none';
}

async function confirmarImportacaoMaquinas(){
let validas = importacaoMaquinasPreview.filter(x=>x.valido);

if(!validas.length){
alert('Não existem máquinas válidas para importar.');
return;
}

if(!confirm('Importar '+validas.length+' máquinas para o cadastro?'))return;

validas.forEach(x=>{
novo({
codigo:x.codigo,
maquina:x.maquina,
setor:x.setor,
obs:x.obs
});
});

salvar();

await enviarSupabase();

registrarLog('Importou '+validas.length+' máquinas por planilha');

fecharPreviewImportacao();

aviso(validas.length+' máquinas importadas com sucesso.');

carregar();
}

pesquisa.oninput=filtrar;

carregar();

</script>
