<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Visão Geral</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:0;
}

header{
background:#1f4e79;
color:white;
padding:12px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:10px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 1px 4px rgba(0,0,0,.15);
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

.indicador{
text-align:center;
padding:15px;
background:#fff;
border-radius:8px;
box-shadow:0 1px 4px rgba(0,0,0,.15);
}

.valor{
font-size:32px;
font-weight:bold;
color:#1f4e79;
}

.titulo{
font-size:14px;
margin-top:5px;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
color:white;
background:#198754;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="permissoes.js"></script>

</head>

<body>

<header>

<header style="position:relative;">

<div style="
display:flex;
justify-content:flex-start;
align-items:flex-start;
gap:20px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:28px;
font-weight:bold;
">
📊 VISÃO GERAL
</span>

</header>

</header>

<div class="container">



<div class="grid">

<div class="indicador">
<div class="valor" id="maq">0</div>
<div class="titulo">Máquinas</div>
</div>

<div class="indicador">
<div class="valor" id="disp">0</div>
<div class="titulo">Dispositivos</div>
</div>

<div class="indicador">
<div class="valor" id="os">0</div>
<div class="titulo">OS Abertas</div>
</div>

<div class="indicador">
<div class="valor" id="nc">0</div>
<div class="titulo">NC Abertas</div>
</div>

<div class="indicador">
<div class="valor" id="lub">0</div>
<div class="titulo">Lubrificações Vencidas</div>
</div>

<div class="indicador">
<div class="valor" id="mel">0</div>
<div class="titulo">Melhorias Implantadas</div>
</div>

<div class="indicador">
<div class="valor" id="prio">0</div>
<div class="titulo">Prioridades</div>
</div>

<div class="indicador">
<div class="valor" id="lib">0%</div>
<div class="titulo">Liberações Conforme</div>
</div>

</div>

</div>

<div class="card">

<h3>📈 Gráfico Geral da Manutenção</h3>

<canvas id="graficoGeral" height="120"></canvas>

</div>

<script>

verificarPermissao(
"23_Visao_Geral.html"
);

function ler(chave){

try{

return JSON.parse(
localStorage.getItem(chave)||"[]"
);

}catch{

return [];

}

}

function atualizar(){

let maquinas=
ler("cadastro_maquinas_v24");

let dispositivos=
ler("cadastro_dispositivos_v24");

let manutencao=
ler("manutencao_v24");

let ncDados=
ler("nao_conformidades_v24");

let lubDados=
ler("lubrificacao_v24");

let melhorias=
ler("melhorias_v24");

let prioridades=
ler("planejamento_prioridades");

let liberacoes=
ler("liberacoes_v24");

maq.innerText=
maquinas.length;

disp.innerText=
dispositivos.length;

os.innerText=
manutencao.filter(x=>
x.status=="Aberta" ||
x.status=="Em Andamento"
).length;

nc.innerText=
ncDados.filter(x=>
x.status=="Aberta" ||
x.status=="Em Andamento"
).length;

let hoje=new Date();
hoje.setHours(0,0,0,0);

let vencidas=0;

lubDados.forEach(x=>{

if(!x.proxima) return;

let d=new Date(x.proxima);

d.setHours(0,0,0,0);

if(d<hoje){
vencidas++;
}

});

lub.innerText=vencidas;

mel.innerText=
melhorias.filter(x=>
x.status=="Implantada"
).length;

prio.innerText=
prioridades.length;

let conforme=
liberacoes.filter(x=>
x.conforme=="Sim"
).length;

let percentual=
liberacoes.length
? Math.round((conforme/liberacoes.length)*100)
: 0;

lib.innerText=
percentual + "%";

let ctx =
document.getElementById("graficoGeral");

if(window.graficoManutencao){
window.graficoManutencao.destroy();
}

window.graficoManutencao =
new Chart(ctx,{
type:'bar',
data:{
labels:[
'OS',
'NC',
'Lub',
'Melhorias',
'Prioridades'
],
datasets:[{
label:'Quantidade',
data:[
os.innerText,
nc.innerText,
lub.innerText,
mel.innerText,
prio.innerText
],
backgroundColor:[
'#dc3545',
'#fd7e14',
'#ffc107',
'#198754',
'#0d6efd'
],
borderWidth:1
}]},
options:{
responsive:true,
maintainAspectRatio:true,
aspectRatio:6,

plugins:{
legend:{
display:false
}
}
}});

}

atualizar();


</script>

</body>
</html>
