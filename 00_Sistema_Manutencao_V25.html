<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>00_Sistema_Manutencao_V25</title>
  <script>
    (function () {
      const usuario = localStorage.getItem('usuarioLogado');
      if (!usuario) {
        window.location.replace('index.html');
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --azul-900: #163b5c;
      --azul-700: #1f5f93;
      --azul-500: #4f93c8;
      --cinza-950: #17202a;
      --cinza-700: #4b5563;
      --cinza-200: #e5e7eb;
      --cinza-100: #f3f4f6;
      --branco: #fff;
      --raio: 8px;
      --sombra: 0 10px 26px rgba(17, 24, 39, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--cinza-950);
      background: #f5f7fa;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
      gap: 16px;
      align-items: center;
      padding: 12px 18px;
      color: var(--branco);
      background: var(--azul-700);
      box-shadow: 0 4px 16px rgba(15, 23, 42, .18);
    }

    input {
      width: min(360px, 100%);
      min-height: 40px;
      padding: 9px 12px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: var(--raio);
      color: var(--branco);
      background: rgba(255,255,255,.14);
      outline: none;
    }

    input::placeholder { color: rgba(255,255,255,.86); }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: var(--raio);
      color: var(--azul-900);
      background: var(--branco);
    }

    .user-area {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 38px;
      padding: 9px 12px;
      border-radius: var(--raio);
      color: var(--azul-900);
      background: var(--branco);
      font-weight: 700;
    }

    button {
      min-height: 38px;
      padding: 9px 12px;
      border: 0;
      border-radius: var(--raio);
      cursor: pointer;
      color: var(--branco);
      background: var(--azul-900);
      font-weight: 800;
    }

    main {
      width: min(1260px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .indicador {
      min-height: 84px;
      padding: 12px;
      border: 1px solid var(--cinza-200);
      border-left: 5px solid var(--azul-500);
      border-radius: var(--raio);
      background: var(--branco);
      box-shadow: 0 5px 15px rgba(17, 24, 39, .06);
    }

    .indicador strong {
      display: block;
      color: var(--azul-900);
      font-size: 24px;
    }

    .indicador span {
      display: block;
      margin-top: 8px;
      color: var(--cinza-700);
      font-size: 13px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
      gap: 12px;
    }

    .card {
      min-height: 96px;
      padding: 14px;
      border: 1px solid var(--cinza-200);
      border-radius: var(--raio);
      color: var(--cinza-950);
      background: var(--branco);
      box-shadow: 0 5px 18px rgba(17, 24, 39, .07);
      text-align: left;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      box-shadow: var(--sombra);
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icone {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: var(--raio);
      background: #eaf2f9;
      font-size: 19px;
    }

    .titulo {
      font-size: 14px;
      line-height: 1.25;
      font-weight: 800;
    }

    .info {
      margin-top: 12px;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
    }

    footer {
      padding: 18px 12px 24px;
      color: #6b7280;
      text-align: center;
      font-size: 12px;
    }

    @media (max-width: 860px) {
      header { grid-template-columns: 1fr; }
      .brand { justify-content: flex-start; font-size: 19px; }
      .user-area { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <input id="pesquisa" type="search" placeholder="🔎 Pesquisa global">
    <div class="brand">
      <span class="brand-mark">🏭</span>
      <span>Sistema de Manutenção V25</span>
    </div>
    <div class="user-area">
      <span id="usuarioAtual" class="pill">👤 Usuário</span>
      <button type="button" onclick="sair()">Sair</button>
    </div>
  </header>

  <main>
    <section class="dashboard">
      <div class="indicador"><strong id="iMaquinas">0</strong><span>Máquinas</span></div>
      <div class="indicador"><strong id="iDispositivos">0</strong><span>Dispositivos</span></div>
      <div class="indicador"><strong id="iOSAbertas">0</strong><span>OS abertas</span></div>
      <div class="indicador"><strong id="iOSCriticas">0</strong><span>OS críticas</span></div>
      <div class="indicador"><strong id="iLiberacoes">0</strong><span>Inspeções / Liberações</span></div>

    </section>

    <section id="menu" class="grid"></section>
  </main>

  <footer>
    Sistema de Manutenção<br>
    Desenvolvido por Alexandre Willian
  </footer>

  
  <script>
    const SUPABASE_URL='https://wzcrqzbwcsmfwenzcxkf.supabase.co';
    const SUPABASE_KEY='sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';
    const bancoSupabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

    const MODULOS = [
      { id: 'cardManutencao', icone: '🔧', titulo: 'Manutenção das Máquinas', info: 'OS de máquinas', arquivo: '03_Manutencao.html' },
      { id: 'cardOSDispositivos', icone: '🛠', titulo: 'Manutenção dos Dispositivos', info: 'OS de dispositivos', arquivo: '07_OS_Dispositivos.html' },
      { id: 'cardMaquinas', icone: '🏭', titulo: 'Cadastro de Máquinas', info: 'Máquinas cadastradas', arquivo: '04_Maquinas.html' },
      { id: 'cardDispositivos', icone: '⚙️', titulo: 'Cadastro de Dispositivos', info: 'Dispositivos cadastrados', arquivo: '05_Dispositivos.html' },
      { id: 'cardOrdemServico', icone: '📋', titulo: 'Ordem de Serviço Geral', info: 'Cadastrar • Editar • Imprimir', arquivo: '23_Ordem_Servico_Geral.html' },
      { id: 'cardGestao', icone: '📈', titulo: 'Gestão da Manutenção', info: 'Indicadores • Rankings • OS', arquivo: '25_Gestao_Manutencao.html' },
      { id: 'cardLiberacoes', icone: '🧮', titulo: 'Inspeção e Liberação', info: 'Cadastro único', arquivo: '10_Liberacoes_Mobile.html' },
      { id: 'cardHistoricoOS', icone: '📜', titulo: 'Histórico das OS', info: 'Linha do tempo • Excel', arquivo: '26_Historico_Ordens_Servico.html' },
      { id: 'cardHistoricoLib', icone: '📋', titulo: 'Histórico de Liberações', info: 'Pesquisa • Detalhes • Excel', arquivo: '11_Historico_Liberacoes.html' },
                  { id: 'cardLubrificacao', icone: '🛢', titulo: 'Lubrificação', info: 'Planos e vencimentos', arquivo: '19_Lubrificacao.html' },
      { id: 'cardFerramentas', icone: '🧰', titulo: 'Ferramentas e Materiais', info: 'Controle de itens', arquivo: '22_Ferramentas_Materiais.html' },
      { id: 'cardIndicadores', icone: '📊', titulo: 'Indicadores', info: 'Painel geral', arquivo: '15_Indicadores.html' },
      { id: 'cardEngenharia', icone: '📐', titulo: 'Engenharia', info: 'Projetos • Melhorias • Ações', arquivo: '26_Engenharia_Projetos_Melhorias.html' },
      { id: 'cardPCP', icone: '📅', titulo: 'PCP', info: 'Programação • Materiais • Entregas', arquivo: '27_PCP_Programacao_Controle.html' },
      { id: 'cardBackup', icone: '💾', titulo: 'Backup Geral', info: 'Exportações e segurança', arquivo: '99_Backup_Geral.html' }
    ];

    const PERMISSOES = {
      Alexandre: MODULOS.map(m => m.id),
      Diretoria: MODULOS.map(m => m.id).filter(id => id !== 'cardLiberacoes'),
      PCP: ['cardMaquinas','cardDispositivos','cardPCP'],
      Engenharia: ['cardMaquinas','cardDispositivos','cardEngenharia'],
      Produção: ['cardOrdemServico', 'cardHistoricoOS']
    };

    const usuarioLogado = localStorage.getItem('usuarioLogado');

    if (!usuarioLogado) {
      window.location.replace('index.html');
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('usuarioAtual').textContent = '👤 ' + usuarioLogado;
      renderizarMenu();
      atualizarDashboard();
      document.getElementById('pesquisa').addEventListener('input', renderizarMenu);
    });

    function renderizarMenu() {
      const menu = document.getElementById('menu');
      const pesquisa = normalizar(document.getElementById('pesquisa').value);
      const permitidos = PERMISSOES[usuarioLogado];
      menu.textContent = '';

      MODULOS.filter(function (modulo) {
        const autorizado = !permitidos || permitidos.includes(modulo.id);
        const encontrado = !pesquisa || normalizar(modulo.titulo + ' ' + modulo.info).includes(pesquisa);
        return autorizado && encontrado;
      }).forEach(function (modulo) {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.id = modulo.id;
        card.onclick = function () { window.location.href = modulo.arquivo; };
        card.innerHTML =
          '<div class="card-top"><div class="icone">' + modulo.icone + '</div><div class="titulo">' + modulo.titulo + '</div></div>' +
          '<div class="info" id="info_' + modulo.id + '">' + modulo.info + '</div>';
        menu.appendChild(card);
      });
    }

    async function buscar(tabela) {
      try {
        const { data, error } = await bancoSupabase.from(tabela).select('*');
        if (error) {
          console.warn(tabela, error.message);
          return [];
        }
        return data || [];
      } catch (e) {
        console.warn(tabela, e);
        return [];
      }
    }

    function isAberta(status) {
      return status !== 'Concluída' && status !== 'Concluida' && status !== 'Cancelada';
    }

    function resultadoLiberacaoNaoOk(r) {
      const texto = normalizar([r.resultado, r.conforme, r.op_correta, r.desenho_correto, r.obs].join(' '));
      return texto.includes('nao') || texto.includes('não') || texto.includes('mau');
    }

    async function atualizarDashboard() {
      const maquinas = await buscar('maquinas');
      const dispositivos = await buscar('dispositivos');
      const ordens = await buscar('ordens_servico');
      const manutencao = await buscar('manutencao');
      const liberacoes = await buscar('liberacoes');

      const osAbertas = ordens.filter(o => isAberta(o.status)).length;
      const osCriticas = ordens.filter(o => o.prioridade === 'Crítica' && isAberta(o.status)).length;

      document.getElementById('iMaquinas').textContent = maquinas.length;
      document.getElementById('iDispositivos').textContent = dispositivos.length;
      document.getElementById('iOSAbertas').textContent = osAbertas;
      document.getElementById('iOSCriticas').textContent = osCriticas;
      document.getElementById('iLiberacoes').textContent = liberacoes.length;

      const setInfo = (id, texto) => {
        const e = document.getElementById('info_' + id);
        if (e) e.textContent = texto;
      };

      setInfo('cardMaquinas', maquinas.length + ' cadastradas');
      setInfo('cardDispositivos', dispositivos.length + ' cadastrados');
      setInfo('cardOrdemServico', osAbertas + ' abertas • ' + osCriticas + ' críticas');
      setInfo('cardGestao', 'Total de OS: ' + ordens.length);
      setInfo('cardLiberacoes', liberacoes.length + ' registros');
      setInfo('cardHistoricoOS', ordens.length + ' registros');
      setInfo('cardHistoricoLib', liberacoes.length + ' registros');
      setInfo('cardManutencao', manutencao.filter(x => x.tipo === 'Máquina' && isAberta(x.status)).length + ' abertas');
      setInfo('cardOSDispositivos', manutencao.filter(x => x.tipo === 'Dispositivo' && isAberta(x.status)).length + ' abertas');
    }

    function normalizar(texto) {
      return String(texto || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
    }

    function sair() {
      localStorage.removeItem('usuarioLogado');
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
