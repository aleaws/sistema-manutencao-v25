<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>21_Diario_Inspecao</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.ind{font-size:22px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}
.b2{background:#198754}
.b3{background:#fd7e14}
.b4{background:#343a40}
.b5{background:#dc3545}

.msg{display:none;padding:8px;background:#d1e7dd;color:#0f5132;border-radius:6px;margin-top:8px}

table{
width:100%;
border-collapse:collapse;
table-layout:auto;
}

th,td{
border:1px solid #ccc;
padding:3px;
font-size:11px;
}

th{
background:#1f4e79;
color:#fff;
}

input,select,textarea{
width:100%;
box-sizing:border-box;
font-size:11px;
border:none;
padding:3px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="permissoes.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>


<header style="position:relative;">

<div style="
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
gap:8px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:30px;
font-weight:bold;
">
📋 DIÁRIO DE INSPEÇÃO

</header>

<div class="container">

<div class="card">
<div class="grid">

<div>Total<div class="ind" id="tot">0</div></div>
<div>Críticas<div class="ind" id="crit">0</div></div>
<div>Manutenções<div class="ind" id="man">0</div></div>
<div>Inspeções<div class="ind" id="insp">0</div></div>
<div>Mau Uso<div class="ind" id="mau">0</div></div>

</div>
</div>

<div class="card">

<div class="grid">

<div>
<label>Busca OP</label>
<input id="buscaOP">
</div>

<div>
<label>Pesquisa Geral</label>
<input id="pesquisa">
</div>

<div>
<label>Prioridade</label>
<select id="fPrioridade">
<option value="">Todas</option>
<option>Crítica</option>
<option>Alta</option>
<option>Normal</option>
<option>Baixa</option>
</select>
</div>

</div>

</div>

<div class="card">

<button class="b1" onclick="novo()">Novo Registro</button>

<button class="b2" onclick="salvarManual()">Salvar</button>

<button
id="btSupabase"
class="b2"
onclick="enviarParaSupabase()"
style="display:none;">
📤 Enviar para Supabase
</button>

<button class="b3" onclick="exportarExcel()">
📊 Exportar Excel
</button>

<button class="b4" onclick="imprimirTabela()">
🖨️ Imprimir
</button>

<div id="msg" class="msg"></div>

</div>
<div class="card">

<table id="tb">

<thead>

<tr>

<th>Nº</th>
<th>Data</th>
<th>Prioridade</th>
<th>OP</th>
<th>Produto</th>
<th>Máquina</th>
<th>Dispositivo</th>
<th>Tipo</th>
<th>Origem</th>
<th>Solicitante</th>
<th>Operador</th>
<th>Mau Uso</th>
<th class="cObs">Serviço Executado</th>
<th class="cExc">X</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const SUPABASE_URL = 'https://wzcrqzbwcsmfwenzcxkf.supabase.co';

const SUPABASE_KEY = 'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';

const bancoSupabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

verificarPermissao(
"21_Diario_Inspecao.html"
);

let usuarioLogado =
localStorage.getItem(
"usuarioLogado"
);

if(usuarioLogado==="Alexandre"){

    btSupabase.style.display =
    "inline-block";

}

const tipos=[
"Manutenção",
"Inspeção",
"Fabricação",
"Melhoria",
"Preventiva",
"Corretiva"
];

const origens=[
"Produção",
"PCP",
"Ferramentaria",
"Montagem",
"Engenharia",
"Manutenção"
];

function aviso(t){
msg.innerText=t;
msg.style.display='block';
setTimeout(()=>msg.style.display='none',2500);
}

function maquinas(){

return JSON.parse(
localStorage.getItem('cadastro_maquinas_v24')||'[]'
);

}

function dispositivos(){

return JSON.parse(
localStorage.getItem('cadastro_dispositivos_v24')||'[]'
);

}

function comboMaquinas(sel=""){

let html="<option></option>";

maquinas().forEach(m=>{

html+=`
<option ${m.maquina==sel?'selected':''}>
${m.maquina}
</option>`;

});

return html;

}

function comboDispositivos(sel=""){

let html="<option></option>";

dispositivos().forEach(d=>{

html+=`
<option ${d.dispositivo==sel?'selected':''}>
${d.dispositivo}
</option>`;

});

return html;

}

function novo(d={}){

let r=tb.tBodies[0].insertRow();

r.innerHTML=`

<td></td>

<td><input type="date" value="${d.data||''}"></td>

<td>
<select>
<option ${d.prioridade=="Crítica"?"selected":""}>Crítica</option>
<option ${d.prioridade=="Alta"?"selected":""}>Alta</option>
<option ${d.prioridade=="Normal"?"selected":""}>Normal</option>
<option ${d.prioridade=="Baixa"?"selected":""}>Baixa</option>
</select>
</td>

<td><input value="${d.op||''}"></td>

<td><input value="${d.produto||''}"></td>

<td>
<select>
${comboMaquinas(d.maquina)}
</select>
</td>

<td>
<select>
${comboDispositivos(d.dispositivo)}
</select>
</td>

<td>
<select>
${tipos.map(v=>`<option ${v==d.tipo?'selected':''}>${v}</option>`).join('')}
</select>
</td>

<td>
<select>
${origens.map(v=>`<option ${v==d.origem?'selected':''}>${v}</option>`).join('')}
</select>
</td>

<td><input value="${d.solicitante||''}"></td>

<td><input value="${d.operador||''}"></td>

<td>
<select>
<option ${d.mau=="Não"?"selected":""}>Não</option>
<option ${d.mau=="Sim"?"selected":""}>Sim</option>
<option ${d.mau=="Em Análise"?"selected":""}>Em Análise</option>
</select>
</td>

<td class="cObs">
<textarea rows="3">${d.servico||''}</textarea>
</td>

<td>
<button class="b5" onclick="excluir(this)" style="padding:2px 6px;font-size:10px">X</button>
</td>

`;

r.querySelectorAll("input,select,textarea").forEach(e=>{
e.oninput=()=>{
salvar();
filtrar();
};
});

renum();
salvar();

}

function excluir(btn){

if(!confirm("Excluir registro?")) return;

btn.closest("tr").remove();

renum();
salvar();

}

function renum(){

[...tb.tBodies[0].rows].forEach((r,i)=>{
r.cells[0].innerText=i+1;
});

indicadores();

}

function dados(){

return [...tb.tBodies[0].rows].map(r=>({

data:r.cells[1].querySelector('input').value,
prioridade:r.cells[2].querySelector('select').value,
op:r.cells[3].querySelector('input').value,
produto:r.cells[4].querySelector('input').value,
maquina:r.cells[5].querySelector('select').value,
dispositivo:r.cells[6].querySelector('select').value,
tipo:r.cells[7].querySelector('select').value,
origem:r.cells[8].querySelector('select').value,
solicitante:r.cells[9].querySelector('input').value,
operador:r.cells[10].querySelector('input').value,
mau:r.cells[11].querySelector('select').value,
servico:r.cells[12].querySelector('textarea').value

}));

}

function salvar(){

localStorage.setItem(
'diario_inspecao_v24',
JSON.stringify(dados())
);

indicadores();

}

function salvarManual(){

salvar();

aviso("Dados salvos com sucesso.");

}

async function carregar(){

const { data, error } =
await bancoSupabase
.from('diario_inspecao')
.select('*');

if(error){

    console.error(error);
    alert('Erro ao carregar diário');

    return;

}

tb.tBodies[0].innerHTML = '';

if(data.length){

    data.forEach(x=>novo(x));

}

indicadores();

}
function indicadores(){

let d=dados();

tot.innerText=d.length;

crit.innerText=
d.filter(x=>x.prioridade=="Crítica").length;

man.innerText=
d.filter(x=>x.tipo=="Manutenção").length;

insp.innerText=
d.filter(x=>x.tipo=="Inspeção").length;

mau.innerText=
d.filter(x=>x.mau=="Sim").length;

}

function filtrar(){

let op=buscaOP.value.toLowerCase();

[...tb.tBodies[0].rows].forEach(r=>{

let ok=true;

if(op){

let textoBusca =
r.cells[3].querySelector('input').value.toLowerCase() + " " +
r.cells[5].querySelector('select').value.toLowerCase() + " " +
r.cells[6].querySelector('select').value.toLowerCase() + " " +
r.cells[10].querySelector('input').value.toLowerCase();

ok = textoBusca.includes(op);

}else{

ok=r.innerText
.toLowerCase()
.includes(
pesquisa.value.toLowerCase()
);

if(fPrioridade.value){

ok &= r.cells[2]
.querySelector('select')
.value===fPrioridade.value;

}

}

r.style.display=ok?'':'none';

});

}

function exportarCSV(){
let linhas=[[
"N","Data","Prioridade","OP","Produto",
"Máquina","Dispositivo","Tipo","Origem",
"Solicitante","Operador","Mau Uso","Serviço"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.prioridade,
d.op,
d.produto,
d.maquina,
d.dispositivo,
d.tipo,
d.origem,
d.solicitante,
d.operador,
d.mau,
d.servico
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Inspecoes"
);

XLSX.writeFile(
wb,
"Diario_Inspecao.xlsx"
);

aviso("Excel exportado com sucesso.");

}


function exportarExcel(){

let linhas=[[
"N","Data","Prioridade","OP","Produto",
"Máquina","Dispositivo","Tipo","Origem",
"Solicitante","Operador","Mau Uso","Serviço"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.prioridade,
d.op,
d.produto,
d.maquina,
d.dispositivo,
d.tipo,
d.origem,
d.solicitante,
d.operador,
d.mau,
d.servico
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

ws['!autofilter'] = {
ref:"A1:M1"
};

ws['!freeze'] = {
xSplit:0,
ySplit:1
};

ws['!cols'] = [
{wch:6},
{wch:12},
{wch:12},
{wch:12},
{wch:25},
{wch:20},
{wch:20},
{wch:15},
{wch:15},
{wch:20},
{wch:20},
{wch:12},
{wch:50}
];

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Inspecoes"
);

XLSX.writeFile(
wb,
"Diario_Inspecao.xlsx"
);

aviso("Excel exportado com sucesso.");

}

async function enviarParaSupabase(){

if(
!confirm(
'Sincronizar diário com o Supabase?'
)
){
    return;
}

const lista = dados();

const { error: erroDelete } =
await bancoSupabase
.from('diario_inspecao')
.delete()
.neq('id',0);

if(erroDelete){

    console.error(erroDelete);

    alert(
    'Erro ao limpar tabela'
    );

    return;

}

const { error } =
await bancoSupabase
.from('diario_inspecao')
.insert(lista);

if(error){

    console.error(error);

    alert(
    'Erro ao enviar'
    );

    return;

}

alert(
lista.length +
' registros sincronizados com sucesso'
);

}

buscaOP.oninput=filtrar;
pesquisa.oninput=filtrar;
fPrioridade.onchange=filtrar;

function imprimirTabela(){

window.print();

}

carregar();

</script>

</body>
</html>
