<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>06_Melhorias</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15);overflow-x:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.ind{font-size:22px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}
.b2{background:#198754}
.b3{background:#fd7e14}
.b4{background:#343a40}
.b5{background:#dc3545}

.msg{
display:none;
padding:8px;
background:#d1e7dd;
color:#0f5132;
border-radius:6px;
margin-top:8px
}

table{
width:100%;
border-collapse:collapse;
table-layout:auto;
}

th,td{
border:1px solid #ccc;
padding:3px;
font-size:11px;
}

th{
background:#1f4e79;
color:#fff;
}

input,select,textarea{
width:100%;
box-sizing:border-box;
font-size:11px;
border:none;
padding:3px;
}

.cMelhoria{min-width:350px}
.cBeneficio{min-width:300px}
.cObs{min-width:250px}
.cExc{width:35px}

.implantada{
background:#d1e7dd;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="permissoes.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header style="position:relative;">

<div style="
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
gap:8px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:30px;
font-weight:bold;
">
💡 MELHORIAS

</header>

<div class="container">

<div class="card">

<div class="grid">

<div>Total<div class="ind" id="tot">0</div></div>
<div>Em Análise<div class="ind" id="analise">0</div></div>
<div>Projetos<div class="ind" id="aprovadas">0</div></div>
<div>Implantadas<div class="ind" id="implantadas">0</div></div>
<div>Em Produção<div class="ind" id="canceladas">0</div></div>

</div>

</div>

<div class="card">

<div class="grid">

<div>
<label>Pesquisa</label>
<input id="pesquisa">
</div>

<div>
<label>Status</label>
<select id="fStatus">
<option value="">Todos</option>
<option>Em Análise</option>
<option>Projeto</option>
<option>Em Execução</option>
<option>Implantada</option>
<option>Em Produção</option>
</select>
</div>

</div>

</div>

<div class="card">

<button id="btNovaMelhoria" class="b1" onclick="novo()">Nova Melhoria</button>

<button id="btSalvarMelhoria" class="b2" onclick="salvarManual()">Salvar</button>
<button class="b3" onclick="exportarExcel()">📊 Exportar Excel</button>
<button class="b4" onclick="window.print()">Imprimir</button>

<div id="msg" class="msg"></div>

</div>

<div class="card">

<table id="tb">

<thead>
<tr>

<th>Nº</th>
<th>Data</th>
<th>Setor</th>

<th class="cMelhoria">
Melhoria Proposta
</th>

<th class="cBeneficio">
Benefício Esperado
</th>

<th>Responsável</th>

<th>Status</th>

<th>Economia (R$)</th>

<th class="cObs">
Observação
</th>

<th class="cExc">
X
</th>

</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const SUPABASE_URL =
'https://wzcrqzbwcsmfwenzcxkf.supabase.co';

const SUPABASE_KEY =
'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';

const bancoSupabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function testarSupabase(){

const { data, error } =
await bancoSupabase
.from('melhorias')
.select('*')
.limit(1);

console.log(
'Supabase OK',
error,
data
);

}

verificarPermissao(
"06_Melhorias.html"
);

function aviso(t){

msg.innerText=t;
msg.style.display='block';

setTimeout(()=>{
msg.style.display='none';
},2500);

}

function novo(d={}){

let r=tb.tBodies[0].insertRow();

r.innerHTML=`

<td></td>

<td>
<input type="date" value="${d.data||''}">
</td>

<td>
<input value="${d.setor||''}">
</td>

<td class="cMelhoria">
<textarea rows="3">${d.melhoria||''}</textarea>
</td>

<td class="cBeneficio">
<textarea rows="3">${d.beneficio||''}</textarea>
</td>

<td>
<input value="${d.responsavel||''}">
</td>

<td>
<select>

<option ${d.status=="Em Análise"?"selected":""}>
Em Análise
</option>

<option ${d.status=="Projeto"?"selected":""}>
Projeto
</option>

<option ${d.status=="Em Execução"?"selected":""}>
Em Execução
</option>

<option ${d.status=="Implantada"?"selected":""}>
Implantada
</option>

<option ${d.status=="Em Produção"?"selected":""}>
Em Produção
</option>

</select>
</td>

<td>
<input type="number" step="0.01" value="${d.economia||''}">
</td>

<td class="cObs">
<textarea rows="3">${d.obs||''}</textarea>
</td>

<td>
<button class="b5" onclick="excluir(this)"
style="padding:2px 6px;font-size:10px">
X
</button>
</td>

`;

r.querySelectorAll("input,select,textarea").forEach(e=>{
e.oninput=()=>{
salvar();
filtrar();
};
});

renum();
salvar();

}

function excluir(btn){

let usuario =
localStorage.getItem(
"usuarioLogado"
);

if(
usuario !== "Alexandre"
){

registrarLog(
"Tentou excluir melhoria"
);

alert(
"Somente Alexandre pode excluir melhorias."
);

return;

}

if(!confirm("Excluir melhoria?")) return;

registrarLog(
"Excluiu melhoria"
);

btn.closest("tr").remove();

registrarLog(
"Excluiu melhoria"
);

renum();
salvar();

}

function renum(){

[...tb.tBodies[0].rows].forEach((r,i)=>{
r.cells[0].innerText=i+1;
});

indicadores();

}

function dados(){

return [...tb.tBodies[0].rows].map(r=>({

data:r.cells[1].querySelector('input').value,
setor:r.cells[2].querySelector('input').value,
melhoria:r.cells[3].querySelector('textarea').value,
beneficio:r.cells[4].querySelector('textarea').value,
responsavel:r.cells[5].querySelector('input').value,
status:r.cells[6].querySelector('select').value,
economia:r.cells[7].querySelector('input').value,
obs:r.cells[8].querySelector('textarea').value

}));

}

function salvar(){

localStorage.setItem(
'melhorias_v24',
JSON.stringify(dados())
);

indicadores();

}

async function salvarManual(){

salvar();

await bancoSupabase
.from('melhorias')
.delete()
.neq('id',0);

const { error } =
await bancoSupabase
.from('melhorias')
.insert(dados());

if(error){

console.error(error);

aviso(
"Erro ao salvar no Supabase."
);

return;

}

aviso(
"Dados salvos com sucesso."
);

}
async function carregar(){

const { data, error } =
await bancoSupabase
.from('melhorias')
.select('*');

if(
!error &&
data &&
data.length
){

data.forEach(x=>novo(x));

}
else
{

let d=JSON.parse(
localStorage.getItem('melhorias_v24')||'[]'
);

if(d.length){

d.forEach(x=>novo(x));

}

}

}

function indicadores(){

let d=dados();

tot.innerText=d.length;

analise.innerText=
d.filter(x=>x.status=="Em Análise").length;

aprovadas.innerText=
d.filter(x=>x.status=="Projeto").length;

canceladas.innerText=
d.filter(x=>x.status=="Em Produção").length;

implantadas.innerText=
d.filter(x=>x.status=="Implantada").length;

[...tb.tBodies[0].rows].forEach(r=>{

r.classList.remove("implantada");

if(
r.cells[6]
.querySelector('select')
.value=="Implantada"
){
r.classList.add("implantada");
}

});

}

function filtrar(){

let txt=
pesquisa.value.toLowerCase();

[...tb.tBodies[0].rows].forEach(r=>{

let ok=
r.innerText.toLowerCase().includes(txt);

if(fStatus.value){

ok &= r.cells[6]
.querySelector('select')
.value===fStatus.value;

}

r.style.display=ok?'':'none';

});

}

function exportarCSV(){

let linhas=[[
"N",
"Data",
"Setor",
"Melhoria",
"Benefício",
"Responsável",
"Status",
"Economia",
"Observação"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.setor,
d.melhoria,
d.beneficio,
d.responsavel,
d.status,
d.economia,
d.obs
]);

});

let csv=
linhas.map(r=>
r.map(c=>`"${c}"`).join(";")
).join("\n");

let a=document.createElement("a");

a.href=
URL.createObjectURL(
new Blob([csv],{type:"text/csv"})
);

a.download="Melhorias.csv";

a.click();

aviso("CSV exportado com sucesso.");

}

function exportarExcel(){

let linhas=[[
"N",
"Data",
"Setor",
"Melhoria",
"Benefício",
"Responsável",
"Status",
"Economia",
"Observação"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.setor,
d.melhoria,
d.beneficio,
d.responsavel,
d.status,
d.economia,
d.obs
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

ws['!autofilter'] = {
ref:"A1:I1"
};

ws['!cols'] = [
{wch:6},
{wch:12},
{wch:20},
{wch:40},
{wch:35},
{wch:20},
{wch:15},
{wch:15},
{wch:50}
];

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Melhorias"
);

XLSX.writeFile(
wb,
"Melhorias.xlsx"
);

aviso("Excel exportado com sucesso.");

}

pesquisa.oninput=filtrar;
fStatus.onchange=filtrar;

carregar();

testarSupabase();

let usuario =
localStorage.getItem(
"usuarioLogado"
);

if(
usuario==="PCP"
){

btNovaMelhoria.style.display =
"none";

btSalvarMelhoria.style.display =
"none";

}
</script>

</body>
</html>
