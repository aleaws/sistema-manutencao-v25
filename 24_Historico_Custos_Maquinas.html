<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>24_Historico_Custos_Maquinas</title>
<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
header{background:#1f4e79;color:#fff;padding:14px;text-align:center}
.container{padding:12px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:10px}
.card{background:#fff;padding:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.ind{font-size:24px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ccc;padding:4px;font-size:12px}
th{background:#1f4e79;color:#fff}
input,select{width:100%;box-sizing:border-box}
button{padding:8px 12px;margin:2px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}.b2{background:#198754}.b3{background:#fd7e14}.b4{background:#6c757d}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="permissoes.js"></script>
</head>
<body>
<header>
<button class="b2" onclick="location.href='00_Sistema_Manutencao_V25.html'">⬅ Menu</button>
<button class="b4" onclick="location.reload()">🔄 Atualizar</button>
<h2>💰 Histórico de Custos por Máquina</h2>
</header>
<div class="container">
<div class="cards">
<div class="card">Custo Total<div id="custoTotal" class="ind">R$ 0,00</div></div>
<div class="card">OS<div id="totalOS" class="ind">0</div></div>
<div class="card">Máquinas<div id="totalMaq" class="ind">0</div></div>
<div class="card">Maior Custo<div id="maiorCusto" class="ind">R$ 0,00</div></div>
</div>

<div class="card">
<div class="grid">
<input id="pesquisa" placeholder="Pesquisa">
<select id="fStatus"><option value="">Todos os Status</option></select>
<button class="b2" onclick="novaDespesa()">Nova Despesa</button>
<button class="b2" onclick="carregar()">Atualizar Dados</button>
<button class="b3" onclick="exportarExcel()">Exportar Excel</button>
<button class="b4" onclick="window.print()">Imprimir</button>
</div>
</div>

<table id="tb">
<thead>
<tr>
<th>OS</th><th>Data</th><th>Máquina</th><th>Setor</th><th>Tipo</th><th>Descrição</th><th>Responsável</th><th>Peças</th><th>Mão Obra</th><th>Horas</th><th>Total</th><th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
<div id="janelaDespesa"
style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
z-index:9999;
">

<div style="
background:white;
width:900px;
max-width:95%;
margin:30px auto;
padding:20px;
border-radius:10px;
">

<h2>Nova Despesa</h2>

<div class="grid">

<div>
<label>Nº OS</label>
<input id="os">
</div>

<div>
<label>Data</label>
<input type="date" id="data">
</div>

<div>
<label>Máquina</label>
<input id="maquina">
</div>

<div>
<label>Setor</label>
<input id="setor">
</div>

<div>
<label>Tipo</label>
<input id="tipo">
</div>

<div>
<label>Responsável</label>
<input id="responsavel">
</div>

<div>
<label>Peças</label>
<input
type="number"
id="pecas"
step="0.01">
</div>

<div>
<label>Mão de Obra</label>
<input
type="number"
id="maoobra"
step="0.01">
</div>

<div>
<label>Horas</label>
<input
type="number"
id="horas"
step="0.1">
</div>

<div>
<label>Custo Total</label>
<input
id="total"
readonly>
</div>

</div>

<label>Descrição</label>

<textarea
id="descricao"
rows="3"
style="width:100%;">
</textarea>

<br><br>

<button
class="b2"
onclick="salvarNovaDespesa()">
Salvar
</button>

<button
class="b4"
onclick="fecharJanela()">
Cancelar
</button>

</div>

</div>


<script>
const SUPABASE_URL='https://wzcrqzbwcsmfwenzcxkf.supabase.co';
const SUPABASE_KEY='sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';
const banco=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function carregar(){
 const {data,error}=await banco.from('historico_custos').select('*').order('date',{ascending:false});
 if(error){alert(error.message);return;}
 const tb=document.querySelector('#tb tbody');
 tb.innerHTML='';
 let total=0,max=0;
 const maq=new Set();
 data.forEach(r=>{
   const tr=tb.insertRow();
   tr.innerHTML=`<td>${r.numero_os||''}</td><td>${r.date||''}</td><td>${r.maquinas||''}</td><td>${r.setor||''}</td><td>${r.tipo||''}</td><td>${r.descricao||''}</td><td>${r.responsavel||''}</td><td>${Number(r.valor_pecas||0).toFixed(2)}</td><td>${Number(r.valor_mao_obra||0).toFixed(2)}</td><td>${r.horas||0}</td><td>${Number(r.custo_total||0).toFixed(2)}</td><td>${r.status||''}</td>`;
   total+=Number(r.custo_total||0);
   if(Number(r.custo_total||0)>max)max=Number(r.custo_total||0);
   if(r.maquina)maq.add(r.maquinas);
 });
 document.getElementById('custoTotal').innerText='R$ '+total.toFixed(2);
 document.getElementById('totalOS').innerText=data.length;
 document.getElementById('totalMaq').innerText=maq.size;
 document.getElementById('maiorCusto').innerText='R$ '+max.toFixed(2);
}

function novaDespesa(){

document.getElementById('janelaDespesa').style.display='block';

}

function fecharJanela(){

document.getElementById('janelaDespesa').style.display='none';

}

async function salvarNovaDespesa(){

const dados={

numero_os:os.value,

date:data.value,

maquinas:maquina.value,

setor:setor.value,

tipo:tipo.value,

descricao:descricao.value,

responsavel:responsavel.value,

valor_pecas:Number(pecas.value)||0,

valor_mao_obra:Number(maoobra.value)||0,

horas:Number(horas.value)||0,

custo_total:
(Number(pecas.value)||0)+
(Number(maoobra.value)||0),

observacao:"",

status:"Concluído"

};

await salvarDespesa(dados);

fecharJanela();

}

async function salvarDespesa(dados){

const { error } =
await banco
.from('historico_custos')
.insert([dados]);

if(error){

alert(error.message);

return;

}

alert("Despesa cadastrada com sucesso.");

carregar();

}
function exportarExcel(){
 const wb=XLSX.utils.table_to_book(document.getElementById('tb'));
 XLSX.writeFile(wb,'Historico_Custos_Maquinas.xlsx');
}
carregar();
</script>
</body>
</html>
