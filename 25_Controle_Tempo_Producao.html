<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>25_Controle_Tempo_Producao</title>

<style>

body{
font-family:Segoe UI,Arial,sans-serif;
background:#eef2f7;
margin:20px;
color:#333;
}

h1{
margin:0 0 20px 0;
color:#1f4e79;
}

.linha{
display:flex;
gap:20px;
align-items:flex-start;
margin-bottom:20px;
flex-wrap:nowrap;
}

.cardsDireita{
display:flex;
gap:20px;
margin-left:650px;
margin-top:-180px;
}

.linhaTopo{
display:flex;
align-items:flex-start;
gap:120px;
margin-bottom:10px;
flex-wrap:nowrap;
}

.bloco{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.10);
min-width:220px;
}

input,select{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
width:180px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

#btIniciar{
background:#28a745;
color:white;
}

#btPausar{
background:#ffc107;
}

#btRetomar{
background:#17a2b8;
color:white;
}

#btEncerrar{
background:#dc3545;
color:white;
}

#btRegistrarParada{
background:#6c757d;
color:white;
}

#tempoProducao,
#tempoParado{
font-size:28px;
font-weight:bold;
margin-top:10px;
color:#1f4e79;
}

.logoRodape{
text-align:center;
margin-top:40px;
}

.logoRodape img{
max-width:400px;
width:100%;
opacity:0.20;
}

</style>

<script src="permissoes.js"></script>

</head>

<body>

<div class="bloco">

<h1>Controle de Tempo de Produção</h1>

<div class="linha">

<div>
<p>Máquina</p>
<input id="maquina">
</div>

<div>
<p>OP</p>
<input id="op">
</div>

<div>
<p>Produto</p>
<input id="produto">
</div>

</div>

<div class="linha">

<button id="btIniciar">
▶ Iniciar
</button>

<button id="btPausar">
⏸ Pausar
</button>

<button id="btRetomar">
▶ Retomar
</button>

<button id="btEncerrar">
■ Encerrar
</button>

</div>

<div class="cardsDireita">

<div class="bloco">

<h3>Tempo Produzindo</h3>

<div id="tempoProducao">
00:00:00
</div>

<h3>Tempo Parado</h3>

<div id="tempoParado">
00:00:00
</div>

</div>

<div class="bloco">

<h3>Motivo da Parada</h3>

<select id="motivoParada">

<option value="">
Selecione
</option>

<option>Troca de Ferramenta</option>

<option>Falta de Material</option>

<option>Quebra de Ferramenta</option>

<option>Setup</option>

<option>Manutenção</option>

<option>Aguardando Qualidade</option>

<option>Outros</option>

</select>

<br><br>

<button id="btRegistrarParada">
Registrar Parada
</button>

</div>

<div class="bloco">

<h3>Histórico de Paradas</h3>

<div id="historicoParadas">
Nenhuma parada registrada.
</div>

</div>

</div>

</div>

<hr>

<div class="logoRodape">

<img src="Bonier_logo2.png">

</div>

<script>

verificarPermissao(
"25_Controle_Tempo_Producao.html"
);

let segundosProducao = 0;

let segundosParado = 0;

let iniciado = false;

let encerrado = false;

let pausado = false;

let listaParadas = [];

let dadosSalvos =
JSON.parse(
localStorage.getItem("controle_tempo_v1")
);

if(dadosSalvos){

segundosProducao =
dadosSalvos.segundosProducao || 0;

segundosParado =
dadosSalvos.segundosParado || 0;

iniciado =
dadosSalvos.iniciado || false;

encerrado =
dadosSalvos.encerrado || false;

pausado =
dadosSalvos.pausado || false;

listaParadas =
dadosSalvos.listaParadas || [];

if(
iniciado &&
!encerrado &&
dadosSalvos.ultimaAtualizacao
){

let diferencaSegundos =
Math.floor(
(Date.now() -
dadosSalvos.ultimaAtualizacao)
/1000
);

segundosProducao +=
diferencaSegundos;

}

}

function salvarSistema(){

localStorage.setItem(
"controle_tempo_v1",

JSON.stringify({

segundosProducao,
segundosParado,
iniciado,
encerrado,
pausado,
listaParadas,

ultimaAtualizacao: Date.now()

})

);

}

function atualizarRelogio(){

let horas =
String(Math.floor(segundosProducao/3600))
.padStart(2,'0');

let minutos =
String(Math.floor((segundosProducao%3600)/60))
.padStart(2,'0');

let segundos =
String(segundosProducao%60)
.padStart(2,'0');

tempoProducao.innerText =
horas+":"+minutos+":"+segundos;

let horasParado =
String(Math.floor(segundosParado/3600))
.padStart(2,'0');

let minutosParado =
String(Math.floor((segundosParado%3600)/60))
.padStart(2,'0');

let segundosP =
String(segundosParado%60)
.padStart(2,'0');

tempoParado.innerText =
horasParado+":"+
minutosParado+":"+
segundosP;

salvarSistema();

}

atualizarRelogio();

if(listaParadas.length){

historicoParadas.innerHTML =
listaParadas.join("<br>");

}

let timerProducao = null;

if(iniciado && !encerrado && !pausado){

timerProducao = setInterval(()=>{

segundosProducao++;

atualizarRelogio();

},1000);

}

let timerParado = null;

btIniciar.onclick = function(){

if(iniciado) return;

iniciado = true;

timerProducao = setInterval(()=>{

segundosProducao++;

atualizarRelogio();

},1000);

};



btPausar.onclick = function(){

clearInterval(timerProducao);

timerProducao = null;

pausado = true;
salvarSistema();

if(timerParado) return;

timerParado = setInterval(()=>{

segundosParado++;

atualizarRelogio();

},1000);

};

btRetomar.onclick = function(){

if(encerrado) return;

clearInterval(timerParado);

timerParado = null;

pausado = false;
salvarSistema();

if(timerProducao) return;

timerProducao = setInterval(()=>{

segundosProducao++;

atualizarRelogio();

},1000);

};

btRegistrarParada.onclick = function(){

if(!motivoParada.value){

alert("Selecione um motivo.");

return;

}

listaParadas.push(
motivoParada.value
);

listaParadas.push(
motivoParada.value
);

historicoParadas.innerHTML =
listaParadas.join("<br>");

};

btEncerrar.onclick = function(){

encerrado = true;

clearInterval(timerProducao);

clearInterval(timerParado);

timerProducao = null;

timerParado = null;

segundosProducao = 0;

segundosParado = 0;

iniciado = false;

pausado = false;

listaParadas = [];

historicoParadas.innerHTML =
"Nenhuma parada registrada.";

localStorage.removeItem(
"controle_tempo_v1"
);

atualizarRelogio();

alert("OP Encerrada");

};



</script>

</body>
</html>
