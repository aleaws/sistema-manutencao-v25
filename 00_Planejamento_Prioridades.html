<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>00_Planejamento_Prioridades</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.ind{font-size:22px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}.b2{background:#198754}.b3{background:#fd7e14}.b4{background:#343a40}
.msg{display:none;padding:8px;background:#d1e7dd;color:#0f5132;border-radius:6px;margin-top:8px}
table{width:100%;table-layout:fixed;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:2px;font-size:11px}
th{background:#1f4e79;color:#fff}
input,select,textarea{width:100%;box-sizing:border-box;font-size:11px;border:none;padding:2px}
.c1{width:35px}
.c2{width:85px}
.c3{width:90px}
.c4{width:110px}
.c5{width:220px}
.c6{width:120px}
.c7{width:120px}
.c8{width:95px}
.c9{width:auto}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="permissoes.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<header style="position:relative;">

<div style="
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
gap:8px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:28px;
font-weight:bold;
">
📊 Planejamento de Prioridades
</span>

</header>
</header>

<div class="container">

<div class="card">
<div class="grid">
<div>Total<div class="ind" id="tot">0</div></div>
<div>Abertas<div class="ind" id="crit">0</div></div>
<div>Canceladas<div class="ind" id="alta">0</div></div>
<div>Em Andamento<div class="ind" id="andamento">0</div></div>
<div>Concluídas<div class="ind" id="concluidas">0</div></div>
</div>
</div>

<div class="card">
<label>Responsável</label>
<input id="responsavel">
</div>

<div class="card">
<div class="grid">
<div>
<label>Pesquisa Geral</label>
<input id="pesquisa">
</div>

<div>
<label>Prioridade</label>
<select id="fPrioridade">
<option value="">Todas</option>
</select>
</div>

<div>
<label>Status</label>
<select id="fStatus">
<option value="">Todos</option>
</select>
</div>

</div>
</div>

<div class="card">
<button id="btNovaPrioridade" class="b1" onclick="novo()">Nova Prioridade</button>
<button id="btSalvarPlanejamento" class="b2" onclick="salvarManual()">Salvar</button>
<button id="btExcelPlanejamento" class="b3" onclick="exportarExcel()">📊 Exportar Excel</button>
<button class="b4" onclick="window.print()">Imprimir</button>
<button
id="btSupabase"
class="b3"
onclick="enviarSupabase()"
>
☁ Enviar Base
</button>
<button id="btHistorico" class="b4" onclick="alternarHistorico()">
Mostrar Histórico
</button>
<div id="msg" class="msg"></div>
</div>

<div class="card">

<table id="tb">

<thead>
<tr>
<th class="c1">Prioridade</th>
<th class="c2">Data</th>
<th class="c3">Equipamento</th>
<th class="c4">Setor</th>
<th class="c5">Descrição</th>
<th class="c6">Responsável</th>
<th class="c7">Status</th>
<th class="c8">Prazo</th>
<th class="c9">Observação</th>
<th style="width:40px">⬆</th>
<th style="width:40px">⬇</th>
<th style="width:70px">Excluir</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const SUPABASE_URL = 'https://wzcrqzbwcsmfwenzcxkf.supabase.co';

const SUPABASE_KEY = 'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';

const bancoSupabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

verificarPermissao(
"00_Planejamento_Prioridades.html"
);

let usuarioLogado =
localStorage.getItem(
"usuarioLogado"
);

let mostrarHistorico = false;

if(

usuarioLogado !== "Alexandre" &&

usuarioLogado !== "Diretoria"

){

alert(
"Acesso negado"
);

window.location.href =
"index.html";

}


const statusLista=[
"Aberto",
"Em Andamento",
"Concluído",
"Cancelado"
];

const maquinas =
JSON.parse(
localStorage.getItem(
'cadastro_maquinas_v24'
) || '[]'
);

const dispositivos =
JSON.parse(
localStorage.getItem(
'cadastro_dispositivos_v24'
) || '[]'
);

const equipamentos = [

"",

...maquinas.map(x=>x.maquina),

...dispositivos.map(x=>x.dispositivo)

].sort();


statusLista.forEach(x=>fStatus.innerHTML+=`<option>${x}</option>`);

function aviso(t){
msg.innerText=t;
msg.style.display='block';
setTimeout(()=>msg.style.display='none',2500);
}

function novo(d={}){

let r=tb.tBodies[0].insertRow();

r.innerHTML=`
<td></td>

<td>
<input type="date" value="${d.data||''}">
</td>

<td>
<select>
${equipamentos.map(v=>`<option ${v==d.equipamento?'selected':''}>${v}</option>`).join('')}
</select>
</td>

<td>
<input value="${d.setor||''}">
</td>

<td>
<textarea rows="2">${d.descricao||''}</textarea>
</td>

<td>
<input value="${d.responsavelItem||''}">
</td>

<td>
<select>
${statusLista.map(v=>`<option ${v==d.status?'selected':''}>${v}</option>`).join('')}
</select>
</td>

<td>
<input type="date" value="${d.prazo||''}">
</td>

<td>
<textarea rows="2">${d.obs||''}</textarea>
</td>

<td>
<button
onclick="subirLinha(this)"
style="background:white;color:black"
>
⬆
</button>
</td>

<td>
<button
onclick="descerLinha(this)"
style="background:white;color:black"
>
⬇
</button>
</td>

<td>
<button onclick="excluirLinha(this)"
style="background:#dc3545;color:white">
X
</button>
</td>
`;

r.querySelectorAll("input,select,textarea").forEach(e=>{

e.oninput=()=>{

salvar();

filtrar();

};

let usuarioLogado =
localStorage.getItem(
"usuarioLogado"
);


if(
usuarioLogado !== "Alexandre" &&
usuarioLogado !== "Diretoria"
){

e.disabled = true;

}

});

renum();

}

function subirLinha(btn){

let linha = btn.closest("tr");

let anterior = linha.previousElementSibling;

if(!anterior) return;

linha.parentNode.insertBefore(
linha,
anterior
);

renum();
salvar();

}

function descerLinha(btn){

let linha = btn.closest("tr");

let proxima = linha.nextElementSibling;

if(!proxima) return;

linha.parentNode.insertBefore(
proxima,
linha
);

renum();
salvar();

}

function excluirLinha(btn){

    let usuarioLogado =
    localStorage.getItem(
    "usuarioLogado"
    );



    if(
    usuarioLogado !== "Alexandre"
    ){

    alert(
    "Somente Alexandre pode excluir registros."
    );

    return;

    }

    if(!confirm("Excluir prioridade?"))
    return;

    btn.closest("tr").remove();

    renum();

    salvar();

}

function renum(){

let p = 1;

[...tb.tBodies[0].rows].forEach(r=>{

let status =
r.cells[6]
.querySelector('select')
.value;

if(
status==="Concluído" ||
status==="Cancelado"
){

r.cells[0].innerText = "-";

}else{

r.cells[0].innerText = p++;

}

});

indicadores();

}

function dados(){

return [...tb.tBodies[0].rows].map(r=>({

data:r.cells[1].querySelector('input').value,
equipamento:r.cells[2].querySelector('select').value,
setor:r.cells[3].querySelector('input').value,
descricao:r.cells[4].querySelector('textarea').value,
responsavelitem:r.cells[5].querySelector('input').value,
status:r.cells[6].querySelector('select').value,
prioridade:r.cells[0].innerText,
prazo:r.cells[7].querySelector('input').value,
obs:r.cells[8].querySelector('textarea').value

}));

}

function salvar(){

localStorage.setItem(
'planejamento_prioridades',
JSON.stringify(dados())
);

localStorage.setItem(
'planejamento_responsavel',
responsavel.value
);

indicadores();

}

async function salvarManual(){

salvar();

await enviarSupabase();

aviso('Dados salvos com sucesso.');

}

async function carregarSupabase(){

const { data, error } =
await bancoSupabase
.from('planejamento_prioridades')
.select('*');

if(error){

console.error(error);

alert('Erro ao carregar base');

return;

}

tb.tBodies[0].innerHTML='';

data.sort((a,b)=>
parseInt(a.prioridade||999) -
parseInt(b.prioridade||999)
);

data.forEach(x=>novo(x));

renum();
filtrar();

}

function carregar(){

responsavel.value=
localStorage.getItem('planejamento_responsavel')||'';

let d=
JSON.parse(
localStorage.getItem('planejamento_prioridades')||'[]'
);

if(d.length){

d.sort((a,b)=>
parseInt(a.prioridade||999) -
parseInt(b.prioridade||999)
);

d.forEach(x=>novo(x));

}

}

function indicadores(){

let d=dados();

tot.innerText=d.length;

crit.innerText=
d.filter(x=>x.status=="Aberto").length;

alta.innerText=
d.filter(x=>x.status=="Cancelado").length;

andamento.innerText=
d.filter(x=>x.status=="Em Andamento").length;

concluidas.innerText=
d.filter(x=>x.status=="Concluído").length;

}

function filtrar(){

let txt=
pesquisa.value.toLowerCase();

[...tb.tBodies[0].rows].forEach(r=>{

let ok=
r.innerText.toLowerCase().includes(txt);

if(fPrioridade.value)
ok &= r.cells[2].querySelector('select').value===fPrioridade.value;

if(fStatus.value)
ok &= r.cells[6].querySelector('select').value===fStatus.value;

let celStatus = r.cells[6];

celStatus.style.background='';

let status =
r.cells[6].querySelector('select').value;

if(
!mostrarHistorico &&
(
status==="Concluído" ||
status==="Cancelado"
)
){

r.style.display='none';

return;

}

if(status=="Aberto"){

celStatus.style.background='#ffd6d6';

}
else if(status=="Em Andamento"){

celStatus.style.background='#fff3cd';

}
else if(status=="Concluído"){

celStatus.style.background='#d1e7dd';

}
else if(status=="Cancelado"){

celStatus.style.background='#eeeeee';

}

r.style.display=ok?'':'none';

});

}

function exportarCSV(){

let linhas=[[
"N",
"Data",
"Prioridade",
"Setor",
"Descrição",
"Responsável",
"Status",
"Prazo",
"Observação"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.prioridade,
d.setor,
d.descricao,
d.responsavelItem,
d.status,
d.prazo,
d.obs
]);

});

let csv=
linhas.map(r=>
r.map(c=>`"${c}"`).join(";")
).join("\n");

let a=document.createElement("a");

a.href=
URL.createObjectURL(
new Blob([csv],{type:"text/csv"})
);

a.download=
"Planejamento_Prioridades.csv";

a.click();

aviso("CSV exportado com sucesso.");

}

function exportarExcel(){

let linhas=[[
"N",
"Data",
"Prioridade",
"Setor",
"Descrição",
"Responsável",
"Status",
"Prazo",
"Observação"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.prioridade,
d.setor,
d.descricao,
d.responsavelItem,
d.status,
d.prazo,
d.obs
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

ws['!autofilter'] = {
ref:"A1:I1"
};

ws['!cols'] = [
{wch:6},
{wch:12},
{wch:12},
{wch:20},
{wch:40},
{wch:20},
{wch:15},
{wch:12},
{wch:50}
];

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Planejamento"
);

XLSX.writeFile(
wb,
"Planejamento_Prioridades.xlsx"
);

aviso("Excel exportado com sucesso.");

}

pesquisa.oninput=filtrar;
fPrioridade.onchange=filtrar;
fStatus.onchange=filtrar;

carregarSupabase();

if(
usuarioLogado !== "Alexandre"
){

btNovaPrioridade.style.display =
"none";

btSupabase.style.display =
"none";

btSalvarPlanejamento.style.display =
"none";

}

filtrar();



function alternarHistorico(){

mostrarHistorico =
!mostrarHistorico;

alert(
mostrarHistorico
?
"Histórico Ligado"
:
"Histórico Desligado"
);

filtrar();

}

async function enviarSupabase(){

const lista = dados();

const { error: erroDelete } =
await bancoSupabase
.from('planejamento_prioridades')
.delete()
.neq('id',0);

if(erroDelete){

console.error(erroDelete);

alert('Erro ao limpar tabela');

return;

}

const { error } =
await bancoSupabase
.from('planejamento_prioridades')
.insert(lista);

if(error){

console.error(error);

alert('Erro ao enviar dados');

return;

}

alert('Base enviada com sucesso');

}

</script>

</body>
</html>
