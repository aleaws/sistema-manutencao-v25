<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>08_Pauta</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15);overflow-x:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.ind{font-size:22px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}
.b2{background:#198754}
.b3{background:#fd7e14}
.b4{background:#343a40}
.b5{background:#dc3545}

.msg{
display:none;
padding:8px;
background:#d1e7dd;
color:#0f5132;
border-radius:6px;
margin-top:8px
}

table{
width:100%;
border-collapse:collapse;
table-layout:auto;
}

th,td{
border:1px solid #ccc;
padding:3px;
font-size:11px;
}

th{
background:#1f4e79;
color:#fff;
}

input,select,textarea{
width:100%;
box-sizing:border-box;
font-size:11px;
border:none;
padding:3px;
}

.atrasada{
background:#f8d7da;
}

.cTema{min-width:200px}
.cPend{min-width:350px}
.cObs{min-width:250px}
.cExc{width:35px}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="permissoes.js"></script>

</head>

<body>

<header style="position:relative;">

<div style="
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
gap:8px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:30px;
font-weight:bold;
">
📝 PAUTA

</header>

<div class="container">

<div class="card">

<div class="grid">

<div>Total<div class="ind" id="tot">0</div></div>
<div>Abertas<div class="ind" id="abertas">0</div></div>
<div>Andamento<div class="ind" id="andamento">0</div></div>
<div>Concluídas<div class="ind" id="concluidas">0</div></div>
<div>Atrasadas<div class="ind" id="atrasadas">0</div></div>

</div>

</div>

<div class="card">

<div class="grid">

<div>
<label>Pesquisa</label>
<input id="pesquisa">
</div>

<div>
<label>Status</label>
<select id="fStatus">
<option value="">Todos</option>
<option>Aberta</option>
<option>Em Andamento</option>
<option>Concluída</option>
<option>Cancelada</option>
</select>
</div>

</div>

</div>

<div class="card">

<button class="b1" onclick="novo()">Nova Pendência</button>
<button class="b2" onclick="salvarManual()">Salvar</button>
<button class="b3" onclick="exportarExcel()">📊 Exportar Excel</button><button class="b4" onclick="window.print()">Imprimir</button>

<div id="msg" class="msg"></div>

</div>

<div class="card">

<table id="tb">

<thead>
<tr>
<th>Nº</th>
<th>Data</th>
<th class="cTema">Tema</th>
<th>Responsável</th>
<th class="cPend">Pendência</th>
<th>Prazo</th>
<th>Status</th>
<th class="cObs">Observação</th>
<th class="cExc">X</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

verificarPermissao(
"08_Pauta.html"
);

function aviso(t){
msg.innerText=t;
msg.style.display='block';
setTimeout(()=>msg.style.display='none',2500);
}

function novo(d={}){

let r=tb.tBodies[0].insertRow();

r.innerHTML=`

<td></td>

<td>
<input type="date" value="${d.data||''}">
</td>

<td class="cTema">
<input value="${d.tema||''}">
</td>

<td>
<input value="${d.responsavel||''}">
</td>

<td class="cPend">
<textarea rows="3">${d.pendencia||''}</textarea>
</td>

<td>
<input type="date" value="${d.prazo||''}">
</td>

<td>
<select>
<option ${d.status=="Aberta"?"selected":""}>Aberta</option>
<option ${d.status=="Em Andamento"?"selected":""}>Em Andamento</option>
<option ${d.status=="Concluída"?"selected":""}>Concluída</option>
<option ${d.status=="Cancelada"?"selected":""}>Cancelada</option>
</select>
</td>

<td class="cObs">
<textarea rows="3">${d.obs||''}</textarea>
</td>

<td>
<button class="b5" onclick="excluir(this)" style="padding:2px 6px;font-size:10px">
X
</button>
</td>

`;

r.querySelectorAll("input,select,textarea").forEach(e=>{
e.oninput=()=>{
salvar();
filtrar();
};
});

renum();
salvar();

}

function excluir(btn){

if(!confirm("Excluir pendência?")) return;

btn.closest("tr").remove();

renum();
salvar();

}

function renum(){

[...tb.tBodies[0].rows].forEach((r,i)=>{
r.cells[0].innerText=i+1;
});

indicadores();

}

function dados(){

return [...tb.tBodies[0].rows].map(r=>({

data:r.cells[1].querySelector('input').value,
tema:r.cells[2].querySelector('input').value,
responsavel:r.cells[3].querySelector('input').value,
pendencia:r.cells[4].querySelector('textarea').value,
prazo:r.cells[5].querySelector('input').value,
status:r.cells[6].querySelector('select').value,
obs:r.cells[7].querySelector('textarea').value

}));

}

function salvar(){

localStorage.setItem(
'pauta_v24',
JSON.stringify(dados())
);

indicadores();

}

function salvarManual(){

salvar();
aviso("Dados salvos com sucesso.");

}

function carregar(){

let d=JSON.parse(
localStorage.getItem('pauta_v24')||'[]'
);

if(d.length){
d.forEach(x=>novo(x));
}

}

function indicadores(){

let d=dados();

let abertasP=0;
let andamentoP=0;
let concluidasP=0;
let atrasadasP=0;

let hoje=new Date();
hoje.setHours(0,0,0,0);

[...tb.tBodies[0].rows].forEach(r=>{

r.classList.remove("atrasada");

let status=
r.cells[6].querySelector('select').value;

let prazo=
r.cells[5].querySelector('input').value;

if(status=="Aberta") abertasP++;
if(status=="Em Andamento") andamentoP++;
if(status=="Concluída") concluidasP++;

if(
prazo &&
status!="Concluída" &&
status!="Cancelada"
){

let data=new Date(prazo);
data.setHours(0,0,0,0);

if(data<hoje){

atrasadasP++;

r.classList.add("atrasada");

}

}

});

tot.innerText=d.length;
abertas.innerText=abertasP;
andamento.innerText=andamentoP;
concluidas.innerText=concluidasP;
atrasadas.innerText=atrasadasP;

}

function filtrar(){

let txt=pesquisa.value.toLowerCase();

[...tb.tBodies[0].rows].forEach(r=>{

let ok=r.innerText.toLowerCase().includes(txt);

if(fStatus.value){

ok &= r.cells[6]
.querySelector('select')
.value===fStatus.value;

}

r.style.display=ok?'':'none';

});

}

function exportarCSV(){

let linhas=[[
"N",
"Data",
"Tema",
"Responsável",
"Pendência",
"Prazo",
"Status",
"Observação"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.tema,
d.responsavel,
d.pendencia,
d.prazo,
d.status,
d.obs
]);

});

let csv=
linhas.map(r=>
r.map(c=>`"${c}"`).join(";")
).join("\n");

let a=document.createElement("a");

a.href=
URL.createObjectURL(
new Blob([csv],{type:"text/csv"})
);

a.download="Pauta.csv";

a.click();

aviso("CSV exportado com sucesso.");

}

function exportarExcel(){

let linhas=[[
"N",
"Data",
"Tema",
"Responsável",
"Pendência",
"Prazo",
"Status",
"Observação"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.data,
d.tema,
d.responsavel,
d.pendencia,
d.prazo,
d.status,
d.obs
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

ws['!autofilter'] = {
ref:"A1:H1"
};

ws['!cols'] = [
{wch:6},
{wch:12},
{wch:35},
{wch:20},
{wch:35},
{wch:12},
{wch:15},
{wch:50}
];

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Pauta"
);

XLSX.writeFile(
wb,
"Pauta.xlsx"
);

aviso("Excel exportado com sucesso.");

}

pesquisa.oninput=filtrar;
fStatus.onchange=filtrar;

carregar();

</script>

</body>
</html>
