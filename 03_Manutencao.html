<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>03_Manutencao</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
--azul:#184b78;--azul2:#0f3557;--verde:#198754;--vermelho:#dc3545;--amarelo:#ffc107;--laranja:#fd7e14;--cinza:#6c757d;--bg:#eef2f5;--card:#fff;--borda:#d9dee5;--texto:#202428;
}
*{box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);margin:0;color:var(--texto)}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:white;padding:15px;text-align:center;font-size:24px;font-weight:bold;position:relative}
.topbar{position:absolute;left:12px;top:50%;transform:translateY(-50%);display:flex;gap:8px}
.container{max-width:1280px;margin:auto;padding:14px}
.card{background:white;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:14px}
.topo{display:flex;gap:10px;justify-content:space-between;align-items:end;flex-wrap:wrap}
.busca{flex:1;min-width:280px}
label{display:block;font-weight:bold;font-size:13px;margin-bottom:6px;color:#26313a}
input,select,textarea{width:100%;padding:10px;border:1px solid var(--borda);border-radius:8px;font-size:14px;background:white}
button{padding:10px 14px;border:none;border-radius:8px;color:white;background:var(--azul);font-weight:bold;cursor:pointer}
button:hover{filter:brightness(.92)}
.btn-verde{background:var(--verde)} .btn-laranja{background:var(--laranja)} .btn-cinza{background:var(--cinza)} .btn-vermelho{background:var(--vermelho)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}
.ind{background:#f8fafc;border:1px solid #e8edf2;border-radius:10px;padding:10px;text-align:center;min-height:74px;display:flex;flex-direction:column;justify-content:center;cursor:pointer}
.ind.ativo{background:#e8f2ff;border-color:var(--azul);box-shadow:0 0 0 3px rgba(24,75,120,.12)}
.ind b{font-size:27px;color:var(--azul)} .ind span{font-size:13px;color:#4d5963}
.ind.vermelho{background:#fff5f5;border-color:#f5c2c7} .ind.vermelho b{color:#842029}
.ind.amarelo{background:#fff9e6;border-color:#ffecb5} .ind.amarelo b{color:#664d03}
.ind.verde{background:#f2fff7;border-color:#badbcc} .ind.verde b{color:#0f5132}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.filtros button{background:#f8fafc;color:#24313d;border:1px solid #d7dee7;padding:8px 11px;font-size:13px}
.filtros button.ativo{background:var(--azul);color:#fff;border-color:var(--azul)}
.resumo{font-size:13px;color:#5b6570;margin-top:8px}
.tabela-wrap{width:100%;overflow:auto;border:1px solid var(--borda);border-radius:10px;background:white;max-height:650px}
table{width:100%;border-collapse:collapse;min-width:940px}
th,td{border-bottom:1px solid #e5e9ee;padding:9px 8px;font-size:14px;text-align:left;vertical-align:middle}
th{background:var(--azul);color:white;position:sticky;top:0;z-index:2;text-transform:uppercase;font-size:12px}
tbody tr:nth-child(even){background:#fbfcfe} tbody tr:hover{background:#eef6ff}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold;white-space:nowrap}
.bgCritica{background:#f8d7da;color:#842029} .bgAlta{background:#fff3cd;color:#664d03} .bgNormal{background:#d1e7dd;color:#0f5132} .bgBaixa{background:#cff4fc;color:#055160}
.stAberta{background:#fff3cd;color:#664d03} .stAndamento{background:#cfe2ff;color:#084298} .stPeca{background:#ffe5b4;color:#8a4b00} .stConcluida{background:#d1e7dd;color:#0f5132} .stCancelada{background:#f8d7da;color:#842029}
.acoes{display:flex;gap:6px;flex-wrap:wrap}
.acoes button{padding:7px 10px;font-size:13px}
.modal-fundo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;padding:14px;align-items:center;justify-content:center}
.modal{background:#fff;width:min(820px,100%);max-height:90vh;overflow:auto;border-radius:14px;box-shadow:0 18px 45px rgba(0,0,0,.28)}
.modal-head{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:14px 16px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:16px}
.detalhes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.campo{border:1px solid #e1e6eb;border-radius:10px;background:#f8fafc;padding:10px;min-height:62px}
.campo small{display:block;color:#66717c;font-weight:bold;margin-bottom:4px;text-transform:uppercase;font-size:11px}
.campo div{font-size:15px;word-break:break-word;white-space:pre-wrap}
.campo.full{grid-column:1/-1}
@media(max-width:850px){header{font-size:20px;padding-top:62px}.topbar{top:12px;left:12px;right:12px;transform:none}.topbar button{flex:1}.container{padding:10px}.grid{grid-template-columns:repeat(2,1fr)}button{width:100%}.detalhes{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<div class="topbar">
<button class="btn-cinza" onclick="window.location.href='00_Sistema_Manutencao_V25.html'">⬅ Menu</button>
<button class="btn-verde" onclick="carregar()">🔄 Atualizar</button>
</div>
🔧 03 - MANUTENÇÃO DAS MÁQUINAS
</header>

<div class="container">
<div class="card">
<div class="topo">
<div class="busca">
<label>🔎 Pesquisa em tempo real</label>
<input id="pesquisa" placeholder="Digite OS, máquina, dispositivo, responsável, status ou serviço">
<div class="resumo" id="resumo">Carregando...</div>
<div class="filtros">
<button id="fTodos" onclick="setFiltro('todos')" class="ativo">Todos</button>
<button id="fAbertas" onclick="setFiltro('Aberta')">Abertas</button>
<button id="fAndamento" onclick="setFiltro('Em Andamento')">Em andamento</button>
<button id="fPeca" onclick="setFiltro('Aguardando Peça')">Aguardando peça</button>
<button id="fConcluidas" onclick="setFiltro('Concluída')">Concluídas</button>
<button onclick="limparFiltros()">Limpar</button>
</div>
</div>
</div>
</div>

<div class="card">
<div class="grid">
<div class="ind" id="cardTotal" onclick="setFiltro('todos')"><b id="iTotal">0</b><span>Total</span></div>
<div class="ind amarelo" id="cardAbertas" onclick="setFiltro('Aberta')"><b id="iAbertas">0</b><span>Abertas</span></div>
<div class="ind amarelo" id="cardAndamento" onclick="setFiltro('Em Andamento')"><b id="iAndamento">0</b><span>Em Andamento</span></div>
<div class="ind amarelo" id="cardPeca" onclick="setFiltro('Aguardando Peça')"><b id="iPeca">0</b><span>Aguardando Peça</span></div>
<div class="ind verde" id="cardConcluidas" onclick="setFiltro('Concluída')"><b id="iConcluidas">0</b><span>Concluídas</span></div>
<div class="ind vermelho"><b id="iCriticas">0</b><span>Críticas</span></div>
</div>
</div>

<div class="card">
<div class="tabela-wrap">
<table>
<thead>
<tr>
<th>OS</th>
<th>Data</th>
<th>Máquina</th>
<th>Dispositivo</th>
<th>Prioridade</th>
<th>Status</th>
<th>Responsável</th>
<th>Serviço / Defeito</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>
</div>
</div>

<div class="modal-fundo" id="modalFundo" onclick="fecharFora(event)">
<div class="modal">
<div class="modal-head">
<b>👁 Detalhes</b>
<button onclick="fecharModal()">Fechar</button>
</div>
<div class="modal-body" id="modalBody"></div>
</div>
</div>

<script>

/* BLOQUEIO DE ACESSO - Apenas Alexandre e Diretoria */
(function(){
 const usuario=(localStorage.getItem("usuarioLogado")||"").toLowerCase();
 const autorizado=usuario.includes("alexandre")||usuario.includes("diretoria");
 if(!autorizado){
   alert("Acesso bloqueado.");
   window.location.href="00_Sistema_Manutencao_V25.html";
 }
})();

const SUPABASE_URL='https://wzcrqzbwcsmfwenzcxkf.supabase.co';
const SUPABASE_KEY='sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';
const bancoSupabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let listaCompleta=[];
let listaFiltrada=[];
let filtro='todos';

function el(id){return document.getElementById(id)}
function valor(v){return (v===null||v===undefined)?'':String(v)}
function normalizar(v){return valor(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function escapar(v){return valor(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function classePrioridade(p){if(p==='Crítica')return 'bgCritica';if(p==='Alta')return 'bgAlta';if(p==='Normal')return 'bgNormal';return 'bgBaixa'}
function classeStatus(s){if(s==='Aberta')return 'stAberta';if(s==='Em Andamento')return 'stAndamento';if(s==='Aguardando Peça')return 'stPeca';if(s==='Concluída')return 'stConcluida';if(s==='Cancelada')return 'stCancelada';return 'stAberta'}

function textoBusca(r){return normalizar([r.os,r.data,r.maquina,r.dispositivo,r.prioridade,r.status,r.responsavel,r.servico,r.defeito,r.obs].join(' '))}

async function carregar(){
const {data,error} = await bancoSupabase
.from('manutencao')
.select('*')
.eq('tipo','Máquina')
.order('id',{ascending:false});

if(error){
alert('Erro ao carregar: '+error.message);
listaCompleta=[];
}else{
listaCompleta=data||[];
}

filtrar();
}

function filtrar(){
let termo=normalizar(el('pesquisa').value.trim());
listaFiltrada=listaCompleta.filter(r=>{
let ok=true;
if(filtro!=='todos' && r.status!==filtro)ok=false;
if(termo && !textoBusca(r).includes(termo))ok=false;
return ok;
});
renderizar();
}

function setFiltro(v){
filtro=v;
filtrar();
}

function limparFiltros(){
filtro='todos';
el('pesquisa').value='';
filtrar();
}

function atualizarCards(){
el('iTotal').textContent=listaCompleta.length;
el('iAbertas').textContent=listaCompleta.filter(x=>x.status==='Aberta').length;
el('iAndamento').textContent=listaCompleta.filter(x=>x.status==='Em Andamento').length;
el('iPeca').textContent=listaCompleta.filter(x=>x.status==='Aguardando Peça').length;
el('iConcluidas').textContent=listaCompleta.filter(x=>x.status==='Concluída').length;
el('iCriticas').textContent=listaCompleta.filter(x=>x.prioridade==='Crítica').length;

['fTodos','fAbertas','fAndamento','fPeca','fConcluidas'].forEach(id=>el(id)?.classList.remove('ativo'));
['cardTotal','cardAbertas','cardAndamento','cardPeca','cardConcluidas'].forEach(id=>el(id)?.classList.remove('ativo'));

let mapa={todos:['fTodos','cardTotal'],Aberta:['fAbertas','cardAbertas'],'Em Andamento':['fAndamento','cardAndamento'],'Aguardando Peça':['fPeca','cardPeca'],'Concluída':['fConcluidas','cardConcluidas']};
(mapa[filtro]||[]).forEach(id=>el(id)?.classList.add('ativo'));

el('resumo').textContent='Mostrando '+listaFiltrada.length+' de '+listaCompleta.length+' registros | Tipo: Máquina.';
}

function renderizar(){
atualizarCards();
let tb=el('tb');
tb.innerHTML='';
if(!listaFiltrada.length){
tb.innerHTML='<tr><td colspan="9" style="text-align:center;padding:25px;color:#666">Nenhum registro encontrado.</td></tr>';
return;
}
listaFiltrada.forEach((r,i)=>{
tb.innerHTML+=`
<tr>
<td><b>${escapar(r.os||'')}</b></td>
<td>${escapar(r.data||'')}</td>
<td>${escapar(r.maquina||'')}</td>
<td>${escapar(r.dispositivo||'')}</td>
<td><span class="badge ${classePrioridade(r.prioridade)}">${escapar(r.prioridade||'')}</span></td>
<td><span class="badge ${classeStatus(r.status)}">${escapar(r.status||'')}</span></td>
<td>${escapar(r.responsavel||'')}</td>
<td>${escapar(r.servico||r.defeito||'')}</td>
<td><div class="acoes"><button onclick="visualizar(${i})">👁 Visualizar</button></div></td>
</tr>`;
});
}

function campo(t,c,full){
return `<div class="campo ${full?'full':''}"><small>${escapar(t)}</small><div>${escapar(c)||'-'}</div></div>`;
}

function visualizar(i){
let r=listaFiltrada[i];
if(!r)return;
el('modalBody').innerHTML=`
<div class="detalhes">
${campo('OS',r.os)}
${campo('Data',r.data)}
${campo('Tipo',r.tipo)}
${campo('Máquina',r.maquina)}
${campo('Dispositivo',r.dispositivo)}
${campo('Prioridade',r.prioridade)}
${campo('Status',r.status)}
${campo('Responsável',r.responsavel)}
${campo('Serviço',r.servico||r.defeito,true)}
${campo('Observação',r.obs,true)}
</div>`;
el('modalFundo').style.display='flex';
}

function fecharModal(){el('modalFundo').style.display='none'}
function fecharFora(e){if(e.target.id==='modalFundo')fecharModal()}

el('pesquisa').addEventListener('input',filtrar);
document.addEventListener('DOMContentLoaded',carregar);
</script>
</body>
</html>
