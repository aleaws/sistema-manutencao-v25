<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>19_Lubrificacao</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15);overflow-x:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.ind{font-size:22px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}
.b2{background:#198754}
.b3{background:#fd7e14}
.b4{background:#343a40}
.b5{background:#dc3545}

.msg{
display:none;
padding:8px;
background:#d1e7dd;
color:#0f5132;
border-radius:6px;
margin-top:8px
}

table{
width:100%;
border-collapse:collapse;
table-layout:auto;
}

th,td{
border:1px solid #ccc;
padding:3px;
font-size:11px;
}

th{
background:#1f4e79;
color:#fff;
}

input,select{
width:100%;
box-sizing:border-box;
font-size:11px;
border:none;
padding:3px;
}

.vencido{
background:#f8d7da;
}

.hoje{
background:#fff3cd;
}

.emdia{
background:#d1e7dd;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="permissoes.js"></script>


</head>
<body>


<header style="position:relative;">

<div style="
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
gap:8px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:30px;
font-weight:bold;
">
🛢 PLANO DE LUBRIFICAÇÃO

</header>

<div class="container">

<div class="card">
<div class="grid">

<div>Total<div class="ind" id="tot">0</div></div>
<div>Vencidos<div class="ind" id="vencidos">0</div></div>
<div>Vence Hoje<div class="ind" id="hoje">0</div></div>
<div>Em Dia<div class="ind" id="emdia">0</div></div>

</div>
</div>

<div class="card">

<div class="grid">

<div>
<label>Pesquisa</label>
<input id="pesquisa">
</div>

</div>

</div>

<div class="card">

<button class="b1" onclick="novo()">Nova Lubrificação</button>

<button class="b2" onclick="salvarManual()">Salvar</button>

<button class="b3" onclick="exportarExcel()">📊 Exportar Excel</button>

<button class="b4" onclick="window.print()">Imprimir</button>

<div id="msg" class="msg"></div>

</div>

<div class="card">

<table id="tb">

<thead>

<tr>

<th>Máquina</th>
<th>Frequência</th>
<th>Última</th>
<th>Próxima</th>
<th>Nome</th>
<th>Última Utilização</th>
<th>X</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

verificarPermissao(
"19_Lubrificacao.html"
);

function aviso(t){

msg.innerText=t;
msg.style.display='block';

setTimeout(()=>{
msg.style.display='none';
},2500);

}

function maquinas(){

return JSON.parse(
localStorage.getItem('cadastro_maquinas_v24')||'[]'
);

}

function comboMaquinas(sel=""){

let html="<option></option>";

maquinas().forEach(m=>{

html+=`
<option ${m.maquina==sel?'selected':''}>
${m.maquina}
</option>
`;

});

return html;

}

function novo(d={}){

let r=tb.tBodies[0].insertRow();

r.innerHTML=`



<td>
<select>
${comboMaquinas(d.maquina)}
</select>
</td>





<td>
<select>
<option ${d.freq=="Diária"?"selected":""}>Diária</option>
<option ${d.freq=="Semanal"?"selected":""}>Semanal</option>
<option ${d.freq=="Quinzenal"?"selected":""}>Quinzenal</option>
<option ${d.freq=="Mensal"?"selected":""}>Mensal</option>
<option ${d.freq=="Trimestral"?"selected":""}>Trimestral</option>
<option ${d.freq=="Semestral"?"selected":""}>Semestral</option>
<option ${d.freq=="Anual"?"selected":""}>Anual</option>
</select>
</td>

<td>
<input type="date" value="${d.ultima||''}">
</td>

<td>
<input type="date" value="${d.proxima||''}">
</td>

<td>
<input value="${d.nome||d.responsavel||''}">
</td>

<td>
<input value="${d.ultimaUtilizacao||d.obs||''}">
</td>

<td>
<button class="b5" onclick="excluir(this)">X</button>
</td>

`;

r.querySelectorAll("input,select").forEach(e=>{

e.oninput=()=>{
salvar();
filtrar();
};

});

renum();
salvar();

}

function excluir(btn){

if(!confirm("Excluir registro?")) return;

btn.closest("tr").remove();

renum();
salvar();

}

function renum(){

indicadores();

}

function dados(){

return [...tb.tBodies[0].rows].map(r=>({

maquina:r.cells[0].querySelector('select').value,
freq:r.cells[1].querySelector('select').value,
ultima:r.cells[2].querySelector('input').value,
proxima:r.cells[3].querySelector('input').value,
responsavel:r.cells[4].querySelector('input').value,
obs:r.cells[5].querySelector('input').value

}));

}
function salvar(){

localStorage.setItem(
'lubrificacao_v24',
JSON.stringify(dados())
);

indicadores();

}

function salvarManual(){

salvar();

aviso("Dados salvos com sucesso.");

}

function carregar(){

let d=JSON.parse(
localStorage.getItem('lubrificacao_v24')||'[]'
);

if(d.length){

d.forEach(x=>novo(x));

}

}

function indicadores(){

let d=dados();

let total=0;
let venc=0;
let hj=0;
let ok=0;

let hojeData=new Date();
hojeData.setHours(0,0,0,0);

[...tb.tBodies[0].rows].forEach(r=>{

r.classList.remove("vencido","hoje","emdia");

let prox=r.cells[3].querySelector('input').value;

if(!prox) return;

let data=new Date(prox);
data.setHours(0,0,0,0);

total++;

if(data.getTime()<hojeData.getTime()){

venc++;
r.classList.add("vencido");

}
else if(data.getTime()==hojeData.getTime()){

hj++;
r.classList.add("hoje");

}
else{

ok++;
r.classList.add("emdia");

}

});

tot.innerText=total;
vencidos.innerText=venc;
hoje.innerText=hj;
emdia.innerText=ok;

}

function filtrar(){

let txt=pesquisa.value.toLowerCase();

[...tb.tBodies[0].rows].forEach(r=>{

let textoBusca =

r.cells[0].querySelector('select').value + " " +
r.cells[4].querySelector('input').value;

let ok =
textoBusca.toLowerCase().includes(txt);

r.style.display=ok?'':'none';

});

}

function exportarExcel(){

let linhas=[[
"Máquina",
"Frequência",
"Última",
"Próxima",
"Nome",
"Última Utilização"
]];

dados().forEach((d,i)=>{

linhas.push([
d.maquina,
d.freq,
d.ultima,
d.proxima,
d.responsavel,
d.obs
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

ws['!autofilter'] = {
ref:"A1:F1"
};

ws['!cols'] = [
{wch:20},
{wch:15},
{wch:12},
{wch:12},
{wch:20},
{wch:40}
];

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Lubrificacao"
);

XLSX.writeFile(
wb,
"Lubrificacao.xlsx"
);

aviso("Excel exportado com sucesso.");

}
pesquisa.oninput=filtrar;

carregar();

</script>

</body>
</html>
