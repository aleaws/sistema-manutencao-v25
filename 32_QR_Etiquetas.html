<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR Etiquetas</title>

<style>

body{
font-family:Arial;
padding:20px;
background:white;
}

.card{
border:2px solid #000;
padding:10px;
margin:8px;
display:inline-block;
text-align:center;
width:220px;
height:320px;
vertical-align:top;
background:white;
}

@media print{

button{
display:none;
}

#cabecalho{
display:none;
}

body{
padding:0;
}

}

img{
width:180px;
height:180px;
}

button{
padding:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div
id="cabecalho"
style="
text-align:center;
margin-bottom:20px;
">

<h1>
BONIER
</h1>

<h2>
Etiquetas QR de Manutenção
</h2>

</div>

<button onclick="window.print()">
🖨 Imprimir
</button>

<button onclick="somenteMaquinas()">
🟦 Máquinas
</button>

<button onclick="somenteDispositivos()">
🟩 Dispositivos
</button>

<button onclick="mostrarTodos()">
📋 Todos
</button>

<input
id="busca"
placeholder="🔎 Buscar QR"
onkeyup="filtrarQR()"
style="
padding:10px;
width:250px;
margin-left:10px;
">

<div id="lista"></div>

<script>

function criarEtiqueta(nome,tipo){

let url =
'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' +
encodeURIComponent(
'https://aleaws.github.io/sistema-manutencao-v25/31_QR_Registro.html?id=' + nome);

lista.innerHTML += `
<div class="card ${tipo}">

<div style="
font-size:18px;
font-weight:bold;
margin-bottom:10px;
">
BONIER
</div>

<div style="
font-size:14px;
font-weight:bold;
margin-bottom:10px;
">
${nome}
</div>

<img src="${url}">

<div style="
margin-top:10px;
font-size:12px;
">
Escaneie para abrir chamado
</div>

</div>
`;

}

</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL = 'https://wzcrqzbwcsmfwenzcxkf.supabase.co';

const SUPABASE_KEY = 'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';

const bancoSupabase =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);


async function carregarMaquinas(){

const { data, error } =
await bancoSupabase
.from('maquinas')
.select('*');

if(error){

console.error(error);

return;

}

data.forEach(m => {

criarEtiqueta(
'🟦 Máquina: ' + m.maquina,
'maquina'
);

});

}


async function carregarDispositivos(){

const { data, error } =
await bancoSupabase
.from('dispositivos')
.select('*');

if(error){

console.error(error);

return;

}

data.forEach(d => {

criarEtiqueta(
d.dispositivo,
'dispositivo'
);
});

}

carregarMaquinas();

carregarDispositivos();

function somenteMaquinas(){

document
.querySelectorAll('.dispositivo')
.forEach(e=>e.style.display='none');

document
.querySelectorAll('.maquina')
.forEach(e=>e.style.display='inline-block');

}

function somenteDispositivos(){

document
.querySelectorAll('.maquina')
.forEach(e=>e.style.display='none');

document
.querySelectorAll('.dispositivo')
.forEach(e=>e.style.display='inline-block');

}

function mostrarTodos(){

document
.querySelectorAll(
'.maquina,.dispositivo'
)
.forEach(e=>
e.style.display='inline-block'
);

}

function filtrarQR(){

const texto =
document.getElementById('busca')
.value
.toLowerCase();

document
.querySelectorAll('.card')
.forEach(card=>{

if(
card.innerText
.toLowerCase()
.includes(texto)
){

card.style.display =
'inline-block';

}else{

card.style.display =
'none';

}

});

}

</script>


</body>
</html>
