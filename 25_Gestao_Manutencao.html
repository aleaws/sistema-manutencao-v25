<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>25_Gestao_Manutencao</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--azul:#184b78;--azul2:#0f3557;--verde:#198754;--vermelho:#dc3545;--amarelo:#ffc107;--laranja:#fd7e14;--cinza:#6c757d;--bg:#eef2f5;--card:#fff;--borda:#d9dee5;--texto:#202428}
*{box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);margin:0;color:var(--texto)}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:white;padding:15px;text-align:center;font-size:24px;font-weight:bold}
.container{max-width:1320px;margin:auto;padding:14px}
.card{background:white;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:14px}
.topo{display:flex;gap:10px;align-items:end;justify-content:space-between;flex-wrap:wrap}
.busca{flex:1;min-width:280px}
label{display:block;font-weight:bold;font-size:13px;margin-bottom:6px;color:#26313a}
input,select{width:100%;padding:11px;border:1px solid var(--borda);border-radius:9px;font-size:15px;background:white}
button{padding:10px 14px;border:none;border-radius:9px;background:var(--azul);color:white;font-weight:bold;cursor:pointer;font-size:14px}
.btn-verde{background:var(--verde)}.btn-laranja{background:var(--laranja)}.btn-cinza{background:var(--cinza)}
.botoes{display:flex;gap:8px;flex-wrap:wrap}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.filtros button{background:#f8fafc;color:#24313d;border:1px solid #d7dee7;padding:8px 11px;font-size:13px}
.filtros button.ativo{background:var(--azul);color:#fff;border-color:var(--azul)}
.resumo{font-size:13px;color:#5b6570;margin-top:8px}.resumo-forte{font-size:14px;color:#26313a;margin-top:8px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}
.ind{background:#f8fafc;border:1px solid #e8edf2;border-radius:10px;padding:10px;text-align:center;min-height:74px;display:flex;flex-direction:column;justify-content:center;cursor:pointer}
.ind.ativo{background:#e8f2ff;border-color:var(--azul);box-shadow:0 0 0 3px rgba(24,75,120,.12)}
.ind.vermelho{background:#fff5f5;border-color:#f5c2c7}.ind.vermelho b{color:#842029}
.ind.amarelo{background:#fff9e6;border-color:#ffecb5}.ind.amarelo b{color:#664d03}
.ind.verde{background:#f2fff7;border-color:#badbcc}.ind.verde b{color:#0f5132}
.ind b{font-size:27px;color:var(--azul)}.ind span{font-size:13px;color:#4d5963;margin-top:4px}
.secao{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.tabela-wrap{width:100%;overflow:auto;border:1px solid var(--borda);border-radius:10px;background:white;max-height:650px}
table{width:100%;border-collapse:collapse;min-width:980px}
th,td{border-bottom:1px solid #e5e9ee;padding:9px 8px;font-size:14px;text-align:left;vertical-align:middle}
th{background:var(--azul);color:#fff;position:sticky;top:0;z-index:2;font-size:13px;text-transform:uppercase}
tbody tr:nth-child(even){background:#fbfcfe}tbody tr:hover{background:#eef6ff}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold;white-space:nowrap}
.bgCritica{background:#f8d7da;color:#842029}.bgAlta{background:#fff3cd;color:#664d03}.bgNormal{background:#d1e7dd;color:#0f5132}.bgBaixa{background:#cff4fc;color:#055160}
.stAberta{background:#fff3cd;color:#664d03}.stAndamento{background:#cfe2ff;color:#084298}.stPeca{background:#ffe5b4;color:#8a4b00}.stConcluida{background:#d1e7dd;color:#0f5132}.stCancelada{background:#f8d7da;color:#842029}
.barra-item{margin-bottom:9px}.barra-topo{display:flex;justify-content:space-between;font-size:13px;font-weight:bold;margin-bottom:4px}.barra-fundo{height:10px;background:#e9eef4;border-radius:999px;overflow:hidden}.barra-preenchida{height:100%;background:var(--azul);border-radius:999px}.barra-vermelha{background:var(--vermelho)}.barra-amarela{background:var(--amarelo)}.barra-verde{background:var(--verde)}
.acoes-linha{display:flex;gap:6px;flex-wrap:wrap}.acoes-linha button{padding:7px 10px;font-size:13px}
@media(max-width:850px){.topo{display:block}.botoes{margin-top:10px}button{width:100%}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>📈 25 - GESTÃO DA MANUTENÇÃO</header>
<div class="container">
<div class="card">
<div class="topo">
<div class="busca">
<label>🔎 Pesquisa em tempo real</label>
<input id="pesquisa" placeholder="Digite OS, máquina, dispositivo, prioridade, status, responsável ou descrição">
<div class="resumo" id="resumoBusca">Carregando registros...</div>
<div class="filtros">
<button id="fTodos" onclick="setFiltro('todos')" class="ativo">Todos</button>
<button id="fAbertas" onclick="setFiltro('abertas')">Abertas</button>
<button id="fAndamento" onclick="setFiltro('andamento')">Em andamento</button>
<button id="fPeca" onclick="setFiltro('peca')">Aguardando peça</button>
<button id="fCriticas" onclick="setFiltro('criticas')">Críticas</button>
<button id="fAtrasadas" onclick="setFiltro('atrasadas')">7+ dias</button>
<button onclick="limparFiltros()">Limpar</button>
</div>
<div class="resumo-forte" id="resumoAutomatico"></div>
</div>
<div class="botoes">
<button class="btn-verde" onclick="carregarTudo()">🔄 Atualizar</button>
<button class="btn-laranja" onclick="exportarExcel()">📊 Exportar Excel</button>
<button class="btn-cinza" onclick="window.location.href='26_Historico_Ordens_Servico.html'">📜 Histórico OS</button>
<button class="btn-cinza" onclick="window.location.href='00_Sistema_Manutencao_V25.html'">🏠 Menu</button>
</div>
</div>
</div>

<div class="card"><div class="grid">
<div class="ind" id="cardTotal" onclick="setFiltro('todos')"><b id="iTotal">0</b><span>Total</span></div>
<div class="ind vermelho" id="cardAbertas" onclick="setFiltro('abertas')"><b id="iAbertas">0</b><span>Abertas</span></div>
<div class="ind amarelo" id="cardAndamento" onclick="setFiltro('andamento')"><b id="iAndamento">0</b><span>Em Andamento</span></div>
<div class="ind amarelo" id="cardPeca" onclick="setFiltro('peca')"><b id="iPeca">0</b><span>Aguardando Peça</span></div>
<div class="ind vermelho" id="cardCriticas" onclick="setFiltro('criticas')"><b id="iCriticas">0</b><span>Críticas</span></div>
<div class="ind amarelo" id="cardAtrasadas" onclick="setFiltro('atrasadas')"><b id="iAtrasadas">0</b><span>7+ Dias</span></div>
<div class="ind verde" id="cardConcluidas" onclick="setFiltro('concluidas')"><b id="iConcluidas">0</b><span>Concluídas</span></div>
<div class="ind"><b id="iTempoMedio">0</b><span>Tempo médio</span></div>
</div></div>

</div>

<div class="card">
<h3>📜 Histórico Geral das OS</h3>
<div class="tabela-wrap">
<table id="tbHistorico"><thead><tr><th>OS</th><th>Data</th><th>Máquina</th><th>Dispositivo</th><th>Prioridade</th><th>Status</th><th>Responsável</th><th>Dias</th></tr></thead><tbody id="tb"></tbody></table>
</div>
</div>

</div>



</div>

<script>
const SUPABASE_URL='https://wzcrqzbwcsmfwenzcxkf.supabase.co';
const SUPABASE_KEY='sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';
const bancoSupabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let listaCompleta=[],listaFiltrada=[],filtroAtivo='todos';

function el(id){return document.getElementById(id)}
function valor(v){return (v===null||v===undefined)?'':String(v)}
function normalizar(v){return valor(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function dataISO(r){let d=r.data||r.created_at||'';if(!d)return '';if(String(d).includes('/')){let p=String(d).split('/');return p[2]+'-'+p[1]+'-'+p[0]}return String(d).substring(0,10)}
function dataBR(d){if(!d)return '';if(String(d).includes('/'))return d;let p=String(d).split('T')[0].split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d}
function diasAberto(r){let d=dataISO(r);if(!d)return 0;let i=new Date(d),h=new Date();i.setHours(0,0,0,0);h.setHours(0,0,0,0);return Math.max(0,Math.floor((h-i)/86400000))}
function classePrioridade(p){if(p==='Crítica')return 'bgCritica';if(p==='Alta')return 'bgAlta';if(p==='Normal')return 'bgNormal';return 'bgBaixa'}
function classeStatus(s){if(s==='Aberta')return 'stAberta';if(s==='Em Andamento')return 'stAndamento';if(s==='Aguardando Peça')return 'stPeca';if(s==='Concluída')return 'stConcluida';if(s==='Cancelada')return 'stCancelada';return 'stAberta'}
function textoBusca(r){return normalizar([r.numero,r.data,r.maquina,r.dispositivo,r.prioridade,r.status,r.responsavel,r.descricao].join(' '))}
function passaFiltro(r){let s=r.status||'',p=r.prioridade||'',ab=s!=='Concluída'&&s!=='Cancelada';if(filtroAtivo==='abertas')return s==='Aberta';if(filtroAtivo==='andamento')return s==='Em Andamento';if(filtroAtivo==='peca')return s==='Aguardando Peça';if(filtroAtivo==='criticas')return p==='Crítica';if(filtroAtivo==='atrasadas')return ab&&diasAberto(r)>=7;if(filtroAtivo==='concluidas')return s==='Concluída';return true}
function setFiltro(f){filtroAtivo=f;filtrar()}
function limparFiltros(){filtroAtivo='todos';el('pesquisa').value='';filtrar()}
function filtrar(){let t=normalizar(el('pesquisa').value);listaFiltrada=listaCompleta.filter(r=>(!t||textoBusca(r).includes(t))&&passaFiltro(r));renderTudo()}
function contar(c,v){return listaCompleta.filter(x=>(x[c]||'')===v).length}
function ranking(campo){let r={};listaCompleta.forEach(x=>{let v=(x[campo]||'').trim();if(v)r[v]=(r[v]||0)+1});return Object.entries(r).sort((a,b)=>b[1]-a[1]).slice(0,8)}
function preencherTabela(id,dados){let tb=document.querySelector('#'+id+' tbody');tb.innerHTML='';if(!dados.length){tb.innerHTML='<tr><td colspan="3">Sem dados</td></tr>';return}dados.forEach((x,i)=>tb.innerHTML+=`<tr><td>${i+1}</td><td>${x[0]}</td><td>${x[1]}</td></tr>`)}
function resumoCampo(c){let r={};listaCompleta.forEach(x=>{let v=(x[c]||'Não informado').trim()||'Não informado';r[v]=(r[v]||0)+1});return Object.entries(r).sort((a,b)=>b[1]-a[1])}
function corBarra(n){if(n==='Crítica')return 'barra-vermelha';if(['Alta','Aberta','Em Andamento','Aguardando Peça'].includes(n))return 'barra-amarela';if(['Concluída','Normal'].includes(n))return 'barra-verde';return ''}
function grafico(id,dados){let box=el(id);let max=Math.max(...dados.map(x=>x[1]),1);box.innerHTML='';dados.forEach(x=>{let p=Math.max(4,Math.round((x[1]/max)*100));box.innerHTML+=`<div class="barra-item"><div class="barra-topo"><span>${x[0]}</span><span>${x[1]}</span></div><div class="barra-fundo"><div class="barra-preenchida ${corBarra(x[0])}" style="width:${p}%"></div></div></div>`})}
function renderIndicadores(){let total=listaCompleta.length,con=contar('status','Concluída'),atr=listaCompleta.filter(x=>x.status!=='Concluída'&&x.status!=='Cancelada'&&diasAberto(x)>=7).length;el('iTotal').textContent=total;el('iAbertas').textContent=contar('status','Aberta');el('iAndamento').textContent=contar('status','Em Andamento');el('iPeca').textContent=contar('status','Aguardando Peça');el('iConcluidas').textContent=con;el('iCriticas').textContent=contar('prioridade','Crítica');el('iAtrasadas').textContent=atr;let concl=listaCompleta.filter(x=>x.status==='Concluída');let med=concl.length?Math.round(concl.reduce((s,x)=>s+diasAberto(x),0)/concl.length):0;el('iTempoMedio').textContent=med+'d';el('resumoBusca').textContent='Mostrando '+listaFiltrada.length+' de '+total+' OS';el('resumoAutomatico').textContent='Abertas '+contar('status','Aberta')+' | Críticas '+contar('prioridade','Crítica')+' | Aguardando peça '+contar('status','Aguardando Peça')+' | Atrasadas '+atr;}
function renderTabela(){let tb=el('tb');tb.innerHTML='';if(!listaFiltrada.length){tb.innerHTML='<tr><td colspan="8">Sem dados</td></tr>';return}listaFiltrada.forEach(r=>tb.innerHTML+=`<tr><td><b>${r.numero||''}</b></td><td>${dataBR(dataISO(r))}</td><td>${r.maquina||''}</td><td>${r.dispositivo||''}</td><td><span class="badge ${classePrioridade(r.prioridade)}">${r.prioridade||''}</span></td><td><span class="badge ${classeStatus(r.status)}">${r.status||''}</span></td><td>${r.responsavel||''}</td><td>${diasAberto(r)}</td></tr>`)}
function atualizarAtivos(){['cardTotal','cardAbertas','cardAndamento','cardPeca','cardCriticas','cardAtrasadas','cardConcluidas'].forEach(id=>el(id)?.classList.remove('ativo'));let m={todos:'cardTotal',abertas:'cardAbertas',andamento:'cardAndamento',peca:'cardPeca',criticas:'cardCriticas',atrasadas:'cardAtrasadas',concluidas:'cardConcluidas'};el(m[filtroAtivo])?.classList.add('ativo')}
function renderTudo(){renderIndicadores();renderTabela();preencherTabela('rankMaq',ranking('maquina'));preencherTabela('rankDisp',ranking('dispositivo'));atualizarAtivos()}
async function carregarTudo(){let r=await bancoSupabase.from('ordens_servico').select('*').order('data',{ascending:false});if(r.error){alert('Erro: '+r.error.message);return}listaCompleta=r.data||[];filtrar()}
function exportarExcel(){let wb=XLSX.utils.book_new();let linhas=[['OS','Data','Máquina','Dispositivo','Prioridade','Status','Responsável','Descrição']];listaFiltrada.forEach(r=>linhas.push([r.numero||'',dataBR(dataISO(r)),r.maquina||'',r.dispositivo||'',r.prioridade||'',r.status||'',r.responsavel||'',r.descricao||'']));XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(linhas),'OS');XLSX.writeFile(wb,'Gestao_Manutencao.xlsx')}
el('pesquisa').addEventListener('input',filtrar);
document.addEventListener('DOMContentLoaded',carregarTudo);
</script>
</body>
</html>
