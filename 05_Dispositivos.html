<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>05_Dispositivos</title>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:12px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.ind{font-size:22px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:6px;color:#fff;font-weight:bold;cursor:pointer}
.b1{background:#1f4e79}
.b2{background:#198754}
.b3{background:#fd7e14}
.b4{background:#343a40}
.b5{background:#dc3545}

.msg{display:none;padding:8px;background:#d1e7dd;color:#0f5132;border-radius:6px;margin-top:8px}

table{
width:100%;
table-layout:fixed;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:3px;
font-size:11px;
}

th{
background:#1f4e79;
color:#fff;
}

input,select{
width:100%;
box-sizing:border-box;
font-size:11px;
border:none;
padding:3px;
}

.c1{width:40px}
.c2{width:100px}
.c3{width:220px}
.c4{width:180px}
.c5{width:120px}
.c6{width:auto}
.c7{width:70px}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="permissoes.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>


<header style="position:relative;">

<div style="
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
gap:8px;
">

<button
onclick="window.location.href='00_Sistema_Manutencao_V25.html'"
style="
background:#28a745;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
⬅ Menu
</button>

<button
onclick="location.reload()"
style="
background:#17a2b8;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
">
🔄 Atualizar
</button>

</div>

<span style="
font-size:30px;
font-weight:bold;
">
🛠 CADASTRO DE DISPOSITIVOS


</header>

</header>
</header>

<div class="container">

<div class="card">
<div class="grid">

<div>
Total de Dispositivos
<div class="ind" id="tot">0</div>
</div>

<div>
Ativos
<div class="ind" id="ativos">0</div>
</div>

<div>
Manutenção
<div class="ind" id="manut">0</div>
</div>

</div>
</div>

<div class="card">

<div class="grid">

<div>
<label>Pesquisa</label>
<input id="pesquisa" placeholder="Pesquisar...">
</div>

<div>
<label>Status</label>
<select id="fStatus">
<option value="">Todos</option>
<option>Ativo</option>
<option>Manutenção</option>
<option>Inativo</option>
</select>
</div>

</div>

</div>

<div class="card">

<button id="btNovoDispositivo" class="b1" onclick="novo()">Novo Dispositivo</button>

<button id="btSalvarDispositivo" class="b2" onclick="salvarManual()">Salvar</button>

<button
id="btSupabase"
class="b2"
onclick="enviarParaSupabase()"
style="display:none;">
📤 Enviar para Supabase
</button>

<button id="btDuplicados" class="b3" onclick="verificarDuplicados()">
🔍 Verificar Duplicados
</button>

<button class="b3" onclick="exportarExcel()">📊 Exportar Excel</button>

<button class="b4" onclick="window.print()">Imprimir</button>

<div id="msg" class="msg"></div>

</div>

<div class="card">

<table id="tb">

<thead>
<tr>
<th class="c1">Nº</th>
<th class="c2">Código</th>
<th class="c3">Dispositivo</th>
<th class="c4">Máquina Vinculada</th>
<th class="c5">Status</th>
<th class="c6">Observação</th>
<th class="c7">Excluir</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const SUPABASE_URL = 'https://wzcrqzbwcsmfwenzcxkf.supabase.co';

const SUPABASE_KEY = 'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';

const bancoSupabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

verificarPermissao(
"05_Dispositivos.html"
);

let usuarioLogado =
localStorage.getItem(
"usuarioLogado"
);

if(usuarioLogado==="Alexandre"){

    btSupabase.style.display =
    "inline-block";

}

function aviso(t){
msg.innerText=t;
msg.style.display='block';
setTimeout(()=>msg.style.display='none',2500);
}

function listaMaquinas(){

let maquinas=JSON.parse(
localStorage.getItem('cadastro_maquinas_v24')||'[]'
);

return maquinas;

}

function selectMaquinas(selecionada=""){

let maquinas=listaMaquinas();

let html=`<option value="">Selecione</option>`;

maquinas.forEach(m=>{

html+=`
<option ${m.maquina==selecionada?'selected':''}>
${m.maquina}
</option>
`;

});

return html;

}

function novo(d={}){

let r=tb.tBodies[0].insertRow();

r.innerHTML=`

<td></td>

<td>
<input value="${d.codigo||''}">
</td>

<td>
<input value="${d.dispositivo||''}">
</td>

<td>
<select>
${selectMaquinas(d.maquina||'')}
</select>
</td>

<td>
<select>
<option ${d.status=="Ativo"?"selected":""}>Ativo</option>
<option ${d.status=="Manutenção"?"selected":""}>Manutenção</option>
<option ${d.status=="Inativo"?"selected":""}>Inativo</option>
</select>
</td>

<td>
<input value="${d.obs||''}">
</td>

<td>
<button class="b5" onclick="excluir(this)">X</button>
</td>

`;

r.querySelectorAll("input,select").forEach(e=>{
e.oninput=()=>{

let dispositivo =
r.cells[2].querySelector('input')
.value
.trim()
.toLowerCase();

let repetidos = 0;

[...tb.tBodies[0].rows].forEach(l=>{

let nome =
l.cells[2].querySelector('input')
.value
.trim()
.toLowerCase();

if(nome && nome===dispositivo){
repetidos++;
}

});

if(repetidos>1){

alert("⚠ Dispositivo já cadastrado.");

r.cells[2].querySelector('input').value='';

return;

}

salvar();
filtrar();

};
});

if(
somenteLeitura()
){

r.querySelectorAll(
"input,select"
).forEach(e=>{

e.disabled = true;

});

}

renum();
salvar();

}

function excluir(btn){

let usuario =
localStorage.getItem(
"usuarioLogado"
);

if(
usuario !== "Alexandre"
){

registrarLog(
"Tentou excluir dispositivo"
);

alert(
"Somente Alexandre pode excluir dispositivos."
);

return;

}

if(!confirm("Excluir dispositivo?")) return;

registrarLog(
"Excluiu dispositivo"
);

btn.closest("tr").remove();

renum();
salvar();

}

function renum(){

[...tb.tBodies[0].rows].forEach((r,i)=>{
r.cells[0].innerText=i+1;
});

indicadores();

}

function dados(){

return [...tb.tBodies[0].rows].map(r=>({

codigo:r.cells[1].querySelector('input').value,
dispositivo:r.cells[2].querySelector('input').value,
maquina:r.cells[3].querySelector('select').value,
status:r.cells[4].querySelector('select').value,
obs:r.cells[5].querySelector('input').value

}));

}

function salvar(){

localStorage.setItem(
'cadastro_dispositivos_v24',
JSON.stringify(dados())
);

indicadores();

}

function salvarManual(){

salvar();

aviso("Dados salvos com sucesso.");

}

async function carregar(){

const { data, error } =
await bancoSupabase
.from('dispositivos')
.select('*');

if(error){

    console.error(error);
    alert('Erro ao carregar dispositivos');

    return;

}

tb.tBodies[0].innerHTML = '';

if(data.length){

    data.forEach(x=>novo(x));

}

indicadores();

}

function indicadores(){

let d=dados();

tot.innerText=d.length;

ativos.innerText=
d.filter(x=>x.status=="Ativo").length;

manut.innerText=
d.filter(x=>x.status=="Manutenção").length;

}

function filtrar(){

let txt=
pesquisa.value.toLowerCase().trim();

[...tb.tBodies[0].rows].forEach(r=>{

let codigo =
r.cells[1].querySelector('input')
.value.toLowerCase();

let dispositivo =
r.cells[2].querySelector('input')
.value.toLowerCase();

let maquina =
r.cells[3].querySelector('select')
.value.toLowerCase();

let obs =
r.cells[5].querySelector('input')
.value.toLowerCase();

let ok = false;

if(!txt){

    ok = true;

}else{

    ok =
    codigo === txt ||
    dispositivo.includes(txt) ||
    maquina.includes(txt) ||
    obs.includes(txt);

}

if(fStatus.value){

    ok = ok &&
    r.cells[4].querySelector('select').value === fStatus.value;

}

r.style.display = ok ? '' : 'none';

});

}
function exportarCSV(){



let linhas=[[
"N",
"Codigo",
"Dispositivo",
"Maquina",
"Status",
"Observacao"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.codigo,
d.dispositivo,
d.maquina,
d.status,
d.obs
]);

});

let csv=
linhas.map(r=>
r.map(c=>`"${c}"`).join(";")
).join("\n");

let a=document.createElement("a");

a.href=URL.createObjectURL(
new Blob([csv],{type:"text/csv"})
);

a.download="Cadastro_Dispositivos.csv";

a.click();

aviso("CSV exportado com sucesso.");

}

function exportarExcel(){

let linhas=[[
"N",
"Codigo",
"Dispositivo",
"Maquina",
"Status",
"Observacao"
]];

dados().forEach((d,i)=>{

linhas.push([
i+1,
d.codigo,
d.dispositivo,
d.maquina,
d.status,
d.obs
]);

});

let ws =
XLSX.utils.aoa_to_sheet(linhas);

ws['!autofilter'] = {
ref:"A1:F1"
};

ws['!cols'] = [
{wch:6},
{wch:15},
{wch:30},
{wch:20},
{wch:15},
{wch:50}
];

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Dispositivos"
);

XLSX.writeFile(
wb,
"Cadastro_Dispositivos.xlsx"
);

aviso("Excel exportado com sucesso.");

}

function verificarDuplicados(){

let lista = {};

let repetidos = [];

dados().forEach(x=>{

let nome =
(x.dispositivo||'')
.trim()
.toLowerCase();

if(!nome) return;

if(lista[nome]){

if(!repetidos.includes(x.dispositivo)){
repetidos.push(x.dispositivo);
}

}else{

lista[nome]=true;

}

});

if(repetidos.length){

alert(
"⚠ Dispositivos duplicados:\n\n" +
repetidos.join("\n")
);

}else{

alert(
"✅ Nenhum dispositivo duplicado encontrado."
);

}

}

async function enviarParaSupabase(){

if(
!confirm(
'Sincronizar dispositivos com o Supabase?'
)
){
    return;
}

const lista = dados();

const { error: erroDelete } =
await bancoSupabase
.from('dispositivos')
.delete()
.neq('id',0);

if(erroDelete){

    console.error(erroDelete);

    alert(
    'Erro ao limpar tabela'
    );

    return;

}

const { error } =
await bancoSupabase
.from('dispositivos')
.insert(lista);

if(error){

    console.error(error);

    alert(
    'Erro ao enviar'
    );

    return;

}

alert(
lista.length +
' dispositivos sincronizados com sucesso'
);

}

pesquisa.oninput=filtrar;
fStatus.onchange=filtrar;

carregar();

if(
somenteLeitura()
){

btNovoDispositivo.style.display =
"none";

btSalvarDispositivo.style.display =
"none";

btDuplicados.style.display =
"none";

document
.querySelectorAll(".b5")
.forEach(btn=>{

btn.style.display =
"none";

});

}
</script>

</body>
</html>
