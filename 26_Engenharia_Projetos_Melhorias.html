<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Engenharia - Projetos e Melhorias</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --azul-900: #163b5c;
      --azul-700: #1f5f93;
      --azul-500: #4f93c8;
      --verde-600: #21805b;
      --amarelo-600: #b7791f;
      --vermelho-600: #c53030;
      --roxo-600: #6b46c1;
      --cinza-950: #17202a;
      --cinza-700: #4b5563;
      --cinza-500: #6b7280;
      --cinza-200: #e5e7eb;
      --cinza-100: #f3f4f6;
      --branco: #ffffff;
      --sombra: 0 10px 26px rgba(17, 24, 39, 0.10);
      --raio: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--cinza-950);
      background: #f5f7fa;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: var(--raio);
      cursor: pointer;
      font-weight: 700;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      color: var(--branco);
      background: var(--azul-700);
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.18);
    }

    .titulo-app {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-size: 20px;
      font-weight: 800;
    }

    .marca {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: var(--raio);
      color: var(--azul-900);
      background: var(--branco);
      font-size: 21px;
    }

    .acoes-topo {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 9px 12px;
      color: var(--branco);
      background: var(--azul-900);
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .btn:hover {
      background: #0f2c46;
      transform: translateY(-1px);
    }

    .btn-claro {
      color: var(--azul-900);
      background: var(--branco);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .btn-perigo {
      background: var(--vermelho-600);
    }

    main {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .indicadores {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .indicador {
      min-height: 84px;
      padding: 12px;
      border: 1px solid var(--cinza-200);
      border-left: 5px solid var(--azul-500);
      border-radius: var(--raio);
      background: var(--branco);
      box-shadow: 0 5px 15px rgba(17, 24, 39, 0.06);
    }

    .indicador strong {
      display: block;
      color: var(--azul-900);
      font-size: 24px;
      line-height: 1.1;
    }

    .indicador span {
      display: block;
      margin-top: 8px;
      color: var(--cinza-700);
      font-size: 13px;
      font-weight: 700;
    }

    .indicador.atrasado {
      border-left-color: var(--vermelho-600);
    }

    .indicador.ganho {
      border-left-color: var(--verde-600);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .painel {
      border: 1px solid var(--cinza-200);
      border-radius: var(--raio);
      background: var(--branco);
      box-shadow: var(--sombra);
    }

    .painel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--cinza-200);
    }

    .painel-header h2 {
      margin: 0;
      font-size: 16px;
      color: var(--azul-900);
    }

    form {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--cinza-700);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--cinza-200);
      border-radius: var(--raio);
      color: var(--cinza-950);
      background: var(--branco);
      outline: none;
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--azul-500);
      box-shadow: 0 0 0 3px rgba(79, 147, 200, 0.18);
    }

    .duas-colunas {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-acoes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filtros {
      display: grid;
      grid-template-columns: minmax(200px, 1fr) repeat(4, minmax(130px, 160px));
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--cinza-200);
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 12px 0;
      flex-wrap: wrap;
    }

    .tab {
      min-height: 34px;
      padding: 8px 12px;
      color: var(--cinza-700);
      background: var(--cinza-100);
    }

    .tab.ativo {
      color: var(--branco);
      background: var(--azul-900);
    }

    .conteudo {
      padding: 12px;
    }

    .kanban {
      display: grid;
      grid-template-columns: repeat(5, minmax(190px, 1fr));
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .coluna {
      min-width: 190px;
      min-height: 260px;
      border: 1px solid var(--cinza-200);
      border-radius: var(--raio);
      background: #fafafa;
    }

    .coluna h3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0;
      padding: 10px;
      border-bottom: 1px solid var(--cinza-200);
      color: var(--azul-900);
      font-size: 13px;
      text-transform: uppercase;
    }

    .coluna-lista {
      display: grid;
      gap: 8px;
      padding: 8px;
    }

    .acao-card {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--cinza-200);
      border-radius: var(--raio);
      background: var(--branco);
      box-shadow: 0 4px 10px rgba(17, 24, 39, 0.06);
    }

    .acao-card h4 {
      margin: 0;
      font-size: 14px;
      line-height: 1.3;
    }

    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--cinza-500);
      font-size: 12px;
      font-weight: 700;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 7px;
      border-radius: 999px;
      color: var(--azul-900);
      background: #eaf2f9;
      font-size: 11px;
      font-weight: 800;
    }

    .tag.alta,
    .tag.critica,
    .tag.atrasada {
      color: var(--branco);
      background: var(--vermelho-600);
    }

    .tag.media {
      color: var(--branco);
      background: var(--amarelo-600);
    }

    .tag.baixa {
      color: var(--branco);
      background: var(--verde-600);
    }

    .card-acoes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mini-btn {
      min-height: 30px;
      padding: 6px 8px;
      color: var(--azul-900);
      background: var(--cinza-100);
      border: 1px solid var(--cinza-200);
      font-size: 12px;
    }

    .mini-btn:hover {
      background: #e8edf3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--cinza-200);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--azul-900);
      background: var(--cinza-100);
      font-size: 12px;
      text-transform: uppercase;
    }

    .tabela-wrap {
      overflow-x: auto;
    }

    .vazio {
      padding: 24px;
      color: var(--cinza-500);
      text-align: center;
      font-weight: 700;
    }

    .oculto {
      display: none;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .filtros {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .acoes-topo,
      .btn {
        width: 100%;
      }

      .duas-colunas,
      .filtros {
        grid-template-columns: 1fr;
      }

      main {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="titulo-app">
      <span class="marca">📐</span>
      <span>Engenharia - Projetos e Melhorias</span>
    </div>
    <div class="acoes-topo">
      <button class="btn btn-claro" type="button" onclick="voltarMenu()">⬅ Menu</button>
      <button class="btn btn-claro" type="button" onclick="exportarCSV()">Exportar CSV</button>
      <button class="btn" type="button" onclick="document.getElementById('formAcao').requestSubmit()">Salvar</button>
      <button class="btn btn-claro" type="button" onclick="sincronizarSupabase()">🔄 Sincronizar</button>
    </div>
  </header>

  <main>
    <section class="indicadores">
      <div class="indicador"><strong id="indTotal">0</strong><span>Ações cadastradas</span></div>
      <div class="indicador"><strong id="indAndamento">0</strong><span>Em andamento</span></div>
      <div class="indicador atrasado"><strong id="indAtrasadas">0</strong><span>Atrasadas</span></div>
      <div class="indicador"><strong id="indConcluidas">0</strong><span>Concluídas</span></div>
      <div class="indicador ganho"><strong id="indGanho">R$ 0</strong><span>Ganho estimado</span></div>
    </section>

    <section class="layout">
      <aside class="painel">
        <div class="painel-header">
          <h2 id="tituloForm">Nova ação</h2>
          <button class="mini-btn" type="button" onclick="limparFormulario()">Limpar</button>
        </div>

        <form id="formAcao">
          <input id="acaoId" type="hidden">

          <label>
            Título
            <input id="titulo" required placeholder="Ex.: Reduzir setup da máquina X">
          </label>

          <label>
            Descrição / problema
            <textarea id="descricao" placeholder="Descreva o problema, oportunidade ou projeto"></textarea>
          </label>

          <div class="duas-colunas">
            <label>
              Tipo
              <select id="tipo">
                <option>Melhoria</option>
                <option>Projeto</option>
                <option>Ação corretiva</option>
                <option>Alteração de processo</option>
                <option>Dispositivo</option>
                <option>Documentação</option>
              </select>
            </label>

            <label>
              Status
              <select id="status">
                <option>Aberto</option>
                <option>Em andamento</option>
                <option>Aguardando</option>
                <option>Concluído</option>
                <option>Cancelado</option>
              </select>
            </label>
          </div>

          <div class="duas-colunas">
            <label>
              Prioridade
              <select id="prioridade">
                <option>Baixa</option>
                <option selected>Média</option>
                <option>Alta</option>
                <option>Crítica</option>
              </select>
            </label>

            <label>
              Área / máquina
              <input id="area" placeholder="Ex.: Prensa 02, Solda, Usinagem">
            </label>
          </div>

          <div class="duas-colunas">
            <label>
              Responsável
              <input id="responsavel" placeholder="Nome do responsável">
            </label>

            <label>
              Prazo
              <input id="prazo" type="date">
            </label>
          </div>

          <div class="duas-colunas">
            <label>
              Ganho estimado (R$)
              <input id="ganho" type="number" min="0" step="0.01" placeholder="0,00">
            </label>

            <label>
              Origem da solicitação
              <select id="origem">
                <option>Engenharia</option>
                <option>Manutenção</option>
                <option>Produção</option>
                <option>Qualidade</option>
                <option>Segurança</option>
                <option>Cliente</option>
                <option>Diretoria</option>
                <option>PCP</option>
                <option>Outros</option>
              </select>
            </label>
          </div>

          <label>
            Causa raiz / observações
            <textarea id="causa" placeholder="5 porquês, causa provável, análise técnica ou próximos passos"></textarea>
          </label>

          <div class="form-acoes">
            <button class="btn" type="submit">Salvar ação</button>
            <button class="btn btn-perigo" type="button" onclick="excluirSelecionada()">Excluir</button>
          </div>
        </form>
      </aside>

      <section class="painel">
        <div class="painel-header">
          <h2>Carteira de engenharia</h2>
          <span id="contadorLista" class="tag">0 itens</span>
        </div>

        <div class="filtros">
          <input id="busca" type="search" placeholder="Buscar por título, área, responsável...">
          <select id="filtroStatus">
            <option value="">Todos status</option>
            <option>Aberto</option>
            <option>Em andamento</option>
            <option>Aguardando</option>
            <option>Concluído</option>
            <option>Cancelado</option>
          </select>
          <select id="filtroPrioridade">
            <option value="">Todas prioridades</option>
            <option>Baixa</option>
            <option>Média</option>
            <option>Alta</option>
            <option>Crítica</option>
          </select>
          <select id="filtroTipo">
            <option value="">Todos tipos</option>
            <option>Melhoria</option>
            <option>Projeto</option>
            <option>Ação corretiva</option>
            <option>Alteração de processo</option>
            <option>Dispositivo</option>
            <option>Documentação</option>
          </select>
          <select id="ordenacao">
            <option value="prazo">Ordenar por prazo</option>
            <option value="prioridade">Ordenar por prioridade</option>
            <option value="ganho">Ordenar por ganho</option>
            <option value="criacao">Ordenar por criação</option>
          </select>
        </div>

        <div class="tabs">
          <button id="tabKanban" class="tab ativo" type="button" onclick="mudarVisualizacao('kanban')">Kanban</button>
          <button id="tabTabela" class="tab" type="button" onclick="mudarVisualizacao('tabela')">Tabela</button>
        </div>

        <div class="conteudo">
          <div id="visaoKanban" class="kanban"></div>
          <div id="visaoTabela" class="tabela-wrap oculto"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const SUPABASE_URL = 'https://wzcrqzbwcsmfwenzcxkf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';
    const bancoSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const TABELA_SUPABASE = 'engenharia_projetos';

    const CHAVE = 'engenharia_projetos_melhorias_v1';
    const STATUS = ['Aberto', 'Em andamento', 'Aguardando', 'Concluído', 'Cancelado'];
    const PESO_PRIORIDADE = { 'Crítica': 4, 'Alta': 3, 'Média': 2, 'Baixa': 1 };

    let acoes = carregar();
    let visualizacao = 'kanban';

    document.addEventListener('DOMContentLoaded', async function () {
      document.getElementById('formAcao').addEventListener('submit', salvarFormulario);
      ['busca', 'filtroStatus', 'filtroPrioridade', 'filtroTipo', 'ordenacao'].forEach(function (id) {
        document.getElementById(id).addEventListener('input', renderizar);
      });

      await carregarSupabase();

      if (!acoes.length) {
        acoes = dadosExemplo();
        await salvar();
      }

      renderizar();
    });

    function carregar() {
      try {
        return JSON.parse(localStorage.getItem(CHAVE) || '[]');
      } catch {
        return [];
      }
    }

    async function salvar() {
      localStorage.setItem(CHAVE, JSON.stringify(acoes));
      await salvarSupabase();
      renderizar();
    }

    async function carregarSupabase() {
      try {
        const { data, error } = await bancoSupabase
          .from(TABELA_SUPABASE)
          .select('*')
          .order('criadoEm', { ascending: false });

        if (error) {
          console.warn('Supabase indisponível:', error.message);
          return;
        }

        if (data && data.length) {
          acoes = data.map(function (x) {
            return {
              id: x.id,
              titulo: x.titulo || '',
              descricao: x.descricao || '',
              tipo: x.tipo || 'Melhoria',
              status: x.status || 'Aberto',
              prioridade: x.prioridade || 'Média',
              area: x.area || '',
              responsavel: x.responsavel || '',
              prazo: x.prazo || '',
              ganho: Number(x.ganho || 0),
              origem: x.origem || 'Engenharia',
              causa: x.causa || '',
              criadoEm: x.criadoEm || x.criado_em || new Date().toISOString(),
              atualizadoEm: x.atualizadoEm || x.atualizado_em || ''
            };
          });
          localStorage.setItem(CHAVE, JSON.stringify(acoes));
        }
      } catch (e) {
        console.warn('Erro ao carregar Supabase:', e);
      }
    }

    async function salvarSupabase() {
      try {
        if (!acoes.length) return true;

        const registros = acoes.map(function (x) {
          return {
            id: x.id,
            titulo: x.titulo || '',
            descricao: x.descricao || '',
            tipo: x.tipo || '',
            status: x.status || '',
            prioridade: x.prioridade || '',
            area: x.area || '',
            responsavel: x.responsavel || '',
            prazo: x.prazo || null,
            ganho: Number(x.ganho || 0),
            origem: x.origem || '',
            causa: x.causa || '',
            criadoEm: x.criadoEm || new Date().toISOString(),
            atualizadoEm: x.atualizadoEm || new Date().toISOString()
          };
        });

        const { error } = await bancoSupabase
          .from(TABELA_SUPABASE)
          .upsert(registros, { onConflict: 'id' });

        if (error) {
          console.error(error);
          alert('Salvou neste navegador, mas não sincronizou com Supabase: ' + error.message);
          return false;
        }
        return true;
      } catch (e) {
        console.error(e);
        alert('Salvou neste navegador, mas houve erro ao sincronizar com Supabase.');
        return false;
      }
    }

    async function sincronizarSupabase() {
      await carregarSupabase();
      renderizar();
      alert('Sincronização concluída.');
    }

    function dadosExemplo() {
      const hoje = new Date();
      const prazoCurto = new Date(hoje);
      prazoCurto.setDate(hoje.getDate() + 7);
      const prazoLongo = new Date(hoje);
      prazoLongo.setDate(hoje.getDate() + 21);

      return [
        {
          id: criarId(),
          titulo: 'Reduzir tempo de setup da linha principal',
          descricao: 'Mapear etapas de troca e separar atividades internas/externas.',
          tipo: 'Melhoria',
          status: 'Em andamento',
          prioridade: 'Alta',
          area: 'Produção',
          responsavel: 'Engenharia',
          prazo: formatarDataInput(prazoCurto),
          ganho: 3500,
          origem: 'Produção',
          causa: 'O setup depende de ferramentas preparadas somente após parada.',
          criadoEm: new Date().toISOString()
        },
        {
          id: criarId(),
          titulo: 'Revisar desenho do dispositivo de fixação',
          descricao: 'Atualizar revisão e registrar alteração técnica.',
          tipo: 'Dispositivo',
          status: 'Aberto',
          prioridade: 'Média',
          area: 'Usinagem',
          responsavel: 'Alexandre',
          prazo: formatarDataInput(prazoLongo),
          ganho: 1200,
          origem: 'Engenharia',
          causa: 'Peça apresenta variação de posicionamento durante inspeção.',
          criadoEm: new Date().toISOString()
        }
      ];
    }

    function criarId() {
      return 'ENG-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7).toUpperCase();
    }

    function formatarDataInput(data) {
      return data.toISOString().slice(0, 10);
    }

    async function salvarFormulario(evento) {
      evento.preventDefault();

      const id = valor('acaoId') || criarId();
      const existente = acoes.findIndex(function (acao) {
        return acao.id === id;
      });

      const registro = {
        id,
        titulo: valor('titulo'),
        descricao: valor('descricao'),
        tipo: valor('tipo'),
        status: valor('status'),
        prioridade: valor('prioridade'),
        area: valor('area'),
        responsavel: valor('responsavel'),
        prazo: valor('prazo'),
        ganho: Number(valor('ganho') || 0),
        origem: valor('origem'),
        causa: valor('causa'),
        criadoEm: existente >= 0 ? acoes[existente].criadoEm : new Date().toISOString(),
        atualizadoEm: new Date().toISOString()
      };

      if (existente >= 0) {
        acoes[existente] = registro;
      } else {
        acoes.unshift(registro);
      }

      await salvar();
      alert('Ação salva com sucesso.');
      limparFormulario();
    }

    function valor(id) {
      return document.getElementById(id).value.trim();
    }

    function preencherFormulario(id) {
      const acao = acoes.find(function (item) {
        return item.id === id;
      });
      if (!acao) return;

      document.getElementById('tituloForm').textContent = 'Editar ação';
      setValor('acaoId', acao.id);
      setValor('titulo', acao.titulo);
      setValor('descricao', acao.descricao);
      setValor('tipo', acao.tipo);
      setValor('status', acao.status);
      setValor('prioridade', acao.prioridade);
      setValor('area', acao.area);
      setValor('responsavel', acao.responsavel);
      setValor('prazo', acao.prazo);
      setValor('ganho', acao.ganho);
      setValor('origem', acao.origem);
      setValor('causa', acao.causa);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setValor(id, valorCampo) {
      document.getElementById(id).value = valorCampo || '';
    }

    function limparFormulario() {
      document.getElementById('tituloForm').textContent = 'Nova ação';
      document.getElementById('formAcao').reset();
      setValor('acaoId', '');
      setValor('prioridade', 'Média');
      setValor('status', 'Aberto');
      setValor('tipo', 'Melhoria');
      setValor('origem', 'Engenharia');
    }

    async function excluirSelecionada() {
      const id = valor('acaoId');
      if (!id) {
        alert('Selecione uma ação para excluir.');
        return;
      }

      if (!confirm('Deseja excluir esta ação?')) return;

      acoes = acoes.filter(function (acao) {
        return acao.id !== id;
      });
      await excluirSupabase(id);
      salvar();
      limparFormulario();
    }

    async function excluirSupabase(id) {
      try {
        await bancoSupabase.from(TABELA_SUPABASE).delete().eq('id', id);
      } catch(e) {
        console.warn('Erro ao excluir no Supabase', e);
      }
    }

    function mudarStatus(id, status) {
      const acao = acoes.find(function (item) {
        return item.id === id;
      });
      if (!acao) return;

      acao.status = status;
      acao.atualizadoEm = new Date().toISOString();
      salvar();
    }

    function registrosFiltrados() {
      const busca = normalizar(valor('busca'));
      const filtroStatus = valor('filtroStatus');
      const filtroPrioridade = valor('filtroPrioridade');
      const filtroTipo = valor('filtroTipo');
      const ordenacao = valor('ordenacao');

      const filtrados = acoes.filter(function (acao) {
        const texto = normalizar([
          acao.titulo,
          acao.descricao,
          acao.area,
          acao.responsavel,
          acao.origem,
          acao.causa
        ].join(' '));

        return (!busca || texto.includes(busca)) &&
          (!filtroStatus || acao.status === filtroStatus) &&
          (!filtroPrioridade || acao.prioridade === filtroPrioridade) &&
          (!filtroTipo || acao.tipo === filtroTipo);
      });

      filtrados.sort(function (a, b) {
        if (ordenacao === 'prioridade') return (PESO_PRIORIDADE[b.prioridade] || 0) - (PESO_PRIORIDADE[a.prioridade] || 0);
        if (ordenacao === 'ganho') return Number(b.ganho || 0) - Number(a.ganho || 0);
        if (ordenacao === 'criacao') return String(b.criadoEm || '').localeCompare(String(a.criadoEm || ''));
        return String(a.prazo || '9999-12-31').localeCompare(String(b.prazo || '9999-12-31'));
      });

      return filtrados;
    }

    function normalizar(texto) {
      return String(texto || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
    }

    function atrasada(acao) {
      if (!acao.prazo || acao.status === 'Concluído' || acao.status === 'Cancelado') return false;
      const hoje = new Date();
      hoje.setHours(0, 0, 0, 0);
      const prazo = new Date(acao.prazo + 'T00:00:00');
      return prazo < hoje;
    }

    function renderizar() {
      const filtrados = registrosFiltrados();
      renderizarIndicadores();
      document.getElementById('contadorLista').textContent = filtrados.length + ' itens';
      renderizarKanban(filtrados);
      renderizarTabela(filtrados);
    }

    function renderizarIndicadores() {
      const emAndamento = acoes.filter(function (acao) {
        return acao.status === 'Em andamento';
      }).length;
      const atrasadas = acoes.filter(atrasada).length;
      const concluidas = acoes.filter(function (acao) {
        return acao.status === 'Concluído';
      }).length;
      const ganho = acoes.reduce(function (total, acao) {
        return total + Number(acao.ganho || 0);
      }, 0);

      texto('indTotal', acoes.length);
      texto('indAndamento', emAndamento);
      texto('indAtrasadas', atrasadas);
      texto('indConcluidas', concluidas);
      texto('indGanho', ganho.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }));
    }

    function texto(id, conteudo) {
      document.getElementById(id).textContent = conteudo;
    }

    function renderizarKanban(filtrados) {
      const container = document.getElementById('visaoKanban');
      container.textContent = '';

      STATUS.forEach(function (status) {
        const itens = filtrados.filter(function (acao) {
          return acao.status === status;
        });

        const coluna = document.createElement('section');
        coluna.className = 'coluna';

        const titulo = document.createElement('h3');
        titulo.innerHTML = '<span>' + status + '</span><span>' + itens.length + '</span>';
        coluna.appendChild(titulo);

        const lista = document.createElement('div');
        lista.className = 'coluna-lista';

        if (!itens.length) {
          const vazio = document.createElement('div');
          vazio.className = 'vazio';
          vazio.textContent = 'Sem ações';
          lista.appendChild(vazio);
        }

        itens.forEach(function (acao) {
          lista.appendChild(criarCard(acao));
        });

        coluna.appendChild(lista);
        container.appendChild(coluna);
      });
    }

    function criarCard(acao) {
      const card = document.createElement('article');
      card.className = 'acao-card';

      const titulo = document.createElement('h4');
      titulo.textContent = acao.titulo || 'Sem título';

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.append(
        tag(acao.prioridade, normalizar(acao.prioridade)),
        tag(acao.tipo),
        tag(acao.area || 'Sem área')
      );

      if (atrasada(acao)) meta.append(tag('Atrasada', 'atrasada'));

      const detalhes = document.createElement('div');
      detalhes.className = 'meta';
      detalhes.textContent = [
        acao.responsavel || 'Sem responsável',
        acao.prazo ? 'Prazo: ' + formatarDataBR(acao.prazo) : 'Sem prazo',
        acao.ganho ? 'Ganho: ' + Number(acao.ganho).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : ''
      ].filter(Boolean).join(' • ');

      const botoes = document.createElement('div');
      botoes.className = 'card-acoes';
      botoes.append(
        miniBotao('Editar', function () { preencherFormulario(acao.id); }),
        miniBotao('Avançar', function () { avancarStatus(acao.id); }),
        miniBotao('Concluir', function () { mudarStatus(acao.id, 'Concluído'); })
      );

      card.append(titulo, meta, detalhes, botoes);
      return card;
    }

    function tag(textoTag, classe) {
      const span = document.createElement('span');
      span.className = 'tag ' + (classe || '');
      span.textContent = textoTag;
      return span;
    }

    function miniBotao(rotulo, acao) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'mini-btn';
      btn.textContent = rotulo;
      btn.onclick = acao;
      return btn;
    }

    function avancarStatus(id) {
      const acao = acoes.find(function (item) {
        return item.id === id;
      });
      if (!acao) return;

      const indice = STATUS.indexOf(acao.status);
      const proximo = STATUS[Math.min(indice + 1, STATUS.length - 1)] || 'Aberto';
      mudarStatus(id, proximo);
    }

    function renderizarTabela(filtrados) {
      const container = document.getElementById('visaoTabela');
      container.textContent = '';

      if (!filtrados.length) {
        const vazio = document.createElement('div');
        vazio.className = 'vazio';
        vazio.textContent = 'Nenhuma ação encontrada';
        container.appendChild(vazio);
        return;
      }

      const tabela = document.createElement('table');
      tabela.innerHTML = '<thead><tr><th>Ação</th><th>Status</th><th>Prioridade</th><th>Área</th><th>Responsável</th><th>Prazo</th><th>Ganho</th><th></th></tr></thead>';
      const corpo = document.createElement('tbody');

      filtrados.forEach(function (acao) {
        const linha = document.createElement('tr');
        linha.innerHTML =
          '<td>' + escapar(acao.titulo) + '<br><small>' + escapar(acao.tipo) + '</small></td>' +
          '<td>' + escapar(acao.status) + (atrasada(acao) ? '<br><span class="tag atrasada">Atrasada</span>' : '') + '</td>' +
          '<td>' + escapar(acao.prioridade) + '</td>' +
          '<td>' + escapar(acao.area) + '</td>' +
          '<td>' + escapar(acao.responsavel) + '</td>' +
          '<td>' + escapar(formatarDataBR(acao.prazo)) + '</td>' +
          '<td>' + Number(acao.ganho || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) + '</td>' +
          '<td><button class="mini-btn" type="button" onclick="preencherFormulario(\'' + acao.id + '\')">Editar</button></td>';
        corpo.appendChild(linha);
      });

      tabela.appendChild(corpo);
      container.appendChild(tabela);
    }

    function escapar(valorCampo) {
      return String(valorCampo || '').replace(/[&<>"']/g, function (c) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
      });
    }

    function formatarDataBR(data) {
      if (!data) return '';
      const partes = data.split('-');
      if (partes.length !== 3) return data;
      return partes[2] + '/' + partes[1] + '/' + partes[0];
    }

    function mudarVisualizacao(tipo) {
      visualizacao = tipo;
      document.getElementById('visaoKanban').classList.toggle('oculto', visualizacao !== 'kanban');
      document.getElementById('visaoTabela').classList.toggle('oculto', visualizacao !== 'tabela');
      document.getElementById('tabKanban').classList.toggle('ativo', visualizacao === 'kanban');
      document.getElementById('tabTabela').classList.toggle('ativo', visualizacao === 'tabela');
    }

    function exportarCSV() {
      const linhas = [[
        'ID', 'Título', 'Tipo', 'Status', 'Prioridade', 'Área', 'Responsável', 'Prazo', 'Ganho', 'Origem', 'Descrição', 'Causa'
      ]];

      registrosFiltrados().forEach(function (acao) {
        linhas.push([
          acao.id,
          acao.titulo,
          acao.tipo,
          acao.status,
          acao.prioridade,
          acao.area,
          acao.responsavel,
          acao.prazo,
          acao.ganho,
          acao.origem,
          acao.descricao,
          acao.causa
        ]);
      });

      const csv = linhas.map(function (linha) {
        return linha.map(function (campo) {
          return '"' + String(campo || '').replace(/"/g, '""') + '"';
        }).join(';');
      }).join('\n');

      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'engenharia_projetos_melhorias.csv';
      link.click();
      URL.revokeObjectURL(url);
    }

    function voltarMenu() {
      window.location.href = '00_Sistema_Manutencao_V25.html';
    }
  </script>
</body>
