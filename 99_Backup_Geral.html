<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>99_Backup_Geral</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:0}
header{background:#1f4e79;color:#fff;padding:15px;text-align:center}
.container{padding:20px;max-width:1050px;margin:auto}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
button{padding:12px 18px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin:5px}
.exportar{background:#198754;color:#fff}.importar{background:#fd7e14;color:#fff}.info{background:#1f4e79;color:#fff}.lista{line-height:1.8;columns:2}#msg{margin-top:15px;font-weight:bold}
@media(max-width:700px){.lista{columns:1}}
</style>
<script>
(function(){
 const u=(localStorage.getItem("usuarioLogado")||"").toLowerCase();
 if(!(u.includes("alexandre")||u.includes("diretoria"))){
   alert("Acesso bloqueado. Backup Geral é permitido somente para Alexandre e Diretoria.");
   window.location.href="00_Sistema_Manutencao_V25.html";
 }
})();
</script>
<script src="permissoes.js"></script>
</head>
<body>
<header style="position:relative;">
<div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);display:flex;gap:8px">
<button onclick="window.location.href='00_Sistema_Manutencao_V25.html'" style="background:#28a745;color:white;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:bold">⬅ Menu</button>
<button onclick="location.reload()" style="background:#17a2b8;color:white;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:bold">🔄 Atualizar</button>
</div>
<span style="font-size:30px;font-weight:bold">💾 BACKUP GERAL</span>
</header>

<div class="container">
<div class="card">
<h3>Módulos incluídos no Backup</h3>
<div class="lista" id="listaChaves"></div>
</div>

<div class="card">
<button class="exportar" onclick="exportarTudo()">📥 Exportar Backup Completo</button>
<button class="importar" onclick="document.getElementById('arquivo').click()">📤 Restaurar Backup</button>
<input type="file" id="arquivo" accept=".json" style="display:none" onchange="restaurarBackup(event)">
<div id="msg"></div>
</div>

<div class="card">
<h3>Último Backup</h3>
<div id="ultimoBackup">Nenhum backup realizado.</div>
</div>
</div>

<script>
verificarPermissao("99_Backup_Geral.html");

const CHAVES=[
'planejamento_prioridades_v24','planejamento_prioridades','prioridades_v24','prioridades_v25',
'liberacoes_v24','liberacoes_v25',
'riscos_v24','manutencao_v24','manutencao_v25',
'cadastro_maquinas_v24','cadastro_maquinas_v25','maquinas_v24','maquinas_v25','maquinas',
'cadastro_dispositivos_v24','cadastro_dispositivos_v25','dispositivos_v24','dispositivos_v25','dispositivos',
'melhorias_v24','pauta_v24','nao_conformidades_v24','nao_conformidades_v25',
'padronizacao_v24','funcoes_v24',
'lubrificacao_v24','lubrificacoes_v24','lubrificacao_v25','lubrificacoes_v25',
'diario_simples_v24','diario_simples_v25','diario_inspecao_v24','diario_inspecao_v25',
'os_dispositivos_v24','ordens_servico','ordens_servico_v24',
'ferramentas_materiais_v24','logs_auditoria',
'plano_preventiva_v2_v25','historico_preventiva_v2_v25',
'plano_preventiva_plus_v25','historico_preventiva_plus_v25',
'plano_preventiva_executiva_v25','historico_preventiva_executiva_v25',
'plano_preventiva_essencial_v25','historico_preventiva_essencial_v25',
'preventiva_gestao_planos_v25','preventiva_gestao_hist_v25',
'servicos_ferramentaria_manutencao_v25','servicos_ferramentaria_manutencao_v2_v25',
'servicos_ferramentaria_manutencao_v3','servicos_ferramentaria_manutencao_v4',
'op_divergencias_v25','op_inteligente_v25','historico_os_v25',
'engenharia_projetos_v25','pcp_programacao_v25'
];

function mostrarChaves(){
  listaChaves.innerHTML=CHAVES.map(c=>'✅ '+c).join('<br>');
}

function exportarTudo(){
 let backup={};
 CHAVES.forEach(chave=>{backup[chave]=localStorage.getItem(chave)});
 backup.dataBackup=new Date().toLocaleString('pt-BR');
 backup.versaoBackup='V25_COMPLETO';
 let blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
 let a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 let dataArquivo=new Date().toISOString().slice(0,10);
 a.download='Backup_Sistema_V25_COMPLETO_'+dataArquivo+'.json';
 a.click();
 localStorage.setItem('ultimo_backup_sistema',backup.dataBackup);
 mostrarUltimoBackup();
 msg.innerHTML='✅ Backup completo exportado com sucesso';
}

function restaurarBackup(event){
 let arquivo=event.target.files[0];
 if(!arquivo)return;
 let leitor=new FileReader();
 leitor.onload=function(e){
  try{
   let backup=JSON.parse(e.target.result);
   CHAVES.forEach(chave=>{
    if(backup[chave]!==undefined&&backup[chave]!==null){
      localStorage.setItem(chave,backup[chave]);
    }
   });
   localStorage.setItem('ultimo_backup_sistema',new Date().toLocaleString('pt-BR'));
   mostrarUltimoBackup();
   msg.innerHTML='✅ Backup restaurado com sucesso. Reabra os módulos.';
  }catch(erro){msg.innerHTML='❌ Arquivo inválido.'}
 };
 leitor.readAsText(arquivo);
}

function mostrarUltimoBackup(){
 let data=localStorage.getItem('ultimo_backup_sistema');
 ultimoBackup.innerHTML=data||'Nenhum backup realizado.';
}
mostrarChaves();
mostrarUltimoBackup();
</script>
</body>
</html>
