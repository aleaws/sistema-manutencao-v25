<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bonier - Sistema de Manutenção</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d3b8e,#1f4e79);
font-family:Arial,sans-serif;
}

.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 5px 25px rgba(0,0,0,.3);
text-align:center;
width:450px;
}

.logo{
max-width:100%;
margin-bottom:20px;
}

h1{
color:#1f4e79;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
font-size:16px;
font-weight:bold;
background:#1f4e79;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#erro{
color:red;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<div class="card">

<img src="Bonier logo.png" class="logo">

<h1>Sistema de Manutenção</h1>

<input
type="text"
id="usuario"
placeholder="Usuário"
>

<input
type="password"
id="senha"
placeholder="Senha"
>

<div style="
text-align:left;
margin-bottom:15px;
font-size:14px;
">

<input
type="checkbox"
id="verSenha"
onclick="mostrarSenha()"
style="
width:auto;
margin-right:5px;
">

Mostrar senha

</div>
<button onclick="entrar()">
Entrar
</button>

<div id="erro">
Senha incorreta
</div>

<div style="
margin-top:25px;
font-size:12px;
color:#666;
">

Versão V25

<br>

Alexandre Willian - Manutenção

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl =
'https://wzcrqzbwcsmfwenzcxkf.supabase.co';

const supabaseKey =
'sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';

const bancoSupabase =
supabase.createClient(
supabaseUrl,
supabaseKey
);

function registrarLog(acao){

let logs =
JSON.parse(
localStorage.getItem(
"logs_auditoria"
) || "[]"
);

logs.unshift({

data:
new Date().toLocaleString(),

usuario:
localStorage.getItem(
"usuarioLogado"
) || "Login",

acao:acao

});

localStorage.setItem(
"logs_auditoria",
JSON.stringify(logs)
);

}

function mostrarSenha(){

if(verSenha.checked){

senha.type = "text";

}else{

senha.type = "password";

}

}

async function entrar(){

let user =
usuario.value.toLowerCase();

let pass =
senha.value;

console.log("USER:", user);
console.log("PASS:", pass);

const teste =
await bancoSupabase
.from('usuarios')
.select('*');

console.log(teste);

const { data, error } =
await bancoSupabase
.from('usuarios')
.select('*')
.eq('usuario', user)
.eq('senha', pass)
.eq('ativo', 'true');

if(error){

console.error(error);

erro.style.display="block";

return;

}

if(data && data.length){

localStorage.setItem(
"usuarioLogado",
data[0].perfil
);

localStorage.setItem(
"sessaoValida",
"SIM"
);

registrarLog(
"Login realizado"
);

window.location.href=
"00_Sistema_Manutencao_V25.html";

return;

}




erro.style.display="block";

}

senha.addEventListener("keypress",function(e){

if(e.key==="Enter"){

entrar();

}

});

</script>

</body>
</html>
