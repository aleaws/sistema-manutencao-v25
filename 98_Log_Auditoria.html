<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>98_Log_Auditoria</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="permissoes.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f4e79;
color:white;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
padding:10px;
}

.card{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
box-shadow:0 1px 4px rgba(0,0,0,.15);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

.ind{
font-size:28px;
font-weight:bold;
color:#1f4e79;
}

button{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.b1{background:#198754;color:white;}
.b2{background:#0d6efd;color:white;}
.b3{background:#6c757d;color:white;}
.b4{background:#dc3545;color:white;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:12px;
}

th{
background:#1f4e79;
color:white;
position:sticky;
top:0;
}

input,select{
padding:6px;
}


.ind-card{
background:#f8fafc;
border:1px solid #d9dee5;
border-left:6px solid #1f4e79;
border-radius:10px;
padding:10px;
}
.ind-card.verde{border-left-color:#198754}
.ind-card.amarelo{border-left-color:#ffc107}
.ind-card.vermelho{border-left-color:#dc3545}
.ind-card span{
font-size:13px;
font-weight:bold;
color:#555;
}
.filtros{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:8px;
}
.badge{
display:inline-block;
padding:4px 8px;
border-radius:999px;
font-size:11px;
font-weight:bold;
}
.bg-celular{background:#d1e7dd;color:#0f5132}
.bg-computador{background:#cfe2ff;color:#084298}
.bg-login{background:#d1e7dd;color:#0f5132}
.bg-outro{background:#e9ecef;color:#495057}
.resumo-acessos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:8px;
}
.acesso-card{
background:#fff;
border:1px solid #d9dee5;
border-radius:10px;
padding:10px;
box-shadow:0 1px 4px rgba(0,0,0,.10);
}
.acesso-card b{
color:#1f4e79;
font-size:16px;
}
.acesso-card small{
display:block;
margin-top:4px;
color:#555;
font-weight:bold;
}
@media(max-width:800px){
.filtros{grid-template-columns:1fr}
}

</style>
</head>

<body>

<header>
📋 LOG DE AUDITORIA
</header>

<div class="container">

<div class="card">

<button class="b1"
onclick="window.location.href='00_Sistema_Manutencao_V25.html'">
⬅ Menu
</button>

<button class="b2"
onclick="carregarLogs()">
🔄 Atualizar
</button>

<button class="b3"
onclick="exportarExcel()">
📊 Exportar Excel
</button>

<button
id="btLimpar"
class="b4"
onclick="limparLogs()">
🧹 Limpar Logs
</button>

</div>

<div class="card">

<div class="grid">

<div class="ind-card">
<span>Total Logs</span>
<div class="ind" id="tot">0</div>
</div>

<div class="ind-card verde">
<span>Logins</span>
<div class="ind" id="logins">0</div>
</div>

<div class="ind-card vermelho">
<span>Eventos Críticos</span>
<div class="ind" id="criticos">0</div>
</div>

<div class="ind-card amarelo">
<span>Hoje</span>
<div class="ind" id="hoje">0</div>
</div>

</div>

</div>

<div class="card">
<div class="filtros">
<input id="pesquisa" placeholder="Pesquisar..." oninput="filtrar()">

<select id="fUsuario" onchange="filtrar()">
<option value="">Todos Usuários</option>
</select>

<select id="fDispositivo" onchange="filtrar()">
<option value="">Todos Dispositivos</option>
<option>Celular</option>
<option>Computador</option>
</select>

<select id="fAcao" onchange="filtrar()">
<option value="">Todas Ações</option>
<option>Login realizado</option>
</select>
</div>
</div>

<div class="card">
<h3 style="margin:0 0 8px;color:#1f4e79">👥 Último acesso por usuário</h3>
<div class="resumo-acessos" id="ultimosAcessos"></div>
</div>

<div class="card">

<table id="tb">

<thead>

<tr>
<th>Data/Hora</th>
<th>Usuário</th>
<th>Ação</th>
<th>Dispositivo</th>
<th>Página</th>
<th>Navegador</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl='https://wzcrqzbwcsmfwenzcxkf.supabase.co';
const supabaseKey='sb_publishable_5gNNMdy4TrqEoSga1Uq4zg_8Iq7MIGu';
const bancoSupabase=supabase.createClient(supabaseUrl,supabaseKey);


verificarPermissao(
"98_Log_Auditoria.html"
);

let usuario =
localStorage.getItem(
"usuarioLogado"
);

if(
usuario !== "Alexandre" &&
usuario !== "Diretoria"
){

alert(
"Acesso negado"
);

window.location.href =
"00_Sistema_Manutencao_V25.html";

}

if(
usuario !== "Alexandre"
){

btLimpar.style.display =
"none";

}


async function obterLogs(){
 const {data,error}=await bancoSupabase
 .from('logs_auditoria')
 .select('*')
 .order('created_at',{ascending:false});
 if(error){
   console.error(error);
   return [];
 }
 return data||[];
}


function resumirNavegador(ua){
ua = String(ua || "");
if(ua.includes("Edg")) return "Edge";
if(ua.includes("Chrome")) return "Chrome";
if(ua.includes("Firefox")) return "Firefox";
if(ua.includes("Safari") && !ua.includes("Chrome")) return "Safari";
return ua.substring(0,40);
}

function formatarDataHora(v){
if(!v) return "";
return new Date(v).toLocaleString("pt-BR");
}

function renderUltimosAcessos(logs){
let mapa = {};

logs.forEach(log=>{
let usuario = log.usuario || "Desconhecido";
if(!mapa[usuario]){
mapa[usuario] = log;
}
});

let html = "";

Object.keys(mapa).sort().forEach(usuario=>{
let l = mapa[usuario];
html += `
<div class="acesso-card">
<b>${usuario}</b>
<small>Último acesso: ${formatarDataHora(l.created_at)}</small>
<small>Dispositivo: ${l.dispositivo || "-"}</small>
<small>Navegador: ${resumirNavegador(l.navegador || "")}</small>
</div>`;
});

ultimosAcessos.innerHTML = html || "Nenhum acesso registrado.";
}

async function carregarLogs(){


let logs =
await obterLogs();

renderUltimosAcessos(logs);

let tbody =
tb.tBodies[0];

tbody.innerHTML="";

let usuarios =
new Set();

logs.forEach(log=>{

usuarios.add(
log.usuario || ""
);

let r =
tbody.insertRow();

let dataHora = "";
if(log.created_at){
  dataHora = new Date(log.created_at).toLocaleString("pt-BR");
}
r.insertCell().innerText = dataHora;

r.insertCell().innerText =
log.usuario || "";

let acaoCell = r.insertCell();
let classeAcao = (log.acao||"").includes("Login") ? "bg-login" : "bg-outro";
acaoCell.innerHTML = `<span class="badge ${classeAcao}">${log.acao || ""}</span>`;

let dispositivo = log.dispositivo || "";
let classeDisp = dispositivo === "Celular" ? "bg-celular" : "bg-computador";
r.insertCell().innerHTML = dispositivo ? `<span class="badge ${classeDisp}">${dispositivo}</span>` : "";

r.insertCell().innerText =
log.pagina || "";

r.insertCell().innerText =
resumirNavegador(log.navegador || "");

});

fUsuario.innerHTML =
'<option value="">Todos Usuários</option>';

[...usuarios]
.sort()
.forEach(u=>{

fUsuario.innerHTML +=
`<option>${u}</option>`;

});

await indicadores();

}

async function indicadores(){

let logs =
await obterLogs();

tot.innerText =
logs.length;

logins.innerText =
logs.filter(x=>
(x.acao||"")
.includes("Login")
).length;

criticos.innerText =
logs.filter(x=>{

let a =
(x.acao||"")
.toLowerCase();

return (
a.includes("tentou") ||
a.includes("negado")
);

}).length;

let hojeTxt =
new Date().toLocaleDateString("pt-BR");

hoje.innerText =
logs.filter(x=>{
  if(!x.created_at) return false;
  return new Date(x.created_at).toLocaleDateString("pt-BR") === hojeTxt;
}).length;

}

function filtrar(){

let txt =
pesquisa.value
.toLowerCase();

let usu =
fUsuario.value;

let disp =
fDispositivo.value;

let acao =
fAcao.value;

[...tb.tBodies[0].rows]
.forEach(r=>{

let texto =
r.innerText
.toLowerCase();

let ok =
texto.includes(txt);

if(usu){
ok = ok && r.cells[1].innerText===usu;
}

if(disp){
ok = ok && r.cells[3].innerText.includes(disp);
}

if(acao){
ok = ok && r.cells[2].innerText.includes(acao);
}

r.style.display =
ok ? "" : "none";

});

}

function exportarExcel(){

let dados=[[
"Data/Hora",
"Usuário",
"Ação",
"Dispositivo",
"Página",
"Navegador"
]];

[...tb.tBodies[0].rows]
.forEach(r=>{

dados.push([

r.cells[0].innerText,
r.cells[1].innerText,
r.cells[2].innerText,
r.cells[3].innerText,
r.cells[4].innerText,
r.cells[5].innerText

]);

});

let ws =
XLSX.utils.aoa_to_sheet(
dados
);

let wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Auditoria"
);

XLSX.writeFile(
wb,
"logs_auditoria.xlsx"
);

}

async function limparLogs(){

if(usuario !== "Alexandre"){
  return;
}

if(!confirm("Excluir todos os logs do Supabase?")){
  return;
}

if(!confirm("Confirma a exclusão definitiva dos logs?")){
  return;
}

const { error } = await bancoSupabase
  .from('logs_auditoria')
  .delete()
  .neq('id', 0);

if(error){
  alert("Erro ao excluir logs: " + error.message);
  return;
}

localStorage.removeItem("logs_auditoria");

alert("Logs excluídos com sucesso.");

carregarLogs();

}

carregarLogs();

</script>

</body>
</html>
